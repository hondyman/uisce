static_resources:
  listeners:
  - name: semantic-listener
    address:
      socket_address:
        address: 0.0.0.0
        port_value: 8443
    filter_chains:
    - filters:
      - name: envoy.filters.network.http_connection_manager
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          stat_prefix: semantic-router
          route_config:
            name: semantic-router
            virtual_hosts:
            - name: semantic-host
              domains: [ "*" ]
              routes:
              - match:
                  prefix: "/semantic"
                route:
                  cluster: legacy-semantic
                  timeout: 10s
                  request_mirror_policies:
                  - cluster: cube-semantic-mirror
                    runtime_fraction:
                      default_value:
                        numerator: 100
                        denominator: HUNDRED
              - match:
                  prefix: "/cube-parity"
                route:
                  cluster: cube-parity
              - match:
                  prefix: "/healthz"
                route:
                  cluster: legacy-semantic
          http_filters:
          - name: envoy.filters.http.router
  clusters:
  - name: legacy-semantic
    connect_timeout: 1s
    type: STRICT_DNS
    lb_policy: ROUND_ROBIN
    load_assignment:
      cluster_name: legacy-semantic
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: semantic-legacy.default.svc.cluster.local
                port_value: 8080
  - name: cube-semantic-mirror
    connect_timeout: 1s
    type: STRICT_DNS
    lb_policy: ROUND_ROBIN
    load_assignment:
      cluster_name: cube-semantic-mirror
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: cube-semantic.default.svc.cluster.local
                port_value: 8080
    retry_policy:
      retry_on: 5xx
      num_retries: 1
  - name: cube-parity
    connect_timeout: 1s
    type: STRICT_DNS
    lb_policy: ROUND_ROBIN
    load_assignment:
      cluster_name: cube-parity
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: cube-parity.default.svc.cluster.local
                port_value: 8090
layered_runtime:
  layers:
  - name: static-layer
    static_layer:
      envoy:
        resource_limits:
          listener:
            semantic-listener:
              connection_limit: 100000
