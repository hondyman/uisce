basePath: /
definitions:
  api.ScanRequest:
    properties:
      datasource_id:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: This is the API for the Semlayer application.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  title: Semlayer API
  version: "1.0"
paths:
  /api/scanner/run:
    post:
      consumes:
      - application/json
      description: Scan a datasource by providing a tenant_product_datasource_id
      parameters:
      - description: Datasource ID
        in: body
        name: datasource_id
        required: true
        schema:
          $ref: '#/definitions/api.ScanRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Scan completed successfully
          schema:
            type: string
        "400":
          description: Invalid request format
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Error scanning datasource
          schema:
            additionalProperties: true
            type: object
      summary: Scan a datasource
      tags:
      - scanner
swagger: "2.0"
