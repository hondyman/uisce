# Trino Catalog Configuration for Iceberg Audit Tables
# This file should be placed in /etc/trino/catalog/iceberg.properties

connector.name=iceberg

# Iceberg REST Catalog
iceberg.catalog.type=rest
iceberg.rest.uri=http://iceberg-catalog:8181

# File format and compression
iceberg.file-format=parquet
iceberg.compression-codec=zstd

# Table registration
iceberg.register-table-procedure.enabled=true

# S3-compatible storage (MinIO or AWS S3)
iceberg.catalog.warehouse=s3a://audit/
fs.s3a.endpoint=http://minio:9000
fs.s3a.access-key=minioadmin
fs.s3a.secret-key=minioadmin
fs.s3a.path.style.access=true
fs.s3a.connection.ssl.enabled=false

# Performance tuning
iceberg.split-size=64MB
iceberg.target-max-file-size=512MB
iceberg.compression-level=3

# Security (for production)
# iceberg.rest.auth.type=oauth2
# iceberg.rest.auth.oauth2.token=<token>

# Multi-tenant isolation via schema mapping
# Default schema: audit
iceberg.default-schema=audit
