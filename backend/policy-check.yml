name: 'Policy Drift Check'

on:
  pull_request:
    branches: [main]

jobs:
  drift-check:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write # Required to post comments

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build CLI
        run: go build -o semlayer ./backend

      - name: Run Policy Simulation
        id: simulate
        continue-on-error: true # Continue even if the CLI exits with 1, so we can post the comment
        env:
          POLICY_DB_URL: ${{ secrets.POLICY_DB_URL }}
        run: |
          # This command simulates a change. Replace with your actual logic.
          # For a PR, you might compare the feature branch schema against the main branch schema.
          # The result is saved to a file for the next step.
          ./semlayer --simulate \
            --from=... \ # Your 'before' datasource ID
            --to=... \   # Your 'after' datasource ID
            --persist \
            --output=json \
            --fail-on-severity=medium \
            > result.json
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Post PR Comment
        uses: actions/github-script@v7
        if: steps.simulate.outputs.exit_code != '0' # Only comment if there are violations
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const result = JSON.parse(fs.readFileSync('result.json', 'utf8'));
            const { owner, repo } = context.repo;
            const pr_number = context.issue.number;

            const commentBody = `### 📜 Policy Drift Report
            **${result.summary.breaking || 0} breaking, ${result.summary.medium || 0} medium, ${result.summary.low || 0} low changes found.**

            ${result.violations.map(v => `* **[${v.severity.toUpperCase()}]** \`${v.rule_id}\`: ${v.message} at \`${v.change.qualified_path}\``).join('\n')}

            ---
            View Full Report in Semlayer UI
            `;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pr_number,
              body: commentBody
            });