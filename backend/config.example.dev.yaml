# SemLayer Development Configuration
# This is a complete example configuration for development environment

yaml_dir: "./config"
driver: "postgres"
dsn: "host=localhost port=5432 user=postgres password=password dbname=semlayer sslmode=disable"
port: ":8080"
pg_port: ":5432"

# Environment settings
environment: "development"
log_level: "debug"

# Feature flags
enable_metrics: true
enable_caching: true
enable_security: false # Disabled for easier development

# Database settings
db_max_open_conns: 10
db_max_idle_conns: 2
db_max_lifetime: "5m"

# Cache settings
cache_num_shards: 4
cache_max_size_per_shard: 5000
cache_default_ttl: "30m"

# Security settings
jwt_secret: "dev-jwt-secret-key-change-in-production"
security_rate_limit_enabled: false
security_rate_limit_requests: 100
security_rate_limit_window: "1m"

# Optional settings
redis_addr: "" # Leave empty to disable Redis
graphql_url: ""
