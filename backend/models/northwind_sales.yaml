        type: string
      - name: phone
        sql: phone
        type: string
      - name: fax
        sql: fax
        type: string
      - name: homepage
        sql: homepage
        type: string

  - name: territories
    sql: SELECT * FROM public.territories
    joins:
      - name: region
        sql: "{CUBE}.region_id = {region}.region_id"
        relationship: many_to_one
      - name: employees
        sql: "{CUBE}.territory_id = {employee_territories}.territory_id AND {employee_territories}.employee_id = {employees}.employee_id"
        relationship: many_to_many
    measures:
      - name: count
        type: count
    dimensions:
      - name: territory_id
        sql: territory_id
        type: string
        primary_key: true
      - name: territory_description
        sql: territory_description
        type: string
      - name: region_id
        sql: region_id
        type: number

