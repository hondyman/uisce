version: '3.8'

services:
  # =============================================================================
  # Redpanda (Kafka-compatible) - Message Bus for Audit Events
  # =============================================================================
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.3.5
    container_name: audit-redpanda
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --overprovisioned
      - --node-id 0
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
    ports:
      - "19092:19092"  # Kafka API
      - "18081:18081"  # Schema Registry
      - "18082:18082"  # Pandaproxy
      - "9644:9644"    # Admin API
    networks:
      - audit-network
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5

  # Redpanda Console - Kafka UI
  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.4.5
    container_name: audit-redpanda-console
    entrypoint: /bin/sh
    command: -c 'echo "$$CONSOLE_CONFIG_FILE" > /tmp/config.yml; /app/console'
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
      CONSOLE_CONFIG_FILE: |
        kafka:
          brokers: ["redpanda:9092"]
          schemaRegistry:
            enabled: true
            urls: ["http://redpanda:8081"]
        redpanda:
          adminApi:
            enabled: true
            urls: ["http://redpanda:9644"]
    ports:
      - "8080:8080"
    networks:
      - audit-network
    depends_on:
      - redpanda

  # =============================================================================
  # MinIO - S3-Compatible Object Storage for Parquet Files
  # =============================================================================
  minio:
    image: minio/minio:RELEASE.2024-01-01T16-36-33Z
    container_name: audit-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console
    volumes:
      - minio-data:/data
    networks:
      - audit-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # MinIO Client - Create buckets on startup
  minio-init:
    image: minio/mc:RELEASE.2024-01-01T16-49-26Z
    container_name: audit-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb myminio/audit --ignore-existing;
      /usr/bin/mc mb myminio/iceberg --ignore-existing;
      /usr/bin/mc policy set public myminio/audit;
      /usr/bin/mc policy set public myminio/iceberg;
      echo 'MinIO buckets created successfully';
      "
    networks:
      - audit-network

  # =============================================================================
  # Iceberg REST Catalog - Metadata Service for Iceberg Tables
  # =============================================================================
  iceberg-rest:
    image: tabulario/iceberg-rest:0.8.0
    container_name: audit-iceberg-rest
    environment:
      CATALOG_WAREHOUSE: s3a://iceberg/warehouse/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_ACCESS__KEY__ID: minioadmin
      CATALOG_S3_SECRET__ACCESS__KEY: minioadmin
      CATALOG_S3_PATH__STYLE__ACCESS: true
    ports:
      - "8181:8181"
    networks:
      - audit-network
    depends_on:
      - minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181/v1/config"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================================================
  # Trino - Distributed SQL Query Engine for Iceberg
  # =============================================================================
  trino:
    image: trinodb/trino:435
    container_name: audit-trino
    ports:
      - "8090:8080"  # Trino coordinator
    volumes:
      - ./trino/catalog/iceberg.properties:/etc/trino/catalog/iceberg.properties:ro
      - ./trino/config.properties:/etc/trino/config.properties:ro
    networks:
      - audit-network
    depends_on:
      - iceberg-rest
      - minio
    environment:
      - TRINO_ENVIRONMENT=development
    healthcheck:
      test: ["CMD", "trino", "--execute", "SELECT 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # =============================================================================
  # Audit Sink Consumer - Kafka to Iceberg Ingestion
  # =============================================================================
  audit-sink:
    build:
      context: .
      dockerfile: Dockerfile.audit-sink
    container_name: audit-sink
    environment:
      KAFKA_BROKERS: redpanda:9092
      ICEBERG_CATALOG_URI: http://iceberg-rest:8181
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: audit
      LOG_LEVEL: info
    networks:
      - audit-network
    depends_on:
      redpanda:
        condition: service_healthy
      iceberg-rest:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped

networks:
  audit-network:
    driver: bridge

volumes:
  minio-data:
    driver: local
