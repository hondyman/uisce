<!DOCTYPE html>
<html lang="en">
<head>
    <title>API Test</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Marketplace API Test</h1>
    <button onclick="testAPI()">Test Marketplace API</button>
    <div id="result"></div>
    
    <script>
        async function testAPI() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Loading...';
            
            try {
                console.log('Making API call...');
                const response = await fetch('/api/marketplace/validation-rules');
                console.log('Response status:', response.status);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                console.log('Data received:', data);
                
                resultDiv.innerHTML = `
                    <p>Success! Found ${data.total_count} rules</p>
                    <p>First few rules:</p>
                    <ul>
                        ${data.rules.slice(0, 5).map(rule => 
                            `<li>${rule.name} (${rule.category})</li>`
                        ).join('')}
                    </ul>
                `;
            } catch (error) {
                console.error('API Error:', error);
                resultDiv.innerHTML = `<p style="color: red">Error: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
