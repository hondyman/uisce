# Prometheus Configuration

global:
  scrape_interval: 15s # Scrape targets every 15 seconds
  evaluation_interval: 15s # Evaluate alerts every 15 seconds
  external_labels:
    cluster: 'semlayer'
    environment: 'development'
    region: 'local'

# Alert rule files
rule_files:
- '/etc/prometheus/alert.yml'

# Alertmanager configuration
alerting:
  alertmanagers:
  - static_configs:
    - targets:
      - alertmanager:9093

# Scrape configurations
scrape_configs:
# Prometheus self-monitoring
- job_name: 'prometheus'
  static_configs:
  - targets: [ 'localhost:9090' ]
  scrape_interval: 10s
  metrics_path: '/metrics'

# Temporal Server metrics (NEWLY ADDED)
- job_name: 'temporal-server'
  static_configs:
  - targets: [ 'temporal:8233' ]
  scrape_interval: 15s
  metrics_path: '/metrics'
  relabel_configs:
  - source_labels: [ __address__ ]
    target_label: service
    replacement: 'temporal'
  - source_labels: [ __address__ ]
    target_label: component
    replacement: 'server'

# Traefik metrics
- job_name: 'traefik'
  static_configs:
  - targets: [ 'traefik:8080' ]
  scrape_interval: 10s
  metrics_path: '/metrics'
  relabel_configs:
  - source_labels: [ __address__ ]
    target_label: instance
    replacement: 'traefik-ingress'

