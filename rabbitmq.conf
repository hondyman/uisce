# RabbitMQ Configuration for Semlayer
# Location: rabbitmq.conf (if using config file)

vm_memory_high_watermark.relative = 0.6

# 'max_connections' is unsupported in this RabbitMQ version; remove or
# replace with a supported setting if needed (e.g. connection_max).
# max_connections = 5000

log.file.level = warning

# Disk space
disk_free_limit.absolute = 50MB

# Statistics gathering interval (ms)
collect_statistics_interval = 5000

# Enable plugins
# management will be auto-enabled by docker compose
