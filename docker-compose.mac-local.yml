services:
  # ==========================================
  # BACKEND API
  # ==========================================
  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: semlayer-backend
    restart: unless-stopped
    environment:
      # Database (External Postgres)
      - POSTGRES_HOST=100.84.126.19
      - POSTGRES_PORT=5432
      - POSTGRES_DB=alpha
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      
      # Auth Service
      - AUTH_SERVICE_URL=http://host.docker.internal:8001
      
      # GraphQL (External Hasura)
      - HASURA_ENDPOINT=http://100.84.126.19:8080
      - HASURA_ADMIN_SECRET=myadminsecret
      
      # JWT
      - JWT_SECRET=dev-jwt-secret-key-change-in-production
      
      # Server
      - PORT=8080
      - ENVIRONMENT=dev
      - LOG_LEVEL=info
    ports:
      - "8080:8080"
    networks:
      - semlayer
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ==========================================
  # AUTH SERVICE
  # ==========================================
  auth-service:
    build:
      context: .
      dockerfile: ./auth-service/Dockerfile
    container_name: semlayer-auth
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - AUTH_SERVICE_PORT=8001
      
      # Database (External Postgres)
      - POSTGRES_HOST=100.84.126.19
      - POSTGRES_PORT=5432
      - POSTGRES_DB=alpha
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      
      # JWT
      - JWT_SECRET=dev-jwt-secret-key-change-in-production
      - JWT_EXPIRY=1h
      - REFRESH_TOKEN_EXPIRY=24h
      
      # CORS
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173,http://127.0.0.1:5174
    ports:
      - "8001:8001"
    networks:
      - semlayer
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8001/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend

# Docker networks
networks:
  semlayer:
    driver: bridge

# Docker volumes
volumes:
  frontend_node_modules:
    driver: local
