version: '3.8'

services:
  keycloak:
    image: quay.io/keycloak/keycloak:25.0.0
    container_name: keycloak
    command: start-dev
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
    ports:
      - "8080:8080"
    networks:
      - default

  infisical:
    image: infisical/infisical:latest
    container_name: infisical
    ports:
      - "80:3000"
    environment:
      - TRUST_PROXY=1
    env_file:
      - .env.infisical
    networks:
      - default

networks:
  default:
    driver: bridge