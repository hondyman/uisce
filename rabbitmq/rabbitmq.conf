# RabbitMQ Configuration for Security Event Streaming

# ============================================================================
# GENERAL SETTINGS
# ============================================================================

# Listeners
listeners.tcp.default = 5672
management.tcp.port = 15672

# Default user
default_user = guest
default_pass = guest

# Allow guest user to connect from any IP (required for Docker networking)
loopback_users = none

# Virtual host
default_vhost = /

# ============================================================================
# PERFORMANCE TUNING
# ============================================================================

# Memory high watermark (50% of available RAM)
vm_memory_high_watermark.relative = 0.5

# Disk free space limit (50GB)
disk_free_limit.absolute = 50GB

# ============================================================================
# PERSISTENCE
# ============================================================================

# Enable message persistence
queue_master_locator = min-masters

# ============================================================================
# LOGGING
# ============================================================================

log.console = true
log.console.level = info
log.file.level = info

# ============================================================================
# MANAGEMENT PLUGIN
# ============================================================================

management.load_definitions = /etc/rabbitmq/definitions.json
