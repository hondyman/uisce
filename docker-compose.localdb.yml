version: '3.9'

services:
  # Provide a lightweight dummy postgres service so Compose does not start
  # the real postgres image when using the localdb override. This dummy
  # container does not expose port 5432 and only exists to satisfy
  # service dependency graphs. Services are configured to use
  # host.docker.internal for the real DB.
  postgres:
    image: alpine:3.18
    command: ["sh", "-c", "while true; do sleep 3600; done"]
    ports: []
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 1s
      timeout: 1s
      retries: 1
      start_period: 1s

  # Point Hasura at the host Postgres for local development
  hasura:
    environment:
      HASURA_GRAPHQL_DATABASE_URL: "postgres://postgres:postgres@host.docker.internal:5432/alpha?sslmode=disable"

  # Ensure services use the host Postgres instead of the compose 'postgres' service
  backend:
    environment:
      - POSTGRES_HOST=host.docker.internal
      - POSTGRES_PORT=5432
      - POSTGRES_DB=semlayer
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - TEMPORAL_GRPC_ENDPOINT=temporal:7233


  # Temporal needs to point its internal DB lookup to the host Postgres too
  temporal:
    environment:
      - POSTGRES_SEEDS=host.docker.internal
      - POSTGRES_PWD=postgres
      - POSTGRES_USER=postgres
      - DB_PORT=5432
      - DB=postgresql
      - DYNAMIC_CONFIG_FILE_PATH=/etc/temporal/config/dynamicconfig/local.yml

    volumes:
      - ./configs/temporal/dynamicconfig/local.yml:/etc/temporal/config/dynamicconfig/local.yml:ro
  # Provide a lightweight dummy AI service locally to avoid private image pulls
  ai-service:
    image: alpine:3.18
    command: ["sh", "-c", "while true; do sleep 3600; done"]


  # Optionally prevent host port binding for app services in this override by
  # uncommenting ports: [] entries if you want no published ports at all.
