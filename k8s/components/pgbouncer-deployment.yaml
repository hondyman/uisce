# pgBouncer Connection Pool Service for Calendar
# Deploy: kubectl apply -f pgbouncer-deployment.yaml

apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
  namespace: calendar
  labels:
    app: pgbouncer
    component: connection-pool
spec:
  replicas: 2 # HA setup with 2 instances
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: pgbouncer
  template:
    metadata:
      labels:
        app: pgbouncer
        component: connection-pool
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "6432"
        prometheus.io/path: "/admin/stats"
    spec:
      # HA configuration
      affinity:
        podAntiAffinity:
          required:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - pgbouncer
            topologyKey: kubernetes.io/hostname

      # Service account for metrics access
      serviceAccountName: pgbouncer

      # Security context for non-root user
      securityContext:
        runAsNonRoot: true
        runAsUser: 999 # pgbouncer standard UID
        fsGroup: 999

      containers:
      - name: pgbouncer
        image: edoburu/pgbouncer:1.22 # Alpine-based, ~50MB
        imagePullPolicy: IfNotPresent

        ports:
        - name: pgbouncer
          protocol: TCP
          containerPort: 6432
        - name: admin
          protocol: TCP
          containerPort: 6433

        # Environment variables
        env:
        - name: CALENDAR_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: calendar-secrets
              key: db-password
        - name: ADMIN_USER_PASSWORD
          valueFrom:
            secretKeyRef:
              name: pgbouncer-secrets
              key: admin-user-password
        - name: DATABASE_HOST
          value: "postgresql.database.svc.cluster.local"
        - name: DATABASE_PORT
          value: "5432"
        - name: DATABASE_USER
          value: "calendar_user"
        - name: DATABASE_NAME
          value: "calendar_service"

        # Mount configuration
        volumeMounts:
        - name: pgbouncer-config
          mountPath: /etc/pgbouncer
          readOnly: true
        - name: pgbouncer-logs
          mountPath: /var/log/pgbouncer
        - name: tmp
          mountPath: /tmp

        # Liveness probe: Can pgBouncer connect to PostgreSQL?
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - |
              psql -h localhost -p 6432 -U calendar_user -d calendar_service -c "SELECT 1" > /dev/null 2>&1
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        # Readiness probe: Is pgBouncer accepting connections?
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - |
              psql -h localhost -p 6432 -U calendar_user -d calendar_service -c "SHOW DATABASES" > /dev/null 2>&1
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2

        # Startup probe: Allow time for initialization
        startupProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - |
              test -f /etc/pgbouncer/pgbouncer.ini && echo "Config ready" || exit 1
          initialDelaySeconds: 0
          periodSeconds: 1
          timeoutSeconds: 3
          failureThreshold: 30

        # Resource limits
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"

        # Security context for container
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL

      # Optional: Metrics exporter sidecar
      - name: pgbouncer-exporter
        image: prometheuscommunity/pgbouncer-exporter:v0.7.0
        imagePullPolicy: IfNotPresent

        ports:
        - name: metrics
          containerPort: 9127
          protocol: TCP

        env:
        - name: PGBOUNCER_URL
          value: "postgres://admin_user@localhost:6433/pgbouncer"
        - name: PGBOUNCER_PASSWORD
          valueFrom:
            secretKeyRef:
              name: pgbouncer-secrets
              key: admin-user-password

        resources:
          requests:
            memory: "32Mi"
            cpu: "25m"
          limits:
            memory: "128Mi"
            cpu: "100m"

        # Liveness probe for metrics exporter
        livenessProbe:
          httpGet:
            path: /metrics
            port: metrics
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3

      # Volumes
      volumes:
      - name: pgbouncer-config
        configMap:
          name: pgbouncer-config
          defaultMode: 644
      - name: pgbouncer-logs
        emptyDir: {}
      - name: tmp
        emptyDir: {}

      # Pod scheduling
      nodeSelector:
        workload-type: database-adjacent

      # Toleration for workload-specific taints
      tolerations:
      - key: workload-type
        operator: Equal
        value: database-adjacent
        effect: NoSchedule

      # Termination grace period for clean shutdown
      terminationGracePeriodSeconds: 30
---

# pgBouncer Service (ClusterIP for internal access)
apiVersion: v1
kind: Service
metadata:
  name: pgbouncer
  namespace: calendar
  labels:
    app: pgbouncer
  annotations:
    description: "Connection pool for PostgreSQL"
spec:
  type: ClusterIP
  selector:
    app: pgbouncer
  ports:
  - name: pgbouncer
    port: 6432
    targetPort: pgbouncer
    protocol: TCP
  - name: admin
    port: 6433
    targetPort: admin
    protocol: TCP
  - name: metrics
    port: 9127
    targetPort: metrics
    protocol: TCP
---

# Headless Service for direct pod access (if needed)
apiVersion: v1
kind: Service
metadata:
  name: pgbouncer-headless
  namespace: calendar
  labels:
    app: pgbouncer
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: pgbouncer
  ports:
  - name: pgbouncer
    port: 6432
    targetPort: pgbouncer
    protocol: TCP
---

# ServiceAccount for metrics collection
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pgbouncer
  namespace: calendar
---

# RBAC: Allow basic pod view (for node-affinity awareness)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pgbouncer
  namespace: calendar
rules:
- apiGroups: [ "" ]
  resources: [ "pods" ]
  verbs: [ "get", "list", "watch" ]
---

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pgbouncer
  namespace: calendar
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: pgbouncer
subjects:
- kind: ServiceAccount
  name: pgbouncer
  namespace: calendar
---

# PodDisruptionBudget: Ensure one instance always running
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: pgbouncer-pdb
  namespace: calendar
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: pgbouncer
---

# HorizontalPodAutoscaler: Scale based on connection load
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pgbouncer-hpa
  namespace: calendar
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pgbouncer
  minReplicas: 2
  maxReplicas: 6
  metrics:
  # Scale based on memory usage
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 70
  # Scale based on CPU usage
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 2
        periodSeconds: 15
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
---

# NetworkPolicy: Secure access to pgBouncer
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: pgbouncer-network-policy
  namespace: calendar
spec:
  podSelector:
    matchLabels:
      app: pgbouncer
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow from calendar-service pods
  - from:
    - podSelector:
        matchLabels:
          app: calendar-service
    ports:
    - protocol: TCP
      port: 6432
  # Allow from monitoring/prometheus
  - from:
    - namespaceSelector:
        matchLabels:
          name: monitoring
    ports:
    - protocol: TCP
      port: 9127
    - protocol: TCP
      port: 6433
  egress:
  # Allow to PostgreSQL
  - to:
    - namespaceSelector:
        matchLabels:
          name: database
    ports:
    - protocol: TCP
      port: 5432
  # Allow DNS
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
