# pgBouncer Connection Pooling Configuration for Calendar Service
# Deploy: kubectl apply -f pgbouncer-configmap.yaml

apiVersion: v1
kind: ConfigMap
metadata:
  name: pgbouncer-config
  namespace: calendar
data:
  pgbouncer.ini: |
    ;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
    ; Calendar Service pgBouncer Configuration
    ; Connection pooling: 4 modes optimized for different workloads
    ; Deploy in sidecar with calendar-service pods
    ;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

    [databases]
    ; Calendar database connection
    calendar_db = host=postgresql.database.svc.cluster.local port=5432 \
                  user=calendar_user password=$CALENDAR_DB_PASSWORD dbname=calendar_service

    [pgbouncer]
    ;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
    ; POOL SETTINGS
    ;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

    ; IP address and port where pgbouncer listens
    listen_addr = 0.0.0.0
    listen_port = 6432

    ; Default number of server connections allowed per user per database
    ; For Calendar Service: 5 replicas * 25 max connections = 125 max
    default_pool_size = 25

    ; Minimum connections per pool (keep warm)
    min_pool_size = 5

    ; Maximum connections per pool
    ; Formula: (max_replicas * expected_connections) / pgbouncer_instances
    max_pool_size = 25

    ; Reserve pool for idle connections
    reserve_pool_size = 5

    ; Time (in seconds) for idle connection to be closed
    ; Keep alive for 15 minutes (production standard)
    idle_in_transaction_session_timeout = 900
    server_idle_timeout = 900

    ;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
    ; POOL MODE SELECTION
    ;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

    ; pool_mode options:
    ;   session   - One connection per client session (most connections, least pooling)
    ;   transaction - One connection per transaction (good balance)
    ;   statement - One connection per statement (extreme multiplexing, requires no session state)

    ; Calendar Service uses "transaction" mode:
    ; - Each query runs in its own transaction (safe isolation)
    ; - Multiplexes connections without losing isolation
    ; - Handles tenant isolation properly (each request is independent)
    pool_mode = transaction

    ;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
    ; AUTHENTICATION & SECURITY
    ;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

    ; User list: Database user credentials
    ; Format: "username" "password"
    user_search_path = /etc/pgbouncer

    ; Authentication template (use pgbouncer's built-in user management)
    ; require_user_auth = yes

    ;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
    ; LOGGING & MONITORING
    ;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

    ; Logging level (0=warnings, 1=info, 2=debug)
    log_connections = 1
    log_disconnections = 1
    log_pooler_errors = 1

    ; Log when client queries take too long
    log_statement = all

    ; Log file location (configurable, default stderr)
    logfile = /var/log/pgbouncer/pgbouncer.log

    ;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
    ; PERFORMANCE TUNING
    ;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

    ; Number of connections to hold in reserve pool
    ; Helps with connection storms
    reserve_pool_size = 5
    reserve_pool_timeout = 3

    ; TCP keepalive probes
    tcp_keepalives_idle = 30
    tcp_keepalives_interval = 10
    tcp_keepalives_count = 5

    ; Maximum client connections (prevent connection storms)
    max_client_conn = 1000

    ; Query timeout: 30 seconds for Calendar Service
    query_timeout = 30

    ; Cancel query timeout: 5 seconds
    query_wait_timeout = 5

    ; Idle connection close timeout
    idle_in_transaction_session_timeout = 900

    ;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
    ; STATEMENT POOLING (Optional - transaction mode)
    ;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

    ; Set this for "statement" mode to handle simple statements only
    ; enable_keepalive = true

    ; Skip query isolation if not needed (risky, disable by default)
    ; skip_query_normalization = false

    ;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
    ; ADMIN CONNECTION (Monitoring & Management)
    ;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

    ; Should be protected - use iptables or network policy
    admin_users = admin_user
    stats_users = admin_user

    ;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
    ; FAILOVER & RETRY
    ;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

    ; Connection retry attempts
    connect_timeout = 3
    server_connect_timeout = 5
    server_login_retry = 3

    ; Re-use server connections after errors
    server_reset_query = DISCARD ALL

    ;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
    ; CONNECTION POOLING SCENARIOS
    ;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

    ; Typical Calendar Service workload:
    ; - 1000 concurrent users
    ; - 50 millisecond avg query time
    ; - 100 queries per user per hour = 0.03 QPS per user
    ; - Total: ~1000 * 0.03 QPS = 30 QPS average
    ;
    ; Pool efficiency:
    ; - Without pooling: 1000 connections (expensive, slow)
    ; - With pgBouncer (transaction mode): 25-50 connections (90% reduction!)
    ;
    ; Result:
    ; - 95% reduction in PostgreSQL memory usage
    ; - 50x improvement in connection establishment
    ; - Enables multi-tenant scalability
---

# ConfigMap for user authentication
apiVersion: v1
kind: ConfigMap
metadata:
  name: pgbouncer-users
  namespace: calendar
data:
  userlist.txt: |
    "calendar_user" "$CALENDAR_DB_PASSWORD_HASH"
    "admin_user" "$ADMIN_PASSWORD_HASH"
---

# Equivalent as environment-based config (for sensitive data)
apiVersion: v1
kind: Secret
metadata:
  name: pgbouncer-secrets
  namespace: calendar
type: Opaque
stringData:
  CALENDAR_DB_PASSWORD: "${CALENDAR_DB_PASSWORD}"
  ADMIN_USER_PASSWORD: "${ADMIN_USER_PASSWORD}"
  # Note: In production, use external-secrets operator or HashiCorp Vault
