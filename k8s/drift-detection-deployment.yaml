---
# Drift Detection Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: drift-detection-service
  namespace: semlayer
  labels:
    app: drift-detection
    component: feature-engineering
    version: "3.21"
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: drift-detection
  template:
    metadata:
      labels:
        app: drift-detection
        component: feature-engineering
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: drift-detection
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: drift-service
        image: semlayer/drift-detection:3.21.0
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        env:
        - name: HOST
          value: "0.0.0.0"
        - name: PORT
          value: "8000"
        - name: WORKERS
          value: "4"
        - name: DEBUG
          value: "false"
        - name: LOG_LEVEL
          value: "INFO"
        # Database
        - name: POSTGRES_HOST
          valueFrom:
            configMapKeyRef:
              name: drift-config
              key: postgres_host
        - name: POSTGRES_PORT
          valueFrom:
            configMapKeyRef:
              name: drift-config
              key: postgres_port
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: drift-secrets
              key: postgres_user
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: drift-secrets
              key: postgres_password
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: drift-config
              key: postgres_db
        # Iceberg/Trino
        - name: TRINO_HOST
          valueFrom:
            configMapKeyRef:
              name: drift-config
              key: trino_host
        - name: TRINO_PORT
          valueFrom:
            configMapKeyRef:
              name: drift-config
              key: trino_port
        # Alerting
        - name: ALERT_WEBHOOK_URL
          valueFrom:
            secretKeyRef:
              name: drift-secrets
              key: webhook_url
              optional: true
        - name: ALERT_EMAIL_RECIPIENTS
          valueFrom:
            configMapKeyRef:
              name: drift-config
              key: alert_email_recipients
              optional: true
        - name: ALERT_PAGERDUTY_KEY
          valueFrom:
            secretKeyRef:
              name: drift-secrets
              key: pagerduty_key
              optional: true
        # Drift thresholds
        - name: KS_THRESHOLD
          value: "0.05"
        - name: PSI_THRESHOLD
          value: "0.15"
        - name: CHI2_THRESHOLD
          value: "0.10"
        - name: CLASSIFIER_THRESHOLD
          value: "0.55"
        # Resource requests and limits
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 2000m
            memory: 2Gi

        # Probes
        livenessProbe:
          httpGet:
            path: /health/live
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health/ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2

        # Security context
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL

        # Volume mounts
        volumeMounts:
        - name: tmp
          mountPath: /tmp

      volumes:
      - name: tmp
        emptyDir: {}
      # Affinity for spread
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - drift-detection
              topologyKey: kubernetes.io/hostname
---
# Service
apiVersion: v1
kind: Service
metadata:
  name: drift-detection
  namespace: semlayer
  labels:
    app: drift-detection
spec:
  type: ClusterIP
  selector:
    app: drift-detection
  ports:
  - name: http
    port: 8000
    targetPort: http
    protocol: TCP
---
# HorizontalPodAutoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: drift-detection-hpa
  namespace: semlayer
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: drift-detection-service
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 50
        periodSeconds: 30
---
# PodDisruptionBudget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: drift-detection-pdb
  namespace: semlayer
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: drift-detection
---
# ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: drift-detection
  namespace: semlayer
---
# Role
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: drift-detection
  namespace: semlayer
rules:
- apiGroups: [ "" ]
  resources: [ "configmaps" ]
  verbs: [ "get", "list", "watch" ]
---
# RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: drift-detection
  namespace: semlayer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: drift-detection
subjects:
- kind: ServiceAccount
  name: drift-detection
  namespace: semlayer
