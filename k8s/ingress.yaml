apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: semlayer-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.semlayer.com
    - temporal.semlayer.com
    secretName: semlayer-tls
  rules:
  - host: api.semlayer.com
    http:
      paths:
      - path: /ai-builder
        pathType: Prefix
        backend:
          service:
            name: ai-builder-service
            port:
              number: 8081
      - path: /compliance-engine
        pathType: Prefix
        backend:
          service:
            name: compliance-engine-service
            port:
              number: 8082
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-gateway-service
            port:
              number: 8000
  - host: temporal.semlayer.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: temporal-web
            port:
              number: 8088
