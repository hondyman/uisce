apiVersion: v1
kind: Namespace
metadata:
  name: semlayer
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: semlayer-backend-config
  namespace: semlayer
data:
  DATABASE_URL: "postgresql://semlayer:semlayer@postgres:5432/semlayer"
  REDIS_URL: "redis://redis:6379"
  TEMPORAL_SERVER: "temporal:7233"
  SHAP_SERVICE_URL: "http://shap-service:8000"
  LOG_LEVEL: "info"
  ENVIRONMENT: "production"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: semlayer-backend
  namespace: semlayer
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: semlayer-backend
  template:
    metadata:
      labels:
        app: semlayer-backend
        version: "3.20"
    spec:
      containers:
      - name: backend
        image: semlayer/backend:3.20.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 8081
          name: metrics
        envFrom:
        - configMapRef:
            name: semlayer-backend-config
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
        volumeMounts:
        - name: models
          mountPath: /models
      volumes:
      - name: models
        emptyDir:
          sizeLimit: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: semlayer-backend
  namespace: semlayer
  labels:
    app: semlayer-backend
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  - port: 8081
    targetPort: 8081
    protocol: TCP
    name: metrics
  selector:
    app: semlayer-backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shap-service
  namespace: semlayer
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: shap-service
  template:
    metadata:
      labels:
        app: shap-service
        version: "3.20"
    spec:
      containers:
      - name: shap
        image: semlayer/shap-service:3.20.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: LOG_LEVEL
          value: "info"
        - name: WORKERS
          value: "4"
        resources:
          requests:
            memory: "1Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /metrics
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: shap-service
  namespace: semlayer
  labels:
    app: shap-service
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
  selector:
    app: shap-service
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: model-retraining
  namespace: semlayer
spec:
  schedule: "0 2 * * *" # 2 AM daily
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: semlayer-jobs
          containers:
          - name: retrain
            image: semlayer/backend:3.20.0
            imagePullPolicy: IfNotPresent
            command:
            - /app/backend
            - worker
            - --job=retrain-models
            envFrom:
            - configMapRef:
                name: semlayer-backend-config
            resources:
              requests:
                memory: "4Gi"
                cpu: "2000m"
              limits:
                memory: "8Gi"
                cpu: "4000m"
          restartPolicy: OnFailure
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: semlayer-backend-hpa
  namespace: semlayer
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: semlayer-backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: semlayer-backend-pdb
  namespace: semlayer
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: semlayer-backend
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ServiceAccount
metadata:
  name: semlayer-jobs
  namespace: semlayer
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: semlayer-jobs-role
  namespace: semlayer
rules:
- apiGroups: [ "batch" ]
  resources: [ "jobs" ]
  verbs: [ "get", "list", "watch" ]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: semlayer-jobs-binding
  namespace: semlayer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: semlayer-jobs-role
subjects:
- kind: ServiceAccount
  name: semlayer-jobs
  namespace: semlayer
