version: '3.8'

services:
  # --- Core Infrastructure ---
  # postgres: (Commented out - using local postgres at host.docker.internal:5432)

  # --- StarRocks Cluster (replaces ClickHouse) ---
  starrocks-fe:
    image: starrocks/fe-ubuntu:3.3-latest
    hostname: starrocks-fe
    container_name: starrocks-fe
    ports:
      - "8030:8030"   # FE HTTP port
      - "9020:9020"   # FE RPC port
      - "9030:9030"   # MySQL protocol port (query interface)
    volumes:
      - starrocks_fe_meta:/opt/starrocks/fe/meta
      - ./backend/internal/analytics/starrocks_init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_REGION=us-east-1
    command: >
      /opt/starrocks/fe/bin/start_fe.sh
    networks:
      - semlayer-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8030/api/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  starrocks-be:
    image: starrocks/be-ubuntu:3.3-latest
    hostname: starrocks-be
    container_name: starrocks-be
    ports:
      - "8040:8040"   # BE HTTP port
      - "9060:9060"   # BE RPC port
    volumes:
      - starrocks_be_storage:/opt/starrocks/be/storage
    environment:
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_REGION=us-east-1
    command: >
      /opt/starrocks/be/bin/start_be.sh
    depends_on:
      starrocks-fe:
        condition: service_healthy
    networks:
      - semlayer-net

  # --- Nessie Catalog for Iceberg ---
  nessie:
    image: projectnessie/nessie:0.79.0
    hostname: nessie
    container_name: nessie
    ports:
      - "19120:19120"
    environment:
      - NESSIE_VERSION_STORE_TYPE=ROCKSDB
      - QUARKUS_HTTP_PORT=19120
    volumes:
      - nessie_data:/data
    networks:
      - semlayer-net

  # --- Object Storage ---
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9002:9000" # API
      - "9003:9001" # Console
    volumes:
      - minio_data:/data
    networks:
      - semlayer-net

  # Create default buckets
  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing myminio/lakehouse;
      mc mb --ignore-existing myminio/artifacts;
      mc anonymous set download myminio/lakehouse;
      exit 0;
      "
    networks:
      - semlayer-net

  # --- Temporal ---
  temporal:
    image: temporalio/auto-setup:latest
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PWD=password
      - POSTGRES_SEEDS=postgres
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development.yaml
    ports:
      - "7233:7233"
    networks:
      - semlayer-net

  temporal-ui:
    image: temporalio/ui:latest
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    ports:
      - "8088:8080"
    depends_on:
      - temporal
    networks:
      - semlayer-net

  # --- Application Services ---
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["./server"]
    environment:
      - DATABASE_URL=postgres://postgres:postgres@host.docker.internal:5432/alpha?sslmode=disable
      - TEMPORAL_HOST_PORT=temporal:7233
      # StarRocks connection (MySQL protocol)
      - STARROCKS_DSN=root:@tcp(starrocks-fe:9030)/
      # Iceberg catalog
      - ICEBERG_CATALOG_URI=http://nessie:19120/api/v1
      - ICEBERG_WAREHOUSE=s3://lakehouse/warehouse
      # S3/MinIO
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
    ports:
      - "8080:8080"
    depends_on:
      starrocks-fe:
        condition: service_healthy
      temporal:
        condition: service_started
      minio:
        condition: service_started
      nessie:
        condition: service_started
    networks:
      - semlayer-net

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["./worker"]
    environment:
      - DATABASE_URL=postgres://postgres:postgres@host.docker.internal:5432/alpha?sslmode=disable
      - TEMPORAL_HOST_PORT=temporal:7233
      - STARROCKS_DSN=root:@tcp(starrocks-fe:9030)/
      - ICEBERG_CATALOG_URI=http://nessie:19120/api/v1
      - ICEBERG_WAREHOUSE=s3://lakehouse/warehouse
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
    depends_on:
      starrocks-fe:
        condition: service_healthy
      temporal:
        condition: service_started
      minio:
        condition: service_started
      nessie:
        condition: service_started
    networks:
      - semlayer-net

networks:
  semlayer-net:
    driver: bridge

volumes:
  starrocks_fe_meta:
  starrocks_be_storage:
  nessie_data:
  minio_data:
