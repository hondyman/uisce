services:
  # --- Core Infrastructure ---
  # Postgres is intentionally excluded as it is running locally on the host.

  # --- StarRocks Cluster (Lakehouse Analytics) ---
  starrocks-fe:
    image: starrocks/fe-ubuntu:3.3-latest
    hostname: starrocks-fe
    container_name: starrocks-fe
    command: ["/bin/bash", "-c", "/opt/starrocks/fe/bin/start_fe.sh && tail -f /dev/null"]
    ports:
      - "8030:8030"   # FE HTTP port
      - "9020:9020"   # FE RPC port
      - "9030:9030"   # MySQL protocol port (query interface)
    volumes:
      - starrocks_fe_meta:/opt/starrocks/fe/meta
    environment:
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_REGION=us-east-1
    networks:
      - semlayer-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8030/api/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  starrocks-be:
    image: starrocks/be-ubuntu:3.3-latest
    hostname: starrocks-be
    container_name: starrocks-be
    command: ["/bin/bash", "-c", "/opt/starrocks/be/bin/start_be.sh && tail -f /dev/null"]
    ports:
      - "8040:8040"   # BE HTTP port
      - "9060:9060"   # BE RPC port
    volumes:
      - starrocks_be_storage:/opt/starrocks/be/storage
    environment:
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_REGION=us-east-1
    depends_on:
      starrocks-fe:
        condition: service_healthy
    networks:
      - semlayer-net

  # --- Nessie Catalog for Iceberg ---
  nessie:
    image: ghcr.io/projectnessie/nessie:0.105.0
    hostname: nessie
    container_name: nessie
    ports:
      - "19120:19120"
    environment:
      - NESSIE_VERSION_STORE_TYPE=ROCKSDB
      - QUARKUS_HTTP_PORT=19120
    volumes:
      - nessie_data:/data
    networks:
      - semlayer-net

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9002:9000" # API
      - "9003:9001" # Console
    volumes:
      - minio_data:/data
    networks:
      - semlayer-net

  # Create default buckets for Iceberg
  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing myminio/lakehouse;
      mc mb --ignore-existing myminio/artifacts;
      exit 0;
      "
    networks:
      - semlayer-net

  # --- Temporal ---
  temporal:
    image: temporalio/auto-setup:latest
    environment:
      - DB=postgres12_pgx
      - DB_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PWD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_SEEDS=host.docker.internal
    ports:
      - "7233:7233"
    networks:
      - semlayer-net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  temporal-ui:
    image: temporalio/ui:latest
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    ports:
      - "8088:8080"
    depends_on:
      - temporal
    networks:
      - semlayer-net

  # --- Hasura GraphQL Engine ---
  hasura:
    image: hasura/graphql-engine:v2.37.0.cli-migrations-v3
    hostname: hasura
    container_name: semlayer-hasura
    environment:
      - HASURA_GRAPHQL_DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@host.docker.internal:5432/alpha
      - HASURA_GRAPHQL_ADMIN_SECRET=${HASURA_ADMIN_SECRET:-myadminsecretkey}
      - HASURA_GRAPHQL_DEV_MODE=true
      - HASURA_GRAPHQL_ENABLE_CONSOLE=true
      - HASURA_GRAPHQL_CORS_DOMAIN=*
      - HASURA_GRAPHQL_ENABLED_LOG_TYPES=startup,http-log,webhook-log,websocket-log
      - HASURA_GRAPHQL_UNAUTHORIZED_ROLE=anonymous
    ports:
      - "8081:8080"
    networks:
      - semlayer-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # --- Application Services ---
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["./server"]
    environment:
      - HASURA_GRAPHQL_ADMIN_SECRET=${HASURA_ADMIN_SECRET:-myadminsecretkey}
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@host.docker.internal:5432/alpha?sslmode=disable
      - TEMPORAL_HOST_PORT=temporal:7233
      # NBA ML Service
      - NBA_ML_SERVICE_URL=http://nba-ml-service:8000
      # StarRocks connection (MySQL protocol)
      - STARROCKS_HOST=starrocks-fe
      - STARROCKS_PORT=9030
      - STARROCKS_USER=root
      - STARROCKS_PASSWORD=
      # Iceberg catalog
      - ICEBERG_CATALOG_URI=http://nessie:19120/api/v1
      - ICEBERG_WAREHOUSE=s3://lakehouse/warehouse
      # S3/MinIO
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      starrocks-fe:
        condition: service_started
      temporal:
        condition: service_started
      minio:
        condition: service_started
      nessie:
        condition: service_started
    networks:
      - semlayer-net

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["./worker"]
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@host.docker.internal:5432/alpha?sslmode=disable
      - TEMPORAL_HOST_PORT=temporal:7233
      # StarRocks connection (MySQL protocol)
      - STARROCKS_HOST=starrocks-fe
      - STARROCKS_PORT=9030
      - STARROCKS_USER=root
      - STARROCKS_PASSWORD=
      # Iceberg catalog
      - ICEBERG_CATALOG_URI=http://nessie:19120/api/v1
      - ICEBERG_WAREHOUSE=s3://lakehouse/warehouse
      # S3/MinIO
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      starrocks-fe:
        condition: service_healthy
      temporal:
        condition: service_started
      minio:
        condition: service_started
      nessie:
        condition: service_started
    networks:
      - semlayer-net

  # --- NBA ML Service (AI Inference) ---
  nba-ml-service:
    build:
      context: ./services/nba-ml-service
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@host.docker.internal:5432/alpha?sslmode=disable
      - MODEL_PATH=/app/models/nba_model.pt
      - MIN_CONFIDENCE_THRESHOLD=0.5
      - MAX_BATCH_SIZE=32
      - INFERENCE_TIMEOUT=30
      - LOG_LEVEL=INFO
    ports:
      - "8085:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - nba_models:/app/models
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - semlayer-net

  # --- Cube.js Universal Semantic Layer ---
  cube:
    image: cubejs/cube:latest
    container_name: cube-semantic-layer
    ports:
      - "4000:4000"    # REST API
      - "15432:15432"  # SQL API (PostgreSQL wire protocol)
    environment:
      # Multiple data sources
      - CUBEJS_DATASOURCES=starrocks,trino
      
      # StarRocks (Hot/Real-time tier) - MySQL protocol
      - CUBEJS_DS_STARROCKS_DB_TYPE=mysql
      - CUBEJS_DS_STARROCKS_DB_HOST=starrocks-fe
      - CUBEJS_DS_STARROCKS_DB_PORT=9030
      - CUBEJS_DS_STARROCKS_DB_NAME=iceberg_catalog.wealth
      - CUBEJS_DS_STARROCKS_DB_USER=root
      - CUBEJS_DS_STARROCKS_DB_PASS=
      
      # Trino (Cold tier - Parquet/Iceberg lake)
      - CUBEJS_DS_TRINO_DB_TYPE=trino
      - CUBEJS_DS_TRINO_DB_HOST=trino
      - CUBEJS_DS_TRINO_DB_PORT=8080
      - CUBEJS_DS_TRINO_DB_CATALOG=iceberg
      - CUBEJS_DS_TRINO_DB_SCHEMA=wealth
      - CUBEJS_DS_TRINO_DB_USER=admin
      
      # StarRocks as HA Pre-aggregation Storage (instead of Cube Store)
      - CUBEJS_EXT_DB_TYPE=mysql
      - CUBEJS_EXT_DB_HOST=starrocks-fe
      - CUBEJS_EXT_DB_PORT=9030
      - CUBEJS_EXT_DB_NAME=cube_preaggs
      - CUBEJS_EXT_DB_USER=root
      - CUBEJS_EXT_DB_PASS=
      
      # Governance: Enforce rollup-only mode (protect Trino lake)
      - CUBEJS_ROLLUP_ONLY=true
      - CUBE_TENANT_CONFIG_PATH=/cube/conf/generated/tenant-scopes.json
      - CUBE_SLO_LATENCY_THRESHOLD_SECONDS=${CUBE_SLO_LATENCY_THRESHOLD_SECONDS:-1}
      - CUBE_SLO_ROLLUP_TARGET_PERCENT=${CUBE_SLO_ROLLUP_TARGET_PERCENT:-85}
      
      # Multi-tenancy & security
      - CUBEJS_DEV_MODE=false
      - CUBEJS_API_SECRET=${CUBE_API_SECRET:-dev-secret-change-in-production}
      - CUBEJS_SCHEDULED_REFRESH_TIMER=true
      
      # Performance
      - CUBEJS_CACHE_AND_QUEUE_DRIVER=memory
      - CUBEJS_REFRESH_WORKER=true
      - CUBEJS_CONCURRENCY=4
      
      # SQL API for BI tools
      - CUBEJS_SQL_PORT=15432
      - CUBEJS_PG_SQL_PORT=15432
      
      # Logging
      - CUBEJS_LOG_LEVEL=info
      - DEBUG=cube*

      # Postgres connection for Cube (metadata/caching if configured to use PG, though usually it uses internal or Redis)
      # Adding host.docker.internal just in case it needs to talk to the main DB
      - CUBEJS_DB_HOST=host.docker.internal
      
    volumes:
      - ./cube/schema:/cube/conf/schema
      - ./cube/cube.js:/cube/conf/cube.js
      - ./cube/generated:/cube/conf/generated
    depends_on:
      starrocks-fe:
        condition: service_healthy
      minio:
        condition: service_started
      nessie:
        condition: service_started
    networks:
      - semlayer-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/readyz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  semlayer-net:
    driver: bridge

volumes:
  starrocks_fe_meta:
  starrocks_be_storage:
  nessie_data:
  minio_data:
  nba_models:
  cube_schema:
