# Cube.js Local Development Environment
# Phase 9: Developer Experience - Local Sandbox
#
# Usage:
#   docker-compose -f docker-compose.dev.yml up -d
#
# This starts:
#   - Cube.js API server (port 4000)
#   - Cube.js Playground UI (port 4000)
#   - Redis for query orchestration
#   - StarRocks (single-node) for pre-aggregations
#   - Mock JWT issuer for local auth testing
#   - Prometheus for metrics scraping
#   - Grafana for dashboards

version: "3.8"

services:
  # ==========================================================================
  # CUBE.JS STACK
  # ==========================================================================
  
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - cube-dev

  cube:
    image: cubejs/cube:latest
    environment:
      # Dev mode enables playground
      - CUBEJS_DEV_MODE=true
      - CUBEJS_API_SECRET=${CUBEJS_API_SECRET:-dev-secret-change-me}
      - CUBEJS_REDIS_URL=redis://redis:6379
      
      # Expose metrics for Prometheus
      - CUBEJS_TELEMETRY=false
      
      # Schema paths
      - CUBEJS_SCHEMA_PATH=/cube/conf/schema
      - CUBE_TENANT_CONFIG_PATH=/cube/conf/generated/tenant-scopes.json
      
      # Governance: require pre-aggregations
      - CUBEJS_ROLLUP_ONLY=${CUBEJS_ROLLUP_ONLY:-false}
      
      # Data sources
      - CUBEJS_DATASOURCES=starrocks
      
      # StarRocks connection
      - CUBEJS_DB_TYPE=mysql
      - CUBEJS_DB_HOST=starrocks-fe
      - CUBEJS_DB_PORT=9030
      - CUBEJS_DB_USER=root
      - CUBEJS_DB_PASS=
      - CUBEJS_DB_NAME=cube_dev
      
      # External pre-aggregation storage (StarRocks)
      - CUBEJS_EXT_DB_TYPE=mysql
      - CUBEJS_EXT_DB_HOST=starrocks-fe
      - CUBEJS_EXT_DB_PORT=9030
      - CUBEJS_EXT_DB_USER=root
      - CUBEJS_EXT_DB_PASS=
      - CUBEJS_EXT_DB_NAME=cube_preagg
      
      # SQL API (Postgres wire protocol)
      - CUBEJS_SQL_PORT=15432
      - CUBEJS_PG_SQL_PORT=15432
      
      # JWT settings for local dev
      - CUBEJS_JWT_KEY=${CUBEJS_JWT_KEY:-}
      - CUBEJS_JWT_ISSUER=${CUBEJS_JWT_ISSUER:-http://mock-jwt:8080}
      - CUBEJS_JWT_AUDIENCE=${CUBEJS_JWT_AUDIENCE:-cube-api}
      - CUBEJS_JWT_ALGORITHMS=RS256
      
      # SLO thresholds
      - CUBE_SLO_LATENCY_THRESHOLD_SECONDS=1.0
      - CUBE_SLO_ROLLUP_TARGET_PERCENT=85
    volumes:
      - ../../cube:/cube/conf:ro
      - cube_cache:/cube/cache
    ports:
      - "4000:4000"   # REST/GraphQL API + Playground
      - "15432:15432" # SQL API (Postgres wire)
    depends_on:
      redis:
        condition: service_healthy
      starrocks-fe:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4000/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cube-dev
    labels:
      - "prometheus.scrape=true"
      - "prometheus.port=4000"
      - "prometheus.path=/metrics"

  cube-refresh:
    image: cubejs/cube:latest
    command: ["node", "index.js", "--refresh-worker"]
    environment:
      - CUBEJS_DEV_MODE=true
      - CUBEJS_API_SECRET=${CUBEJS_API_SECRET:-dev-secret-change-me}
      - CUBEJS_REDIS_URL=redis://redis:6379
      - CUBEJS_SCHEMA_PATH=/cube/conf/schema
      - CUBE_TENANT_CONFIG_PATH=/cube/conf/generated/tenant-scopes.json
      - CUBEJS_DB_TYPE=mysql
      - CUBEJS_DB_HOST=starrocks-fe
      - CUBEJS_DB_PORT=9030
      - CUBEJS_DB_USER=root
      - CUBEJS_DB_PASS=
      - CUBEJS_DB_NAME=cube_dev
      - CUBEJS_EXT_DB_TYPE=mysql
      - CUBEJS_EXT_DB_HOST=starrocks-fe
      - CUBEJS_EXT_DB_PORT=9030
      - CUBEJS_EXT_DB_USER=root
      - CUBEJS_EXT_DB_PASS=
      - CUBEJS_EXT_DB_NAME=cube_preagg
    volumes:
      - ../../cube:/cube/conf:ro
      - cube_cache:/cube/cache
    depends_on:
      redis:
        condition: service_healthy
      starrocks-fe:
        condition: service_healthy
    networks:
      - cube-dev

  # ==========================================================================
  # STARROCKS (SINGLE-NODE DEV)
  # ==========================================================================
  
  starrocks-fe:
    image: starrocks/fe-ubuntu:3.1.4
    hostname: starrocks-fe
    environment:
      - FE_HTTP_PORT=8030
      - FE_RPC_PORT=9020
      - FE_QUERY_PORT=9030
      - FE_EDIT_LOG_PORT=9010
    ports:
      - "8030:8030"   # HTTP UI
      - "9030:9030"   # MySQL protocol
    volumes:
      - starrocks_fe_data:/opt/starrocks/fe/meta
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8030/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - cube-dev

  starrocks-be:
    image: starrocks/be-ubuntu:3.1.4
    hostname: starrocks-be
    environment:
      - BE_HTTP_PORT=8040
      - BE_RPC_PORT=9050
      - BE_BRPC_PORT=8060
      - BE_HEARTBEAT_PORT=9050
      - FE_SERVERS=starrocks-fe:9010
    volumes:
      - starrocks_be_data:/opt/starrocks/be/storage
    depends_on:
      starrocks-fe:
        condition: service_healthy
    networks:
      - cube-dev

  # Initialize StarRocks databases
  starrocks-init:
    image: mysql:8
    command: >
      sh -c "
        sleep 30 &&
        mysql -h starrocks-fe -P 9030 -u root -e '
          CREATE DATABASE IF NOT EXISTS cube_dev;
          CREATE DATABASE IF NOT EXISTS cube_preagg;
          CREATE DATABASE IF NOT EXISTS telemetry;
        '
      "
    depends_on:
      starrocks-fe:
        condition: service_healthy
    networks:
      - cube-dev
    restart: "no"

  # ==========================================================================
  # MOCK JWT ISSUER (FOR LOCAL AUTH TESTING)
  # ==========================================================================
  
  mock-jwt:
    image: ghcr.io/navikt/mock-oauth2-server:0.5.8
    ports:
      - "8081:8080"
    environment:
      - SERVER_PORT=8080
      - JSON_CONFIG={"interactiveLogin":true,"tokenCallbacks":[{"issuerId":"default","tokenExpiry":3600,"requestMappings":[{"requestParam":"scope","match":"*","claims":{"tenant_id":"{{random-uuid}}","datasource_id":"default","user_id":"dev-user","role":"admin"}}]}]}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/.well-known/openid-configuration"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - cube-dev

  # ==========================================================================
  # OBSERVABILITY STACK
  # ==========================================================================
  
  prometheus:
    image: prom/prometheus:v2.47.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../../infra/prometheus/alerting-rules.yaml:/etc/prometheus/rules/alerting-rules.yaml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    networks:
      - cube-dev

  grafana:
    image: grafana/grafana:10.1.0
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ../../grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ../../grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - cube-dev

  # ==========================================================================
  # CUBE PARITY SERVICE (FOR MIGRATION TESTING)
  # ==========================================================================
  
  cube-parity:
    build:
      context: ../../backend
      dockerfile: Dockerfile.parity
    ports:
      - "8090:8090"
    environment:
      - PORT=8090
      - DATABASE_URL=postgres://postgres:postgres@100.84.126.19:5432/alpha?sslmode=disable
      - PARITY_TOLERANCE=0.0001
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8090/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - cube-dev
    labels:
      - "prometheus.scrape=true"
      - "prometheus.port=8090"
      - "prometheus.path=/metrics"

networks:
  cube-dev:
    driver: bridge

volumes:
  redis_data:
  cube_cache:
  starrocks_fe_data:
  starrocks_be_data:
  prometheus_data:
  grafana_data:
