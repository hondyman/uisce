version: "3.8"

services:
  # Redis for Cube.js orchestration
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Cube.js API Node 1
  cube_api_1:
    image: cubejs/cube:latest
    environment:
      - CUBEJS_DEV_MODE=true
      - CUBEJS_API_SECRET=${CUBEJS_API_SECRET:-devsecret}
      - CUBEJS_REDIS_URL=redis://redis:6379
      
      # Governance
      - CUBEJS_ROLLUP_ONLY=true
      
      # Data sources
      - CUBEJS_DATASOURCES=trino
      
      # Trino (cold tier)
      - CUBEJS_DS_TRINO_DB_TYPE=trino
      - CUBEJS_DS_TRINO_HOST=${TRINO_HOST:-localhost}
      - CUBEJS_DS_TRINO_PORT=${TRINO_PORT:-8080}
      - CUBEJS_DS_TRINO_CATALOG=${TRINO_CATALOG:-iceberg}
      - CUBEJS_DS_TRINO_SCHEMA=${TRINO_SCHEMA:-default}
    volumes:
      - ./:/cube/conf
    ports:
      - "4000:4000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/readyz"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Cube.js API Node 2 (for load balancing)
  cube_api_2:
    image: cubejs/cube:latest
    environment:
      - CUBEJS_DEV_MODE=true
      - CUBEJS_API_SECRET=${CUBEJS_API_SECRET:-devsecret}
      - CUBEJS_REDIS_URL=redis://redis:6379
      - CUBEJS_ROLLUP_ONLY=true
      - CUBEJS_DATASOURCES=starrocks,trino
      - CUBEJS_DS_STARROCKS_DB_TYPE=starrocks
      - CUBEJS_DS_STARROCKS_HOST=${STARROCKS_HOST:-localhost}
      - CUBEJS_DS_STARROCKS_PORT=${STARROCKS_PORT:-9030}
      - CUBEJS_DS_STARROCKS_USER=${STARROCKS_USER:-root}
      - CUBEJS_DS_STARROCKS_PASSWORD=${STARROCKS_PASSWORD}
      - CUBEJS_DS_STARROCKS_DATABASE=${STARROCKS_DATABASE:-semantic_layer}
      - CUBEJS_DS_TRINO_DB_TYPE=trino
      - CUBEJS_DS_TRINO_HOST=${TRINO_HOST:-localhost}
      - CUBEJS_DS_TRINO_PORT=${TRINO_PORT:-8080}
      - CUBEJS_DS_TRINO_CATALOG=${TRINO_CATALOG:-iceberg}
      - CUBEJS_DS_TRINO_SCHEMA=${TRINO_SCHEMA:-default}
    volumes:
      - ./:/cube/conf
    depends_on:
      redis:
        condition: service_healthy

  # Cube.js Refresh Worker (hot lane)
  cube_refresh_hot:
    image: cubejs/cube:latest
    command: ["node", "index.js", "--refresh-worker"]
    environment:
      - CUBEJS_DEV_MODE=true
      - CUBEJS_API_SECRET=${CUBEJS_API_SECRET:-devsecret}
      - CUBEJS_REDIS_URL=redis://redis:6379
      - CUBEJS_ROLLUP_ONLY=true
      - CUBEJS_DATASOURCES=trino
      - CUBEJS_DS_TRINO_DB_TYPE=trino
      - CUBEJS_DS_TRINO_HOST=${TRINO_HOST:-localhost}
      - CUBEJS_DS_TRINO_PORT=${TRINO_PORT:-8080}
      - HOT_LANE=true
    volumes:
      - ./:/cube/conf
    depends_on:
      redis:
        condition: service_healthy

  # Cube.js Refresh Worker (cold lane)  
  cube_refresh_cold:
    image: cubejs/cube:latest
    command: ["node", "index.js", "--refresh-worker"]
    environment:
      - CUBEJS_DEV_MODE=true
      - CUBEJS_API_SECRET=${CUBEJS_API_SECRET:-devsecret}
      - CUBEJS_REDIS_URL=redis://redis:6379
      - CUBEJS_ROLLUP_ONLY=true
      - CUBEJS_DATASOURCES=trino
      - CUBEJS_DS_TRINO_DB_TYPE=trino
      - CUBEJS_DS_TRINO_HOST=${TRINO_HOST:-localhost}
      - CUBEJS_DS_TRINO_PORT=${TRINO_PORT:-8080}
      - COLD_LANE=true
    volumes:
      - ./:/cube/conf
    depends_on:
      redis:
        condition: service_healthy

  # Traefik edge proxy for load balancing
  proxy:
    image: traefik:v3.0
    command:
      - --api.dashboard=true
      - --providers.docker=true
      - --entrypoints.web.address=:80
      - --providers.docker.exposedbydefault=false
    ports:
      - "80:80"
      - "8080:8080"  # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cube.rule=Host(`cube.local`)"
      - "traefik.http.routers.cube.service=cube"
      - "traefik.http.services.cube.loadbalancer.server.port=4000"
      - "traefik.http.services.cube.loadbalancer.healthcheck.path=/readyz"
      - "traefik.http.services.cube.loadbalancer.healthcheck.interval=5s"
    depends_on:
      - cube_api_1
      - cube_api_2

volumes:
  redis_data:
