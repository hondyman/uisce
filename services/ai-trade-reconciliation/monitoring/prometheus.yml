global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'atr-monitor'

scrape_configs:
- job_name: 'prometheus'
  static_configs:
  - targets: [ 'localhost:9090' ]

- job_name: 'atr-backend'
  static_configs:
  - targets: [ 'atr-backend:8080' ]
  metrics_path: '/metrics'
  scrape_interval: 10s
  scrape_timeout: 5s

- job_name: 'postgres'
  static_configs:
  - targets: [ 'atr-db:5432' ]
  scrape_interval: 30s

alerting:
  alertmanagers:
  - static_configs:
    - targets: []

rule_files:
- '/etc/prometheus/rules/*.yml'
