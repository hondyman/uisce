    restart: unless-stopped
    networks:
      - semlayer-net

  catalog-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile.catalog-worker
    container_name: semlayer-catalog-worker-1
    environment:
      - DATABASE_URL=postgres://postgres:postgres@host.docker.internal:5432/alpha?sslmode=disable
