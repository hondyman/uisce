services:
  # Dedicated Postgres for Trino/Iceberg Metastore
  metastore-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: metastore
    networks:
      - semlayer-net
    ports:
      - "${METASTORE_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redpanda - Kafka-API compatible streaming (no ZooKeeper needed!)
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    command:
      - redpanda start
      - --overprovisioned
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --node-id 0
      - --check=false
      - --kafka-addr PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr PLAINTEXT://redpanda:9092,OUTSIDE://localhost:19092
      - --pandaproxy-addr 0.0.0.0:8082
      - --advertise-pandaproxy-addr localhost:8082
      - --schema-registry-addr 0.0.0.0:8081
    networks:
      - semlayer-net
    ports:
      - "${REDPANDA_KAFKA_PORT:-9092}:9092"
      - "${REDPANDA_OUTSIDE_PORT:-19092}:19092"
      - "${REDPANDA_ADMIN_PORT:-9644}:9644"
      - "${REDPANDA_SCHEMA_PORT:-8081}:8081"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 5



  # Redpanda Console (optional, for UI)
  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:latest
    networks:
      - semlayer-net
    ports:
      - "${REDPANDA_CONSOLE_PORT:-8096}:8080"
    environment:
      KAFKA_BROKERS: redpanda:9092
      KAFKA_SCHEMAREGISTRY_ENABLED: "true"
      KAFKA_SCHEMAREGISTRY_URLS: http://redpanda:8081
    depends_on:
      - redpanda

  debezium:
    image: debezium/connect:2.3
    environment:
      BOOTSTRAP_SERVERS: redpanda:9092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: debezium_configs
      OFFSET_STORAGE_TOPIC: debezium_offsets
      STATUS_STORAGE_TOPIC: debezium_status
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_REST_ADVERTISED_HOST_NAME: debezium
    networks:
      - semlayer-net
    ports:
      - "${DEBEZIUM_PORT:-8083}:8083"
    depends_on:
      - redpanda


  kafka-connect-iceberg:
    build:
      context: .
      dockerfile: backend/Dockerfile.kafka-connect-iceberg
    environment:
      BOOTSTRAP_SERVERS: redpanda:9092
      GROUP_ID: iceberg-connect
      CONFIG_STORAGE_TOPIC: iceberg_connect_configs
      OFFSET_STORAGE_TOPIC: iceberg_connect_offsets
      STATUS_STORAGE_TOPIC: iceberg_connect_status
      KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      VALUE_CONVERTER: io.confluent.connect.avro.AvroConverter
      VALUE_CONVERTER_SCHEMA_REGISTRY_URL: http://redpanda:8081
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect-iceberg
      CONNECT_REST_PORT: 8083
      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    networks:
      - semlayer-net
    ports:
      - "${KAFKA_CONNECT_ICEBERG_PORT:-8098}:8083"
    depends_on:
      - redpanda
      - minio


  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    networks:
      - semlayer-net
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - miniodata:/data

  redis:
    image: redis:7-alpine
    container_name: semlayer-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - semlayer-net

  risingwave:
    image: risingwavelabs/risingwave:latest
    command: ["risingwave", "standalone"]
    networks:
      - semlayer-net
    ports:
      - "${RISINGWAVE_PORT:-4566}:4566"
    depends_on: [redpanda]

  trino:
    image: trinodb/trino:latest
    networks:
      - semlayer-net
    ports:
      - "${TRINO_PORT:-8084}:8080"
    volumes:
      - ./trino/etc/catalog:/etc/trino/catalog
    depends_on: [minio]

  cube:
    image: cubejs/cube:latest
    environment:
      CUBEJS_API_SECRET: devsecret
      CUBEJS_DEV_MODE: "true"
      CUBEJS_LOG_LEVEL: trace
      DEBUG_LOG: "true"
      CUBEJS_DATASOURCES: trino
      CUBEJS_DS_TRINO_HOST: trino
      CUBEJS_DS_TRINO_PORT: 8080
      CUBEJS_DS_TRINO_CATALOG: iceberg
      CUBEJS_DS_TRINO_SCHEMA: default
      CUBEJS_PG_SQL_PORT: 5432
    networks:
      - semlayer-net
    ports:
      - "${CUBE_API_PORT:-4000}:4000"
      - "${CUBE_PG_PORT:-15432}:5432"
    volumes:
      - ./services/cube-semantic/model:/cube/conf/model:ro
      - ./services/cube-semantic/cube.js:/cube/conf/cube.js:ro
    depends_on: [trino]

  hasura:
    image: hasura/graphql-engine:v2.33.0
    networks:
      - semlayer-net
    ports:
      - "${HASURA_PORT:-8085}:8080"
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgres://postgres:postgres@host.docker.internal:5432/alpha
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
      HASURA_GRAPHQL_DEV_MODE: "true"
      HASURA_GRAPHQL_ADMIN_SECRET: myadminsecret
      HASURA_GRAPHQL_JWT_SECRET: '{"type":"HS256", "key":"${JWT_SECRET:-dev-jwt-secret-key-change-in-production}"}'
      BACKEND_URL: http://backend:8080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # depends_on:
    #   - postgres

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    networks:
      - semlayer-net
    ports:
      - "${BACKEND_PORT:-8082}:8080"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@host.docker.internal:5432/alpha?sslmode=disable
      - PORT=8080
      - HASURA_URL=http://hasura:8080/v1/graphql
      - HASURA_ADMIN_SECRET=myadminsecret
      - REDIS_ADDR=redis:6379
      - TEMPORAL_HOSTPORT=temporal:7233
      - KAFKA_BROKERS=redpanda:9092
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret-key-change-in-production}
    # depends_on:
    #   - postgres

    restart: unless-stopped


  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    networks:
      - semlayer-net
    ports:
      - "${API_GATEWAY_PORT:-8001}:8001"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@host.docker.internal:5432/alpha?sslmode=disable
      - BACKEND_URL=http://backend:8080
      - AUTH_SERVICE_URL=http://auth-service:8001
      - HASURA_URL=http://hasura:8080/v1/graphql
      - HASURA_ADMIN_SECRET=myadminsecret
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret-key-change-in-production}
      - REDIS_ADDR=redis:6379
      - TEMPORAL_HOSTPORT=temporal:7233
      - KAFKA_BROKERS=redpanda:9092
      - PORT=8001
      - DEV_ALLOW_UNAUTH_FABRIC=false
      - DEV_ALLOW_UNAUTH_MODELS=false
      - DEV_ALLOW_UNAUTH_CATALOG=false
      - DEV_ALLOW_UNAUTH_XUSER=false
      - ENABLE_SECURITY=true
    restart: unless-stopped
    depends_on:
      - backend
      - auth-service
      # - postgres

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    networks:
      - semlayer-net
    ports:
      - "${AUTH_SERVICE_PORT:-3001}:8001"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_HOST=host.docker.internal
      - POSTGRES_PORT=5432
      - POSTGRES_DB=alpha
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret-key-change-in-production}
      - JWT_EXPIRY=1h
      - REFRESH_TOKEN_EXPIRY=24h
      - AUTH_SERVICE_PORT=8001
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:5174
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

  bp-backend:
    build:
      context: ./bp-backend
      dockerfile: Dockerfile
    networks:
      - semlayer-net
    ports:
      - "${BP_BACKEND_PORT:-8086}:8080"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@host.docker.internal:5432/alpha?sslmode=disable
      - PORT=8080
      - REDIS_ADDR=redis:6379
      - TEMPORAL_HOSTPORT=temporal:7233
      - KAFKA_BROKERS=redpanda:9092
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret-key-change-in-production}
      - ENABLE_SECURITY=true
      - JWT_ENFORCE=true
    restart: unless-stopped
    # depends_on:
    #   - postgres

