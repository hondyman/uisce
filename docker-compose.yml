  snapshot-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.snapshot-worker
    container_name: semlayer-snapshot-worker-1
    environment:
      - DATABASE_URL=postgres://postgres:postgres@host.docker.internal:5432/alpha?sslmode=disable
      - KAFKA_BROKERS=redpanda:9092
    depends_on:
