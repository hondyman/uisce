services:
  hasura:
    image: hasura/graphql-engine:v2.37.0.cli-migrations-v3
    environment:
      HASURA_GRAPHQL_DATABASE_URL: "${POSTGRES_URL:-postgresql://postgres:postgres@host.docker.internal:5433/alpha?sslmode=disable}"
      HASURA_GRAPHQL_ADMIN_SECRET: "${HASURA_ADMIN_SECRET:-adminsecret}"
      HASURA_GRAPHQL_DEV_MODE: "true"
      HASURA_GRAPHQL_CORS_DOMAIN: "*"
    ports:
      - "8080:8080"

  rule-engine:
    build:
      context: .
      dockerfile: backend/cmd/rule-engine-service/Dockerfile
    environment:
      PORT: 8083
      DATABASE_URL: "${POSTGRES_URL:-postgresql://postgres:postgres@host.docker.internal:5433/alpha?sslmode=disable}"
      RABBITMQ_URL: "amqp://guest:guest@host.docker.internal:5672/"
    ports:
      - "8083:8083"
    depends_on:
      - hasura

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/auto-setup:latest
    environment:
      DB: postgres12
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
      POSTGRES_HOST: host.docker.internal
      DB_PORT: 5433
      TEMPORAL_BROADCAST_ADDRESS: temporal
    ports:
      - "7233:7233"
      - "6933:6933"
    healthcheck:
      test: ["CMD", "temporal", "workflow", "list", "--address", "localhost:7233", "--limit", "1"]
      interval: 10s
      timeout: 5s
      retries: 5

  temporal-ui:
    image: temporalio/ui:latest
    ports:
      - "8081:8080"
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      - temporal

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      PORT: ${PORT:-3000}
      HASURA_URL: http://hasura:8080
      HASURA_ADMIN_SECRET: ${HASURA_ADMIN_SECRET:-adminsecret}
    ports:
      - "3000:3000"
    depends_on:
      - hasura
      - rabbitmq
      - temporal

  workflow-service:
    build:
      context: .
      dockerfile: backend/cmd/workflow-service/Dockerfile
    environment:
      HASURA_URL: http://hasura:8080
      HASURA_ADMIN_SECRET: ${HASURA_ADMIN_SECRET:-adminsecret}
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      WORKFLOW_SERVICE_PORT: 8082
    ports:
      - "8082:8082"
    depends_on:
      - hasura
      - rabbitmq
      - temporal

  screen-builder-service:
    build:
      context: .
      dockerfile: backend/cmd/screen-builder-service/Dockerfile
    environment:
      HASURA_URL: http://hasura:8080
      HASURA_ADMIN_SECRET: ${HASURA_ADMIN_SECRET:-adminsecret}
      SCREEN_BUILDER_SERVICE_PORT: 8083
    ports:
      - "8084:8083"
    depends_on:
      - hasura

  proxy:
    build:
      context: .
      dockerfile: backend/local/Dockerfile
    environment:
      PROXY_LISTEN: ":29080"
      RULE_ENGINE_URL: "http://rule-engine:8083"
      BACKEND_URL: "http://backend:3000"
      HASURA_URL: "http://hasura:8080"
    ports:
      - "29080:29080"
    depends_on:
      - rule-engine
      - hasura

networks:
  default:
    name: semlayer_local
    driver: bridge

volumes:
  rabbitmq_data:
