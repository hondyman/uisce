# Rule Engine Helm Values
# ABAC policy evaluation and rule processing service

replicaCount: 3

image:
  repository: semlayerprodacr.azurecr.io/semlayer/rule-engine
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9090"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
    - ALL

service:
  type: ClusterIP
  port: 8080
  metricsPort: 9090
  grpcPort: 9091

ingress:
  enabled: false

resources:
  limits:
    cpu: "2"
    memory: 4Gi
  requests:
    cpu: "500m"
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 15
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15

nodeSelector:
  kubernetes.azure.com/agentpool: app

tolerations: []

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
    - labelSelector:
        matchExpressions:
        - key: app.kubernetes.io/name
          operator: In
          values:
          - rule-engine
      topologyKey: topology.kubernetes.io/zone

topologySpreadConstraints:
- maxSkew: 1
  topologyKey: topology.kubernetes.io/zone
  whenUnsatisfiable: DoNotSchedule
  labelSelector:
    matchLabels:
      app.kubernetes.io/name: rule-engine

livenessProbe:
  httpGet:
    path: /healthz
    port: 8080
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /readyz
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /healthz
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 30

podDisruptionBudget:
  enabled: true
  minAvailable: 2

# Rule Engine Configuration
config:
  database:
    host: semlayer-postgresql.postgres.database.azure.com
    port: 5432
    name: rules
    sslMode: require
    maxConnections: 50
    maxIdleConnections: 10

  cache:
    enabled: true
    host: semlayer-redis.redis.cache.windows.net
    port: 6380
    tls: true
    # Rule cache is critical for performance
    ruleCache:
      enabled: true
      maxSize: 50000
      ttl: 300 # 5 minutes
    policyCache:
      enabled: true
      maxSize: 10000
      ttl: 600 # 10 minutes
    decisionCache:
      enabled: true
      maxSize: 100000
      ttl: 60 # 1 minute

  # Rule evaluation settings
  evaluation:
    maxConcurrentEvaluations: 500
    timeout: 100ms
    enableCaching: true
    enableParallelEvaluation: true
    maxRulesPerEvaluation: 1000

  # ABAC settings
  abac:
    enabled: true
    policyFormat: rego # OPA Rego
    defaultDeny: true
    auditLog: true

  # Temporal rules (Phase 5d)
  temporal:
    enabled: true
    scheduler: internal
    maxActiveRules: 10000

  # Multi-tenant
  multiTenant:
    enabled: true
    isolation: schema
    tenantHeader: X-Tenant-ID

# Performance tuning
performance:
  # Connection pooling
  connectionPool:
    maxSize: 100
    minSize: 10
    acquireTimeout: 5s
    idleTimeout: 10m

  # Memory allocation
  gcPercent: 100
  maxProcs: 4

env:
- name: LOG_LEVEL
  value: "info"
- name: LOG_FORMAT
  value: "json"
- name: ENVIRONMENT
  value: "production"
- name: GOMAXPROCS
  value: "4"
- name: GOGC
  value: "100"

secrets:
  useAzureKeyVault: true
  keyVaultName: semlayer-prod-kv
  keys:
  - name: database-password
    secretName: db-password
  - name: redis-password
    secretName: redis-password

extraVolumes:
- name: config
  configMap:
    name: rule-engine-config
- name: policies
  configMap:
    name: rule-engine-policies
- name: tmp
  emptyDir: {}

extraVolumeMounts:
- name: config
  mountPath: /app/config
  readOnly: true
- name: policies
  mountPath: /app/policies
  readOnly: true
- name: tmp
  mountPath: /tmp

istio:
  enabled: true
  virtualService:
    enabled: true
    timeout: 5s # Low latency required
    retries:
      attempts: 2
      perTryTimeout: 2s
      retryOn: "5xx,reset"
  destinationRule:
    enabled: true
    trafficPolicy:
      connectionPool:
        tcp:
          maxConnections: 2000
        http:
          h2UpgradePolicy: UPGRADE
          http1MaxPendingRequests: 2000
          http2MaxRequests: 2000
      outlierDetection:
        consecutive5xxErrors: 3
        interval: 10s
        baseEjectionTime: 30s
        maxEjectionPercent: 30
