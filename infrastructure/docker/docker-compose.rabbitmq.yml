# RabbitMQ for local development
# Run: docker-compose -f docker-compose.rabbitmq.yml up -d

version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:4.1-management-alpine
    container_name: semlayer-rabbitmq
    ports:
      - "5672:5672"      # AMQP port for applications
      - "15672:15672"    # Management UI
      - "15671:15671"    # Management plugin HTTPS
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_VHOST: /
      RABBITMQ_MANAGEMENT_LOAD_DEFINITIONS: /etc/rabbitmq/definitions.json
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq-definitions.json:/etc/rabbitmq/definitions.json:ro
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - semlayer
    restart: unless-stopped

volumes:
  rabbitmq_data:
    driver: local

networks:
  semlayer:
    driver: bridge
