---
services:
  # graphql-engine:  # Moved to remote server at 100.84.126.19:8083
  #   image: hasura/graphql-engine:v2.46.0
  #   container_name: semlayer-graphql-engine-1
  #   restart: always
  #   env_file:
  #   - .env
  #   environment:
  #   - HASURA_GRAPHQL_DATABASE_URL=postgresql://postgres:postgres@100.84.126.19:5432/alpha?sslmode=disable
  #   - HASURA_GRAPHQL_ENABLE_CONSOLE=true
  #   - HASURA_GRAPHQL_DEV_MODE=true
  #   - HASURA_GRAPHQL_ENABLED_LOG_TYPES=startup,http-log,webhook-log,websocket-log,query-log
  #   - HASURA_GRAPHQL_ADMIN_SECRET=${HASURA_ADMIN_SECRET}
  #   - HASURA_GRAPHQL_JWT_SECRET={"type":"HS256","key":"${JWT_SECRET}"}
  #   - HASURA_GRAPHQL_UNAUTHORIZED_ROLE=anonymous
  #   - HASURA_GRAPHQL_ENABLE_REMOTE_SCHEMA_PERMISSIONS=true
  #   - HASURA_GRAPHQL_METADATA_DIR=/hasura-metadata
  #   - API_GATEWAY_AUTH_TOKEN=Bearer test-token-12345
  #   ports:
  #   # Host port 8083 is used throughout the repo/docs/health checks
  #   # and should forward to Hasura container's 8080.
  #   # (Host 8080 was previously used which caused health checks to fail.)
  #   - 8083:8080
  #   volumes:
  #   - ./hasura/metadata:/hasura-metadata
  #   - ./hasura/migrations:/hasura-migrations
  #   healthcheck:
  #     test:
  #       - CMD-SHELL
  #       - curl -f http://localhost:8080/healthz || curl -f http://localhost:8080/v1/version || exit 1
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #     start_period: 10s
  api-gateway:
    build:
      # build context is the repo root api-gateway directory (compose file lives under infrastructure/docker)
      context: ../api-gateway
      dockerfile: Dockerfile
    restart: always
    depends_on:
    - backend
    env_file:
    - .env
    environment:
    - DRIVER=postgres
    - DSN=${DATABASE_URL_DOCKER}
    - PORT=8000
    - HASURA_URL=http://100.84.126.19:8083/v1/graphql
    - BACKEND_URL=http://backend:8080
    - AUTH_SERVICE_URL=http://auth-service:8001
    - HASURA_ADMIN_SECRET=${HASURA_ADMIN_SECRET}
    - JWT_SECRET=${JWT_SECRET}
    - DEV_ALLOW_UNAUTH_FABRIC=true
    - DEV_ALLOW_UNAUTH_MODELS=true
    - DEV_ALLOW_UNAUTH_XUSER=true
    - ENABLE_SECURITY=true
    - YAML_DIR=./api-gateway/config
    - API_GATEWAY_AUTH_TOKEN=Bearer test-token-12345
    ports:
    - 8001:8000
  swagger-ui:
    image: swaggerapi/swagger-ui:v5.10.3
    restart: always
    environment:
    - SWAGGER_JSON=/app/openapi.yaml
    - BASE_URL=/docs
    ports:
    - 8089:8080
    volumes:
    - ./api-gateway/openapi.yaml:/app/openapi.yaml
  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    restart: always
    env_file:
    - .env
    environment:
    - DATABASE_URL=${DATABASE_URL_DOCKER}
    - DSN=${DSN_DOCKER}
    - PORT=8080
    - HASURA_URL=http://100.84.126.19:8083/v1/graphql
    - HASURA_ADMIN_SECRET=${HASURA_ADMIN_SECRET}
    - EVENT_ROUTER_URL=http://event-router:8081
    ports:
    - 29080:8080
    volumes:
    - ./backend/migrations:/app/migrations
    command: ./server
    depends_on:
    - rabbitmq
    - event-router
  ai-service:
    build:
      context: ./cmd/aiserver
      dockerfile: Dockerfile
    container_name: semlayer-ai-service
    restart: always
    env_file:
    - .env
    environment:
      DATABASE_URL: ${DATABASE_URL_DOCKER}
      API_ADDR: :8088
      PORT: '8088'
    ports:
    - 8088:8088
    depends_on:
    - graphql-engine
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8088/api/ai/layouts?primary_bo=test
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: semlayer-rabbitmq
    restart: always
    environment:
    - RABBITMQ_DEFAULT_USER=guest
    - RABBITMQ_DEFAULT_PASS=guest
    ports:
    - 5672:5672
    - 15672:15672
    volumes:
    - rabbitmq_data:/var/lib/rabbitmq
  temporal:
    image: temporalio/auto-setup:latest
    container_name: semlayer-temporal
    restart: always
    env_file: .env
    environment:
      DB: postgres12
      DB_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PWD: ${POSTGRES_PWD}
      POSTGRES_SEEDS: ${POSTGRES_HOST}
    ports:
    - 7233:7233
    healthcheck:
      test:
      - CMD
      - temporal-cli
      - workflow
      - list
      - --address
      - localhost:7233
      - --limit
      - '1'
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
  temporal-ui:
    image: temporalio/ui:latest
    container_name: semlayer-temporal-ui
    restart: always
    environment:
    - TEMPORAL_ADDRESS=temporal:7233
    - TEMPORAL_TLS_ENABLED=false
    ports:
    - 8087:8080
    depends_on:
    - temporal
  event-router:
    build:
      context: ./backend/cmd/event-router
      dockerfile: Dockerfile
    container_name: semlayer-event-router
    restart: always
    environment:
    - KAFKA_BROKERS=redpanda:9092
    - EVENT_ROUTER_URL=http://localhost:8081
    - PORT=8081
    - HASURA_URL=http://graphql-engine:8080/v1/graphql
    - HASURA_ADMIN_SECRET=${HASURA_ADMIN_SECRET}
    ports:
    - 8081:8081
    depends_on:
    - graphql-engine
    - redpanda
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8081/health
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
  validation-service:
    build:
      context: .
      dockerfile: ./backend/cmd/validation-service/Dockerfile
    container_name: semlayer-validation-service
    restart: always
    environment:
    - PORT=8082
    - DATABASE_URL=${DATABASE_URL_DOCKER}
    - KAFKA_BROKERS=redpanda:9092
    ports:
    - 8082:8082
    depends_on:
    - graphql-engine
    - redpanda
    - backend
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8082/health
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
  rule-engine-service:
    build:
      context: .
      dockerfile: ./backend/cmd/rule-engine-service/Dockerfile
    container_name: semlayer-rule-engine-service
    restart: always
    environment:
    - PORT=8083
    - DATABASE_URL=${DATABASE_URL_DOCKER}
    - KAFKA_BROKERS=redpanda:9092
    ports:
    - 8083:8083
    depends_on:
    - graphql-engine
    - redpanda
    - backend
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8083/health
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
  notifications-service:
    build:
      context: .
      dockerfile: ./backend/cmd/notifications-service/Dockerfile
    container_name: semlayer-notifications-service
    restart: always
    environment:
    - PORT=8084
    - DATABASE_URL=${DATABASE_URL_DOCKER}
    - KAFKA_BROKERS=redpanda:9092
    - SMTP_HOST=${SMTP_HOST:-localhost}
    - SMTP_PORT=${SMTP_PORT:-25}
    - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
    ports:
    - 29084:8084
    depends_on:
    - graphql-engine
    - redpanda
    - backend
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8084/health
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
  policy-service:
    build:
      context: .
      dockerfile: ./backend/cmd/policy-service/Dockerfile
    container_name: semlayer-policy-service
    restart: always
    environment:
    - PORT=8085
    - DATABASE_URL=${DATABASE_URL_DOCKER}
    - KAFKA_BROKERS=redpanda:9092
    ports:
    - 29085:8085
    depends_on:
    - graphql-engine
    - redpanda
    - backend
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8085/health
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
  search-service:
    build:
      context: .
      dockerfile: ./backend/cmd/search-service/Dockerfile
    container_name: semlayer-search-service
    restart: always
    environment:
    - PORT=8086
    - DATABASE_URL=${DATABASE_URL_DOCKER}
    - KAFKA_BROKERS=redpanda:9092
    - ELASTICSEARCH_URL=${ELASTICSEARCH_URL:-http://elasticsearch:9200}
    ports:
    - 29086:8086
    depends_on:
    - graphql-engine
    - redpanda
    - backend
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8086/health
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # AI Builder Microservice
  ai-builder:
    build:
      context: ./services/ai-builder
      dockerfile: Dockerfile
    container_name: semlayer-ai-builder
    restart: always
    environment:
    - DB_HOST=100.84.126.19
    - DB_PORT=5432
    - DB_USER=postgres
    - DB_PASSWORD=postgres
    - DB_NAME=alpha
    - RABBITMQ_HOST=rabbitmq
    - RABBITMQ_PORT=5672
    - RABBITMQ_USER=guest
    - RABBITMQ_PASSWORD=guest
    - TEMPORAL_HOST=temporal:7233
    - PORT=8081
    ports:
    - "8081:8081"
    depends_on:
    - graphql-engine
    - rabbitmq
    - temporal
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8081/health
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Compliance Engine Microservice
  compliance-engine:
    build:
      context: ./services/compliance-engine
      dockerfile: Dockerfile
    container_name: semlayer-compliance-engine
    restart: always
    environment:
    - DB_HOST=100.84.126.19
    - DB_PORT=5432
    - DB_USER=postgres
    - DB_PASSWORD=postgres
    - DB_NAME=alpha
    - RABBITMQ_HOST=rabbitmq
    - RABBITMQ_PORT=5672
    - RABBITMQ_USER=guest
    - RABBITMQ_PASSWORD=guest
    - TEMPORAL_HOST=temporal:7233
    - HTTP_PORT=8082
    ports:
    - "8082:8082"
    depends_on:
    - graphql-engine
    - rabbitmq
    - temporal
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8082/health
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  rabbitmq_data: null
