version: '3.8'

services:
  # ============================================================================
  # TRAEFIK - Service Mesh / Reverse Proxy / Load Balancer
  # ============================================================================
  traefik:
    image: traefik:v2.10
    container_name: traefik
    restart: always
    ports:
      - "80:80"      # HTTP entry point
      - "443:443"    # HTTPS entry point
      # Host dashboard port moved to 8400 to avoid conflict with other services mapped to 8080
      - "8400:8080"  # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/traefik/dynamic.yml:ro
      - traefik-logs:/var/log
    networks:
      - semlayer
    environment:
      TRAEFIK_API_INSECURE: "true"
      TRAEFIK_PROVIDERS_DOCKER: "true"
      TRAEFIK_PROVIDERS_DOCKER_EXPOSEDBYDEFAULT: "false"
      TRAEFIK_ENTRYPOINTS_WEB_ADDRESS: ":80"
      TRAEFIK_LOG_LEVEL: "INFO"
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    labels:
      traefik.enable: "false"
    depends_on:
      - backend
      - hasura
      - validation-service
      - rule-engine-service
      - notifications-service
      - search-service

  # ============================================================================
  # JAEGER - Distributed Tracing
  # ============================================================================
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    restart: always
    ports:
      - "5775:5775/udp"     # Zipkin compact thrift
      - "6831:6831/udp"     # Jaeger compact thrift
      - "6832:6832/udp"     # Jaeger binary thrift
      - "5778:5778"         # Serve frontend
      - "16686:16686"       # Jaeger UI
      - "14268:14268"       # Direct HTTP collector
      - "14250:14250"       # gRPC
      - "9411:9411"         # Zipkin compatible endpoint
    networks:
      - semlayer
    environment:
      COLLECTOR_ZIPKIN_HOST_PORT: ":9411"
      MEMORY_MAX_TRACES: "10000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:14269"]
      interval: 10s
      timeout: 5s
      retries: 3
    labels:
      traefik.enable: "false"

  # ============================================================================
  # PROMETHEUS - Metrics Collection
  # ============================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: always
    # Host port changed from 9090 to 9091 to avoid conflicts with other services
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert.yml:/etc/prometheus/alert.yml:ro
      - prometheus-storage:/prometheus
    networks:
      - semlayer
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--query.max-samples=10000000'
    environment:
      TZ: "UTC"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3
    labels:
      traefik.enable: "true"
      traefik.http.routers.prometheus.rule: "PathPrefix(`/prometheus`)"
      traefik.http.services.prometheus.loadbalancer.server.port: "9090"
    depends_on:
      - traefik

  # ============================================================================
  # GRAFANA - Visualization & Dashboards
  # ============================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - semlayer
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "admin"
      GF_SECURITY_ADMIN_USER: "admin"
      GF_INSTALL_PLUGINS: "grafana-clock-panel,grafana-simple-json-datasource"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "http://localhost:3000"
      GF_SMTP_ENABLED: "false"
      TZ: "UTC"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    labels:
      traefik.enable: "true"
      traefik.http.routers.grafana.rule: "PathPrefix(`/grafana`)"
      traefik.http.services.grafana.loadbalancer.server.port: "3000"
    depends_on:
      - prometheus

  # ============================================================================
  # ALERTMANAGER - Alert Management & Routing
  # ============================================================================
  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    restart: always
    ports:
      - "9093:9093"
    volumes:
      - ./prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-storage:/alertmanager
    networks:
      - semlayer
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    environment:
      TZ: "UTC"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9093/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3
    labels:
      traefik.enable: "false"

networks:
  semlayer:
    driver: bridge

volumes:
  traefik-logs:
    driver: local
  prometheus-storage:
    driver: local
  grafana-storage:
    driver: local
  alertmanager-storage:
    driver: local
