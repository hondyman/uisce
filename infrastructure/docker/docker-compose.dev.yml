version: '3.8'
services:
  # Postgres is managed on the host (not in compose). If you want to run Postgres in compose,
  # re-add the `postgres` service block (previously here).

  hasura:
    image: hasura/graphql-engine:v2.46.0
    container_name: semlayer-hasura-dev
    environment:
      # Connect to Postgres running on the host machine (alpha DB used in local dev)
      HASURA_GRAPHQL_DATABASE_URL: postgresql://postgres:postgres@host.docker.internal:5432/alpha
      HASURA_GRAPHQL_ADMIN_SECRET: "secret"
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
      HASURA_GRAPHQL_UNAUTHORIZED_ROLE: anonymous
      HASURA_GRAPHQL_METADATA_DIR: /hasura-metadata
    volumes:
      - ./hasura/metadata:/hasura-metadata
      - ./hasura/migrations:/hasura-migrations

  hasura-migrations:
    # Migrations run manually or via CI. Do not start by default with `docker compose up -d`.
    profiles: ["migrations"]
    image: hasura/cli:v2
    container_name: semlayer-hasura-migrations
    depends_on:
      - hasura
    environment:
      HASURA_GRAPHQL_ENDPOINT: http://hasura:8080
      HASURA_GRAPHQL_ADMIN_SECRET: secret
    volumes:
      - ./hasura/metadata:/hasura-metadata
      - ./hasura/migrations:/hasura-migrations
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "until curl -s http://hasura:8080/healthz; do echo waiting for hasura; sleep 1; done; hasura metadata apply --endpoint http://hasura:8080 --admin-secret $HASURA_GRAPHQL_ADMIN_SECRET && hasura migrate apply --all-databases --endpoint http://hasura:8080 --admin-secret $HASURA_GRAPHQL_ADMIN_SECRET"

  backend-local:
    build:
      context: ../..
      dockerfile: backend/local/Dockerfile
    container_name: semlayer-backend-local
    depends_on:
      - hasura
    environment:
      HASURA_URL: http://hasura:8080/v1/graphql
      HASURA_ADMIN_SECRET: secret
      JWT_SECRET: devsecret
      PORT: 29080
      BACKEND_URL: http://host.docker.internal:8080
      RULE_ENGINE_URL: http://host.docker.internal:8083
    ports:
      - "8082:29080"  # Host 8082 -> container 29080 (proxy listens on 29080 inside container)

  frontend-local:
    # This service is optional for local development where the frontend runs on your host machine.
    # Use `docker compose --profile frontend up -d` to start the frontend inside Docker.
    profiles: ["frontend"]
    build:
      context: ../..
      dockerfile: frontend/Dockerfile.dev
    container_name: semlayer-frontend-local
    ports:
      - "5173:5173"
    environment:
      - VITE_USE_PROXY=true
      - VITE_BACKEND_TARGET=http://host.docker.internal:29080
      - VITE_API_BASE_URL=http://host.docker.internal:29080
    depends_on:
      - backend-local
