services:

  # ---------------------------------------------------------
  # Redpanda (Streaming Event Backbone)
  # ---------------------------------------------------------
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: semlayer-redpanda
    user: root
    command: redpanda start --overprovisioned --smp 1 --memory 1G --reserve-memory 0M --node-id 0 --check=false --kafka-addr PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092 --advertise-kafka-addr PLAINTEXT://redpanda:9092,OUTSIDE://100.84.50.65:19092 --pandaproxy-addr 0.0.0.0:8082 --advertise-pandaproxy-addr 100.84.50.65:8082 --schema-registry-addr 0.0.0.0:8081
    networks:
      - remote-net
    ports:
      - "9092:9092"
      - "19092:19092"
      - "9644:9644"
      - "8081:8081"
    restart: unless-stopped

  # ---------------------------------------------------------
  # Redpanda Console (UI Inspector)
  # ---------------------------------------------------------
  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:latest
    container_name: semlayer-redpanda-console
    user: root
    networks:
      - remote-net
    ports:
      - "8096:8080"
    environment:
      KAFKA_BROKERS: redpanda:9092
      KAFKA_SCHEMAREGISTRY_ENABLED: "true"
      KAFKA_SCHEMAREGISTRY_URLS: http://redpanda:8081
    depends_on:
      - redpanda
    restart: unless-stopped

  # ---------------------------------------------------------
  # Debezium (Change Data Capture Stream Consumer)
  # ---------------------------------------------------------
  debezium:
    image: debezium/connect:2.3
    container_name: semlayer-debezium
    environment:
      BOOTSTRAP_SERVERS: redpanda:9092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: debezium_configs
      OFFSET_STORAGE_TOPIC: debezium_offsets
      STATUS_STORAGE_TOPIC: debezium_status
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_REST_ADVERTISED_HOST_NAME: debezium
    networks:
      - remote-net
    ports:
      - "8083:8083"
    depends_on:
      - redpanda
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ---------------------------------------------------------
  # Temporal (Distributed Workflow Engine)
  # ---------------------------------------------------------
  temporal:
    image: temporalio/auto-setup:latest
    container_name: semlayer-temporal
    environment:
      DB: postgres12
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123 # Matches your native host credentials
      POSTGRES_DB: temporal          # Ensure this DB is created natively
      POSTGRES_HOST: host.docker.internal
      POSTGRES_SEEDS: host.docker.internal
      DB_PORT: 5432
    networks:
      - remote-net
    ports:
      - "7233:7233"
      - "7234:7234"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "temporal", "workflow", "list", "--address", "localhost:7233", "--limit", "1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------
  # Temporal UI
  # ---------------------------------------------------------
  temporal-ui:
    image: temporalio/ui:latest
    container_name: semlayer-temporal-ui
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8088:8080"
    depends_on:
      - temporal
    networks:
      - remote-net
    restart: unless-stopped

  # ---------------------------------------------------------
  # Keycloak (OIDC Identity Provider)
  # ---------------------------------------------------------
  semlayer-keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: semlayer-keycloak
    command: start-dev --http-enabled=true
    ports:
      # Change the target port from 8080 to 8443
      - "8089:8443"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: password
      KC_HTTPS_CERTIFICATE_FILE: /opt/keycloak/providers/keycloak.crt
      KC_HTTPS_CERTIFICATE_KEY_FILE: /opt/keycloak/providers/keycloak.key
      # Add this line below to fix the redirect_uri error:
      KC_HOSTNAME: "100.84.50.65"
      KC_HOSTNAME_PORT: 8089
      KC_HOSTNAME_STRICT: "false"
    volumes:
      # Mount your certificate directory into the container
      - ./keycloak-certs/keycloak.crt:/opt/keycloak/providers/keycloak.crt:ro
      - ./keycloak-certs/keycloak.key:/opt/keycloak/providers/keycloak.key:ro
    networks:
      - remote-net

  # ---------------------------------------------------------
  # Redis Cache (Central Graph Memory)
  # ---------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: uisce-redis-cache
    command: redis-server --appendonly yes
    ports:
      - "6379:6379" # Bound directly to host terminal loops
    volumes:
      - uisce_redis_data:/data
    networks:
      - remote-net
    restart: unless-stopped

  # ---------------------------------------------------------
  # Infisical (Zero-Trust Secrets Vault Client)
  # ---------------------------------------------------------
  infisical:
    image: infisical/infisical:latest
    container_name: infisical-api
    depends_on:
      - redis
    ports:
      - "8085:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NODE_ENV=production
      # Scopes seamlessly out to your native database named "infisical"
      - DB_CONNECTION_URI=postgresql://postgres:postgres@host.docker.internal:5432/infisical?sslmode=disable
      - REDIS_URL=redis://uisce-redis-cache:6379
      - SITE_URL=http://localhost:8082
      - ENCRYPTION_KEY=1030410d3281d742b960cf2ff13705f6
      - AUTH_SECRET=389218b2d15e55b255031ed509dfa79f
    networks:
      - remote-net
    restart: unless-stopped

# ---------------------------------------------------------
# Networking Configuration Contract
# ---------------------------------------------------------
networks:
  remote-net:
    driver: bridge
    name: remote-net

# ---------------------------------------------------------
# Volume Management Layout
# ---------------------------------------------------------
volumes:
  uisce_redis_data:
  open-webui-data:

