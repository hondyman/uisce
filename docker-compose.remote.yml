services:
  uisce-redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: uisce-redpanda
    user: root
    # Let rpk start naturally using purely environment configurations
    command:
      - redpanda
      - start
    environment:
      # General settings
      REDPANDA_ENVIRONMENT: "development"
      
      # Kafka API configuration (Explicit internal & external mappings)
      REDPANDA_KAFKA_ADDRESS: "INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:19092"
      REDPANDA_KAFKA_ADVERTISED_ADDRESS: "INTERNAL://uisce-redpanda:9092,EXTERNAL://100.84.50.65:19092"
      
      # RPC Configuration (Explicitly specifying the listener mappings)
      REDPANDA_RPC_ADDRESS: "0.0.0.0:33145"
      REDPANDA_RPC_ADVERTISED_ADDRESS: "uisce-redpanda:33145"
      
      # Other core settings
      REDPANDA_PANDAPROXY_ADDRESS: "0.0.0.0:8082"
      REDPANDA_PANDAPROXY_ADVERTISED_ADDRESS: "100.84.50.65:8082"
      REDPANDA_SCHEMA_REGISTRY_ADDRESS: "0.0.0.0:8081"
    networks:
      - remote-net
    ports:
      - "9092:9092"
      - "19092:19092"
      - "8081:8081"
      - "8082:8082"
      - "9644:9644"
    volumes:
      - uisce_redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: uisce-redpanda
    user: root
    command:
      - redpanda
      - start
      - --overprovisioned
      - --check=false
      - --kafka-addr=INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:19092
      - --advertise-kafka-addr=INTERNAL://uisce-redpanda:9092,EXTERNAL://100.84.50.65:19092
      - --rpc-addr=0.0.0.0:33145
      - --advertise-rpc-addr=uisce-redpanda:33145
    environment:
      REDPANDA_PANDAPROXY_ADVERTISED_ADDRESS: 100.84.50.65:8082
    networks:
      - remote-net
    ports:
      - "9092:9092"
      - "19092:19092"
      - "8081:8081"
      - "8082:8082"
      - "9644:9644"
    volumes:
      - uisce_redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: uisce-redpanda
    user: root
    # Keep the basic command, let environment variables handle the networking
    command:
      - redpanda
      - start
      - --overprovisioned
      - --check=false
    environment:
      # Explicitly define listeners to avoid ADDR_ANY (0.0.0.0) errors
      REDPANDA_KAFKA_ADVERTISED_ADDRESS: uisce-redpanda:9092
      REDPANDA_PANDAPROXY_ADVERTISED_ADDRESS: 100.84.50.65:8082
      REDPANDA_RPC_ADDRESS: 0.0.0.0:33145
      REDPANDA_RPC_ADVERTISED_ADDRESS: uisce-redpanda:33145
    networks:
      - remote-net
    ports:
      - "9092:9092"
      - "19092:19092"
      - "8081:8081"
      - "8082:8082"
      - "9644:9644"
    volumes:
      - uisce_redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
  # ---------------------------------------------------------
  # Redpanda Console
  # ---------------------------------------------------------
  uisce-redpanda-console:
    image: docker.redpanda.com/redpandadata/console:latest
    container_name: uisce-redpanda-console
    user: root
    networks:
      - remote-net
    ports:
      - "8096:8080"
    environment:
      KAFKA_BROKERS: uisce-redpanda:9092
      KAFKA_SCHEMAREGISTRY_ENABLED: "true"
      KAFKA_SCHEMAREGISTRY_URLS: http://uisce-redpanda:8081
    depends_on:
      uisce-redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------
  # Debezium
  # ---------------------------------------------------------
  uisce-debezium:
    image: debezium/connect:2.3
    container_name: uisce-debezium
    environment:
      BOOTSTRAP_SERVERS: uisce-redpanda:9092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: debezium_configs
      OFFSET_STORAGE_TOPIC: debezium_offsets
      STATUS_STORAGE_TOPIC: debezium_status
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_REST_ADVERTISED_HOST_NAME: uisce-debezium
    networks:
      - remote-net
    ports:
      - "8083:8083"
    depends_on:
      uisce-redpanda:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------
  # Temporal
  # ---------------------------------------------------------
  uisce-temporal:
    image: temporalio/auto-setup:latest
    container_name: uisce-temporal
    environment:
      DB: postgres12
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: temporal
      POSTGRES_HOST: host.docker.internal
      POSTGRES_SEEDS: host.docker.internal
      DB_PORT: 5432
    networks:
      - remote-net
    ports:
      - "7233:7233"
      - "7234:7234"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      uisce-redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 7233 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------
  # Temporal UI
  # ---------------------------------------------------------
  uisce-temporal-ui:
    image: temporalio/ui:latest
    container_name: uisce-temporal-ui
    restart: always
    environment:
      - TEMPORAL_ADDRESS=uisce-temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    ports:
      - "8088:8080"
    networks:
      - remote-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 5


# ---------------------------------------------------------
  # Keycloak (Production-ready with Persistence)
  # ---------------------------------------------------------
  uisce-keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: uisce-keycloak
    # Use 'start' instead of 'start-dev' to enable permanent database persistence
    command: start --https-port=8443
    ports:
      - "8443:8443"
    environment:
      # Database Configuration
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://host.docker.internal:5432/keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
      
      # Admin Credentials
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: password
      
      # SSL and Proxy Configuration
      KC_HTTPS_ENABLED: "true"
      # Point directly to the isolated certs directory
      KC_HTTPS_CERTIFICATE_FILE: /opt/keycloak/certs/server.crt.pem
      KC_HTTPS_CERTIFICATE_KEY_FILE: /opt/keycloak/certs/server.key.pem
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_PROXY_HEADERS: "xforwarded"
      
      # Integration Settings
      KC_CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:3000"
      KC_FEATURES: token-exchange
    volumes:
      # Mount to an independent subdirectory to safeguard internal config layouts
      - ./keycloak-ssl:/opt/keycloak/certs:ro
    networks:
      - remote-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-k", "-L", "-f", "https://localhost:8443"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------
  # Redis
  # ---------------------------------------------------------
  uisce-redis:
    image: redis:7-alpine
    container_name: uisce-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - uisce_redis_data:/data
    networks:
      - remote-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------
  # Infisical
  # ---------------------------------------------------------
  uisce-infisical:
    image: infisical/infisical:latest
    container_name: uisce-infisical
    depends_on:
      uisce-redis:
        condition: service_healthy
    ports:
      - "8085:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NODE_ENV=production
      - DB_CONNECTION_URI=postgresql://postgres:postgres@host.docker.internal:5432/infisical?sslmode=disable
      - REDIS_URL=redis://uisce-redis:6379
      - SITE_URL=http://localhost:8082
      - ENCRYPTION_KEY=1030410d3281d742b960cf2ff13705f6
      - AUTH_SECRET=389218b2d15e55b255031ed509dfa79f
    networks:
      - remote-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/status"]
      interval: 20s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------
  # Hasura GraphQL Engine
  # ---------------------------------------------------------
  uisce-hasura:
    image: hasura/graphql-engine:v2.46.0.cli-migrations-v3
    container_name: uisce-hasura
      - remote-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Point this at the alpha Postgres instance. Override with env on the host, e.g.:
      #   HASURA_ALPHA_DATABASE_URL=postgresql://postgres:postgres@100.84.126.19:5432/alpha?sslmode=disable
      HASURA_GRAPHQL_DATABASE_URL: "${HASURA_ALPHA_DATABASE_URL:-postgresql://postgres:postgres@host.docker.internal:5432/alpha?sslmode=disable}"
      HASURA_GRAPHQL_ADMIN_SECRET: "${HASURA_ADMIN_SECRET:-myadminsecret}"
      HASURA_GRAPHQL_JWT_SECRET: '{"type":"HS256","key":"${JWT_SECRET:-dev-jwt-secret-key-change-in-production}"}'
      HASURA_GRAPHQL_UNAUTHORIZED_ROLE: "anonymous"
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
      HASURA_GRAPHQL_DEV_MODE: "true"
      HASURA_GRAPHQL_ENABLE_CORS: "true"
      HASURA_GRAPHQL_CORS_DOMAIN: "*"
      # Auto-apply metadata from the repo on startup
      HASURA_GRAPHQL_METADATA_DIR: "/hasura-metadata"
    volumes:
      - ./hasura/metadata:/hasura-metadata
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
  remote-net:
    driver: bridge

# ---------------------------------------------------------
# Volumes
# ---------------------------------------------------------
volumes:
  uisce_redpanda_data:
  uisce_redis_data:
  open-webui-data:
