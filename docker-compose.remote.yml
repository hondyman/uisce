# =============================================================================
# REMOTE INFRASTRUCTURE - Run on remote Tailscale server
# =============================================================================
# Contains: Hasura, Redpanda, Temporal, Debezium, Trino, Minio
# Postgres runs OUTSIDE compose on the remote host directly
# 
# Usage: docker compose -f docker-compose.remote.yml --env-file .env.split up -d
# =============================================================================

services:
  # ---------------------------------------------------------
  # Hasura GraphQL Engine (REMOTE ONLY - never on MacBook)
  # Connects to Postgres running on this same remote host
  # ---------------------------------------------------------
  hasura:
    image: hasura/graphql-engine:v2.40.0
    container_name: hasura
    restart: unless-stopped
    ports:
      - "8085:8080"
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@host.docker.internal:5432/alpha
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
      HASURA_GRAPHQL_DEV_MODE: "true"
      HASURA_GRAPHQL_ENABLED_LOG_TYPES: startup, http-log, webhook-log, websocket-log, query-log
      HASURA_GRAPHQL_ADMIN_SECRET: ${HASURA_ADMIN_SECRET:-myadminsecret}
      HASURA_GRAPHQL_JWT_SECRET: '{"type":"HS256", "key":"${JWT_SECRET:-dev-jwt-secret-key-change-in-production}"}'
      HASURA_GRAPHQL_CORS_DOMAIN: "*"
      HASURA_GRAPHQL_UNAUTHORIZED_ROLE: anonymous
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - remote-net

  # ---------------------------------------------------------
  # Redpanda - Kafka-API compatible streaming
  # ---------------------------------------------------------
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: redpanda
    command:
      - redpanda start
      - --overprovisioned
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --node-id 0
      - --check=false
      - --kafka-addr PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr PLAINTEXT://redpanda:9092,OUTSIDE://${REMOTE_HOST:-100.84.126.19}:19092
      - --pandaproxy-addr 0.0.0.0:8082
      - --advertise-pandaproxy-addr ${REMOTE_HOST:-100.84.126.19}:8082
      - --schema-registry-addr 0.0.0.0:8081
    networks:
      - remote-net
    ports:
      - "9092:9092"       # Kafka API (internal)
      - "19092:19092"     # Kafka API (external/MacBook)
      - "9644:9644"       # Admin API
      - "8081:8081"       # Schema Registry
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------
  # Redpanda Console (optional UI)
  # ---------------------------------------------------------
  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:latest
    container_name: redpanda-console
    networks:
      - remote-net
    ports:
      - "8096:8080"
    environment:
      KAFKA_BROKERS: redpanda:9092
      KAFKA_SCHEMAREGISTRY_ENABLED: "true"
      KAFKA_SCHEMAREGISTRY_URLS: http://redpanda:8081
    depends_on:
      - redpanda
    restart: unless-stopped

  # ---------------------------------------------------------
  # Debezium CDC Connector
  # ---------------------------------------------------------
  debezium:
    image: debezium/connect:2.3
    container_name: debezium
    environment:
      BOOTSTRAP_SERVERS: redpanda:9092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: debezium_configs
      OFFSET_STORAGE_TOPIC: debezium_offsets
      STATUS_STORAGE_TOPIC: debezium_status
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_REST_ADVERTISED_HOST_NAME: debezium
    networks:
      - remote-net
    ports:
      - "8083:8083"
    depends_on:
      - redpanda
    restart: unless-stopped

  # ---------------------------------------------------------
  # Temporal Workflow Engine
  # Postgres backend via host.docker.internal (same remote host)
  # ---------------------------------------------------------
  temporal:
    image: temporalio/auto-setup:latest
    container_name: temporal
    environment:
      DB: postgres12
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
      POSTGRES_HOST: host.docker.internal
      DB_PORT: 5432
      TEMPORAL_BROADCAST_ADDRESS: temporal
    networks:
      - remote-net
    ports:
      - "7233:7233"
      - "7234:7234"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "temporal", "workflow", "list", "--address", "localhost:7233", "--limit", "1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------
  # Temporal UI (optional)
  # ---------------------------------------------------------
  temporal-ui:
    image: temporalio/ui:latest
    container_name: temporal-ui
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8088:8080"
    depends_on:
      - temporal
    networks:
      - remote-net
    restart: unless-stopped

  # ---------------------------------------------------------
  # Trino Query Engine
  # ---------------------------------------------------------
  trino:
    image: trinodb/trino:latest
    container_name: trino
    networks:
      - remote-net
    ports:
      - "8094:8080"
    volumes:
      - ./trino/etc/catalog:/etc/trino/catalog
    depends_on:
      - minio
    restart: unless-stopped

  # ---------------------------------------------------------
  # MinIO Object Storage (for Iceberg)
  # ---------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    networks:
      - remote-net
    ports:
      - "9010:9000"
      - "9011:9001"
    volumes:
      - miniodata:/data
    restart: unless-stopped

networks:
  remote-net:
    driver: bridge
    name: remote-net

volumes:
  miniodata:
