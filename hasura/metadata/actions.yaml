actions:
  - name: scan_datasource
    definition:
      kind: synchronous
      handler: http://backend:8080/api/catalog/scan
      forward_client_headers: true
      timeout: 300
    permissions:
      - role: admin
      - role: user
      - role: anonymous
    comment: Scan a datasource for metadata
  - name: test_datasource_connection
    definition:
      kind: synchronous
      handler: http://backend:8080/api/connections/test
      forward_client_headers: true
    permissions:
      - role: admin
      - role: user
      - role: anonymous
    comment: Test a datasource connection string
custom_types:
  enums: []
  input_objects: []
  objects:
    - name: ScanDatasourceOutput
    - name: ScanResult
    - name: TestConnectionOutput
  scalars: []
