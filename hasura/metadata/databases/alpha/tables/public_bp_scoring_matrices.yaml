table:
  name: bp_scoring_matrices
  schema: public
object_relationships:
  - name: step
    using:
      foreign_key_constraint_on: step_id
  - name: tenant
    using:
      foreign_key_constraint_on: tenant_id
insert_permissions:
  - role: user
    permission:
      check:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
      columns:
        - tenant_id
        - step_id
        - matrix_name
        - description
        - dimensions
        - routing_thresholds
        - auto_tune_enabled
        - tuning_frequency_days
        - is_active
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - tenant_id
        - step_id
        - matrix_name
        - description
        - dimensions
        - routing_thresholds
        - evaluations_total
        - avg_score
        - min_score
        - max_score
        - auto_tune_enabled
        - tuning_frequency_days
        - last_tuned_at
        - is_active
        - created_at
        - updated_at
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
update_permissions:
  - role: user
    permission:
      columns:
        - matrix_name
        - description
        - dimensions
        - routing_thresholds
        - evaluations_total
        - avg_score
        - min_score
        - max_score
        - auto_tune_enabled
        - tuning_frequency_days
        - last_tuned_at
        - is_active
        - updated_at
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
      check:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
delete_permissions:
  - role: user
    permission:
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
