table:
  name: tenant_instance
  schema: public
object_relationships:
  - name: tenant
    using:
      foreign_key_constraint_on: tenant_id
array_relationships:
  - name: tenant_products
    using:
      foreign_key_constraint_on:
        column: tenant_instance_id
        table:
          name: tenant_product
          schema: public
select_permissions:
  - role: anonymous
    permission:
      columns:
        - id
        - tenant_id
        - instance_name
        - display_name
        - description
        - is_active
        - url
        - config
        - core_id
      filter: {}
  - role: steward
    permission:
      columns:
        - id
        - tenant_id
        - instance_name
        - config
        - is_active
        - url
        - display_name
        - description
        - status
        - created_at
        - updated_at
        - core_id
      filter: {}
  - role: user
    permission:
      columns:
        - id
        - tenant_id
        - instance_name
        - config
        - is_active
        - url
        - display_name
        - description
        - status
        - created_at
        - updated_at
        - core_id
      filter: {}
event_triggers:
  - name: clone_goldcopy_on_instance_created
    definition:
      enable_manual: true
      insert:
        columns: '*'
    retry_conf:
      interval_sec: 10
      num_retries: 3
      timeout_sec: 60
    webhook: '{{BACKEND_URL}}/api/events/tenant-instance-created'
    headers:
      - name: Content-Type
        value: application/json
  - name: gold_copy_instance_deleted
    definition:
      enable_manual: false
      delete:
        columns: '*'
    retry_conf:
      interval_sec: 10
      num_retries: 3
      timeout_sec: 60
    webhook: '{{BACKEND_URL}}/api/events/gold-copy-entity-changed'
    headers:
      - name: Content-Type
        value: application/json
