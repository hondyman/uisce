table:
  name: portfolios
  schema: public
object_relationships:
  - name: tenant
    using:
      foreign_key_constraint_on: tenant_id
insert_permissions:
  - role: steward
    permission:
      check:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
      columns:
        - tenant_id
        - client_id
        - type
        - benchmark
        - asset_allocation_targets
        - performance_metrics
        - advisor_discretion
  - role: user
    permission:
      check:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
      columns:
        - tenant_id
        - client_id
        - type
        - benchmark
        - asset_allocation_targets
        - performance_metrics
        - advisor_discretion
select_permissions:
  - role: steward
    permission:
      columns:
        - id
        - tenant_id
        - client_id
        - type
        - benchmark
        - asset_allocation_targets
        - performance_metrics
        - advisor_discretion
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
  - role: user
    permission:
      columns:
        - id
        - tenant_id
        - client_id
        - type
        - benchmark
        - asset_allocation_targets
        - performance_metrics
        - advisor_discretion
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
update_permissions:
  - role: steward
    permission:
      columns:
        - type
        - benchmark
        - asset_allocation_targets
        - performance_metrics
        - advisor_discretion
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
      check: null
  - role: user
    permission:
      columns:
        - type
        - benchmark
        - asset_allocation_targets
        - performance_metrics
        - advisor_discretion
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
      check: null
delete_permissions:
  - role: steward
    permission:
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
