table:
  name: bp_geofence_rules
  schema: public
object_relationships:
  - name: step
    using:
      foreign_key_constraint_on: step_id
  - name: tenant
    using:
      foreign_key_constraint_on: tenant_id
insert_permissions:
  - role: user
    permission:
      check:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
      columns:
        - tenant_id
        - step_id
        - geofence_name
        - geofence_type
        - region_polygon_coords
        - region_countries
        - region_center_lat
        - region_center_lng
        - region_radius_km
        - location_sources
        - target_branch_id
        - additional_steps
        - currency_conversion
        - language_localization
        - timezone
        - compliance_rules
        - distance_based_routing
        - proximity_calculation
        - distance_threshold_km
        - nearest_facility_branch_id
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - tenant_id
        - step_id
        - geofence_name
        - geofence_type
        - region_polygon_coords
        - region_countries
        - region_center_lat
        - region_center_lng
        - region_radius_km
        - location_sources
        - target_branch_id
        - additional_steps
        - currency_conversion
        - language_localization
        - timezone
        - compliance_rules
        - distance_based_routing
        - proximity_calculation
        - distance_threshold_km
        - nearest_facility_branch_id
        - match_count
        - created_at
        - updated_at
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
update_permissions:
  - role: user
    permission:
      columns:
        - geofence_name
        - geofence_type
        - region_polygon_coords
        - region_countries
        - region_center_lat
        - region_center_lng
        - region_radius_km
        - location_sources
        - target_branch_id
        - additional_steps
        - currency_conversion
        - language_localization
        - timezone
        - compliance_rules
        - distance_based_routing
        - proximity_calculation
        - distance_threshold_km
        - nearest_facility_branch_id
        - match_count
        - updated_at
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
      check:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
delete_permissions:
  - role: user
    permission:
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
