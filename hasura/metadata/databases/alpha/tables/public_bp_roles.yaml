table:
  name: bp_roles
  schema: public
insert_permissions:
  - role: user
    permission:
      check:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
      columns:
        - tenant_id
        - datasource_id
        - role_key
        - role_name
        - description
        - role_type
        - role_level
        - is_active
        - created_by
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - tenant_id
        - datasource_id
        - role_key
        - role_name
        - description
        - role_type
        - role_level
        - is_active
        - created_by
        - created_at
        - updated_at
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
update_permissions:
  - role: user
    permission:
      columns:
        - role_name
        - description
        - role_level
        - is_active
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
      check: null
delete_permissions:
  - role: user
    permission:
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
