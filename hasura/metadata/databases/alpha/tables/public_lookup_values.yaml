table:
  name: lookup_values
  schema: public
object_relationships:
- name: lookup
  using:
    foreign_key_constraint_on: lookup_id
- name: tenant
  using:
    foreign_key_constraint_on: tenant_id
- name: parent
  using:
    foreign_key_constraint_on: parent_id
select_permissions:
- role: anonymous
  permission:
    columns:
    - id
    - lookup_id
    - tenant_id
    - value
    - label
    - parent_id
    - metadata
    - created_at
    filter:
      tenant_id:
        _eq: X-Hasura-Tenant-Id
- role: user
  permission:
    columns:
    - id
    - lookup_id
    - tenant_id
    - value
    - label
    - parent_id
    - metadata
    - created_at
    filter:
      tenant_id:
        _eq: X-Hasura-Tenant-Id
insert_permissions:
- role: user
  permission:
    check:
      tenant_id:
        _eq: X-Hasura-Tenant-Id
    columns:
    - lookup_id
    - value
    - label
    - parent_id
    - metadata
update_permissions:
- role: user
  permission:
    columns:
    - value
    - label
    - parent_id
    - metadata
    filter:
      tenant_id:
        _eq: X-Hasura-Tenant-Id
delete_permissions:
- role: user
  permission:
    filter:
      tenant_id:
        _eq: X-Hasura-Tenant-Id
