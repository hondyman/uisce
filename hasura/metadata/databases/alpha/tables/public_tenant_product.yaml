table:
  name: tenant_product
  schema: public
object_relationships:
  - name: alpha_product
    using:
      foreign_key_constraint_on: alpha_product_id
  - name: tenant
    using:
      foreign_key_constraint_on: tenant_id
  - name: tenant_instance
    using:
      foreign_key_constraint_on: tenant_instance_id
array_relationships:
  - name: tenant_product_datasources
    using:
      foreign_key_constraint_on:
        column: tenant_product_id
        table:
          name: tenant_product_datasource
          schema: public
insert_permissions:
  - role: user
    permission:
      check: {}
      columns:
        - tenant_id
        - tenant_instance_id
        - alpha_product_id
        - version
        - is_active
select_permissions:
  - role: steward
    permission:
      columns:
        - id
        - tenant_instance_id
        - alpha_product_id
        - created_at
        - updated_at
        - version
        - is_active
        - core_id
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
  - role: user
    permission:
      columns:
        - id
        - tenant_instance_id
        - alpha_product_id
        - created_at
        - updated_at
        - version
        - is_active
        - core_id
        - tenant_id
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
update_permissions:
  - role: anonymous
    permission:
      columns:
        - version
        - is_active
        - tenant_instance_id
      filter: {}
      check: {}
  - role: user
    permission:
      columns:
        - version
        - is_active
        - tenant_instance_id
      filter: {}
      check: {}
event_triggers:
  - name: gold_copy_product_deleted
    definition:
      enable_manual: false
      delete:
        columns: '*'
    retry_conf:
      interval_sec: 10
      num_retries: 3
      timeout_sec: 60
    webhook: '{{BACKEND_URL}}/api/events/gold-copy-entity-changed'
    headers:
      - name: Content-Type
        value: application/json

