table:
  name: bp_time_series_forecasts
  schema: public
object_relationships:
  - name: step
    using:
      foreign_key_constraint_on: step_id
  - name: tenant
    using:
      foreign_key_constraint_on: tenant_id
insert_permissions:
  - role: user
    permission:
      check:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
      columns:
        - tenant_id
        - step_id
        - forecast_model
        - lookback_window_days
        - prediction_horizon_hours
        - features
        - forecast_timestamp
        - predicted_queue_depth
        - predicted_approval_time_minutes
        - confidence_interval_lower
        - confidence_interval_upper
        - low_load_branch_id
        - high_load_branch_id
        - forecast_accuracy
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - tenant_id
        - step_id
        - forecast_model
        - lookback_window_days
        - prediction_horizon_hours
        - features
        - forecast_timestamp
        - predicted_queue_depth
        - predicted_approval_time_minutes
        - confidence_interval_lower
        - confidence_interval_upper
        - low_load_branch_id
        - high_load_branch_id
        - forecast_accuracy
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
update_permissions:
  - role: user
    permission:
      columns:
        - forecast_model
        - lookback_window_days
        - prediction_horizon_hours
        - features
        - forecast_timestamp
        - predicted_queue_depth
        - predicted_approval_time_minutes
        - confidence_interval_lower
        - confidence_interval_upper
        - low_load_branch_id
        - high_load_branch_id
        - forecast_accuracy
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
      check:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
delete_permissions:
  - role: user
    permission:
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
