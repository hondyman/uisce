table:
  name: alpha_datasource
  schema: public
array_relationships:

  - name: tenant_product_datasources
    using:
      foreign_key_constraint_on:
        column: alpha_tenant_instance_id
        table:
          name: tenant_product_datasource
          schema: public
select_permissions:
  - role: anonymous
    permission:
      columns:
        - id
        - datasource_name
        - datasource_code
        - datasource_type
      filter: {}
  - role: steward
    permission:
      columns:
        - id
        - datasource_name
        - datasource_code
        - is_active
        - config
        - created_at
        - updated_at
        - datasource_type
      filter: {}
  - role: user
    permission:
      columns:
        - id
        - datasource_name
        - datasource_code
        - is_active
        - config
        - created_at
        - updated_at
        - datasource_type
      filter: {}
