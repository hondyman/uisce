table:
  name: tenant_chart
  schema: public
object_relationships:
  - name: tenant_datasource
    using:
      foreign_key_constraint_on: tenant_datasource_id
select_permissions:
  - role: anonymous
    permission:
      columns:
        - id
        - tenant_datasource_id
        - chart_name
        - chart
        - created_at
        - updated_at
      filter:
        _not: {}
  - role: steward
    permission:
      columns:
        - id
        - tenant_datasource_id
        - chart_name
        - chart
        - created_at
        - updated_at
      filter:
        tenant_datasource:
          tenant_product:
            tenant_instance:
              tenant_id:
                _eq: X-Hasura-Tenant-Id
  - role: user
    permission:
      columns:
        - id
        - tenant_datasource_id
        - chart_name
        - chart
        - created_at
        - updated_at
      filter:
        tenant_datasource:
          tenant_product:
            tenant_instance:
              tenant_id:
                _eq: X-Hasura-Tenant-Id
