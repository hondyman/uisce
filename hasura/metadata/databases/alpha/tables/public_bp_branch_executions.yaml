table:
  name: bp_branch_executions
  schema: public
object_relationships:
  - name: step
    using:
      foreign_key_constraint_on: step_id
  - name: tenant
    using:
      foreign_key_constraint_on: tenant_id
insert_permissions:
  - role: user
    permission:
      check:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
      columns:
        - tenant_id
        - datasource_id
        - workflow_instance_id
        - step_id
        - branch_id
        - branch_label
        - selected_by
        - priority_rank
        - condition_evaluation
        - matched_conditions
        - evaluation_time_ms
        - ml_model_id
        - ml_model_score
        - ml_model_confidence
        - ml_features
        - join_strategy
        - is_last_in_join
        - nesting_level
        - loop_iteration
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - tenant_id
        - datasource_id
        - workflow_instance_id
        - step_id
        - branch_id
        - branch_label
        - selected_by
        - priority_rank
        - condition_evaluation
        - matched_conditions
        - evaluation_time_ms
        - ml_model_id
        - ml_model_score
        - ml_model_confidence
        - ml_features
        - started_at
        - completed_at
        - duration_ms
        - status
        - result_data
        - next_step_id
        - error_message
        - join_strategy
        - is_last_in_join
        - join_results_aggregated
        - parent_branch_execution_id
        - nesting_level
        - loop_iteration
        - loop_parent_execution_id
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
update_permissions:
  - role: user
    permission:
      columns:
        - selected_by
        - priority_rank
        - condition_evaluation
        - matched_conditions
        - evaluation_time_ms
        - ml_model_score
        - ml_model_confidence
        - ml_features
        - completed_at
        - duration_ms
        - status
        - result_data
        - next_step_id
        - error_message
        - join_results_aggregated
        - parent_branch_execution_id
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
      check:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
delete_permissions:
  - role: user
    permission:
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
