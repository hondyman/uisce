table:
  name: bp_semantic_intents
  schema: public
object_relationships:
  - name: step
    using:
      foreign_key_constraint_on: step_id
  - name: tenant
    using:
      foreign_key_constraint_on: tenant_id
insert_permissions:
  - role: user
    permission:
      check:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
      columns:
        - tenant_id
        - step_id
        - intent_id
        - intent_label
        - intent_description
        - intent_vector
        - semantic_model
        - similarity_threshold
        - keywords
        - sentiment_threshold
        - target_branch_id
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - tenant_id
        - step_id
        - intent_id
        - intent_label
        - intent_description
        - intent_vector
        - semantic_model
        - similarity_threshold
        - keywords
        - sentiment_threshold
        - target_branch_id
        - match_count
        - avg_confidence
        - false_positive_rate
        - created_at
        - updated_at
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
update_permissions:
  - role: user
    permission:
      columns:
        - intent_label
        - intent_description
        - intent_vector
        - semantic_model
        - similarity_threshold
        - keywords
        - sentiment_threshold
        - target_branch_id
        - match_count
        - avg_confidence
        - false_positive_rate
        - updated_at
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
      check:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
delete_permissions:
  - role: user
    permission:
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
