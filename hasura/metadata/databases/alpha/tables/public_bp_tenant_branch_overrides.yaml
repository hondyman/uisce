table:
  name: bp_tenant_branch_overrides
  schema: public
object_relationships:
  - name: base_step
    using:
      foreign_key_constraint_on: base_step_id
  - name: tenant
    using:
      foreign_key_constraint_on: tenant_id
insert_permissions:
  - role: user
    permission:
      check:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
      columns:
        - tenant_id
        - base_step_id
        - override_type
        - base_branch_id
        - override_branch_id
        - override_assignee_role
        - override_duration_hours
        - additional_steps
        - removed_conditions
        - modified_conditions
        - inheritance_strategy
        - enforce_base_critical_paths
        - allow_branch_deletion
        - custom_branches
        - is_active
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - tenant_id
        - base_step_id
        - override_type
        - base_branch_id
        - override_branch_id
        - override_assignee_role
        - override_duration_hours
        - additional_steps
        - removed_conditions
        - modified_conditions
        - inheritance_strategy
        - enforce_base_critical_paths
        - allow_branch_deletion
        - custom_branches
        - is_active
        - created_at
        - updated_at
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
update_permissions:
  - role: user
    permission:
      columns:
        - override_type
        - base_branch_id
        - override_branch_id
        - override_assignee_role
        - override_duration_hours
        - additional_steps
        - removed_conditions
        - modified_conditions
        - inheritance_strategy
        - enforce_base_critical_paths
        - allow_branch_deletion
        - custom_branches
        - is_active
        - updated_at
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
      check:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
delete_permissions:
  - role: user
    permission:
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
