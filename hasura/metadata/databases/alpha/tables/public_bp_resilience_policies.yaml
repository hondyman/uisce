table:
  name: bp_resilience_policies
  schema: public
object_relationships:
  - name: step
    using:
      foreign_key_constraint_on: step_id
  - name: tenant
    using:
      foreign_key_constraint_on: tenant_id
insert_permissions:
  - role: user
    permission:
      check:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
      columns:
        - tenant_id
        - step_id
        - retry_max_attempts
        - retry_initial_interval_seconds
        - retry_backoff_multiplier
        - retry_max_interval_seconds
        - retry_on_errors
        - circuit_breaker_enabled
        - circuit_breaker_failure_threshold
        - circuit_breaker_reset_timeout_seconds
        - circuit_breaker_half_open_max_requests
        - circuit_breaker_fallback_branch_id
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - tenant_id
        - step_id
        - retry_max_attempts
        - retry_initial_interval_seconds
        - retry_backoff_multiplier
        - retry_max_interval_seconds
        - retry_on_errors
        - circuit_breaker_enabled
        - circuit_breaker_failure_threshold
        - circuit_breaker_reset_timeout_seconds
        - circuit_breaker_half_open_max_requests
        - circuit_breaker_fallback_branch_id
        - circuit_breaker_alert_channels
        - total_circuit_breaks
        - created_at
        - updated_at
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
update_permissions:
  - role: user
    permission:
      columns:
        - retry_max_attempts
        - retry_initial_interval_seconds
        - retry_backoff_multiplier
        - retry_max_interval_seconds
        - retry_on_errors
        - circuit_breaker_enabled
        - circuit_breaker_failure_threshold
        - circuit_breaker_reset_timeout_seconds
        - circuit_breaker_half_open_max_requests
        - circuit_breaker_fallback_branch_id
        - circuit_breaker_alert_channels
        - total_circuit_breaks
        - updated_at
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
      check:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
delete_permissions:
  - role: user
    permission:
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
