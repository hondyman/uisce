table:
  name: bp_explainability_records
  schema: public
object_relationships:
  - name: branch_execution
    using:
      foreign_key_constraint_on: branch_execution_id
  - name: tenant
    using:
      foreign_key_constraint_on: tenant_id
insert_permissions:
  - role: user
    permission:
      check:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
      columns:
        - tenant_id
        - branch_execution_id
        - selected_branch_id
        - decision_timestamp
        - explanation_detail_level
        - explanation_methods
        - feature_importance
        - decision_path
        - alternative_paths
        - natural_language_summary
        - decision_confidence
        - uncertainty_estimate
        - counterfactual_enabled
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - tenant_id
        - branch_execution_id
        - selected_branch_id
        - decision_timestamp
        - explanation_detail_level
        - explanation_methods
        - feature_importance
        - decision_path
        - alternative_paths
        - natural_language_summary
        - decision_confidence
        - uncertainty_estimate
        - counterfactual_enabled
        - created_at
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
update_permissions:
  - role: user
    permission:
      columns:
        - explanation_detail_level
        - explanation_methods
        - feature_importance
        - decision_path
        - alternative_paths
        - natural_language_summary
        - decision_confidence
        - uncertainty_estimate
        - counterfactual_enabled
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
      check:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
delete_permissions:
  - role: user
    permission:
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
