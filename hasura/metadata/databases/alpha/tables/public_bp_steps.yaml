table:
  name: bp_steps
  schema: public
object_relationships:
  - name: business_process
    using:
      foreign_key_constraint_on: process_id
insert_permissions:
  - role: steward
    permission:
      check:
        business_process:
          tenant_id:
            _eq: X-Hasura-Tenant-Id
      set:
        created_at: now()
      columns:
        - process_id
        - step_order
        - step_type
        - step_name
        - duration_hours
        - config
  - role: user
    permission:
      check:
        business_process:
          tenant_id:
            _eq: X-Hasura-Tenant-Id
      set:
        created_at: now()
      columns:
        - process_id
        - step_order
        - step_type
        - step_name
        - duration_hours
        - config
select_permissions:
  - role: anonymous
    permission:
      columns:
        - id
        - process_id
        - step_order
        - step_type
        - step_name
        - duration_hours
        - created_at
      filter: {}
  - role: steward
    permission:
      columns:
        - id
        - process_id
        - step_order
        - step_type
        - step_name
        - duration_hours
        - config
        - created_at
      filter:
        business_process:
          tenant_id:
            _eq: X-Hasura-Tenant-Id
  - role: user
    permission:
      columns:
        - id
        - process_id
        - step_order
        - step_type
        - step_name
        - duration_hours
        - config
        - created_at
      filter:
        business_process:
          tenant_id:
            _eq: X-Hasura-Tenant-Id
update_permissions:
  - role: steward
    permission:
      columns:
        - step_order
        - step_type
        - step_name
        - duration_hours
        - config
      filter:
        business_process:
          tenant_id:
            _eq: X-Hasura-Tenant-Id
      check: null
  - role: user
    permission:
      columns:
        - step_order
        - step_type
        - step_name
        - duration_hours
        - config
      filter:
        business_process:
          tenant_id:
            _eq: X-Hasura-Tenant-Id
      check: null
delete_permissions:
  - role: steward
    permission:
      filter:
        business_process:
          tenant_id:
            _eq: X-Hasura-Tenant-Id
