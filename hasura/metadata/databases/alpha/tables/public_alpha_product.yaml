table:
  name: alpha_product
  schema: public
array_relationships:
  - name: tenant_products
    using:
      foreign_key_constraint_on:
        column: alpha_product_id
        table:
          name: tenant_product
          schema: public
select_permissions:
  - role: anonymous
    permission:
      columns:
        - id
        - product_name
        - is_active
        - product_code
      filter: {}
  - role: steward
    permission:
      columns:
        - id
        - product_name
        - is_active
        - product_code
        - status
        - created_at
        - updated_at
      filter: {}
  - role: user
    permission:
      columns:
        - id
        - product_name
        - is_active
        - product_code
        - status
        - created_at
        - updated_at
      filter: {}
