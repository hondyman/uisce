table:
  name: connections
  schema: public
event_triggers:
  - name: gold_copy_connection_changed
    definition:
      enable_manual: false
      insert:
        columns: "*"
      update:
        columns: "*"
      delete:
        columns: "*"
    retry_conf:
      num_retries: 0
      interval_sec: 10
      timeout_sec: 60
    webhook: "{{BACKEND_URL}}/api/events/connection-changed"
    headers:
      - name: X-Hasura-Role
        value: admin
object_relationships:
  - name: tenant_instance
    using:
      foreign_key_constraint_on: tenant_instance_id
  - name: tenant_product
    using:
      foreign_key_constraint_on: tenant_product_id
array_relationships:
  - name: tenant_product_datasources
    using:
      foreign_key_constraint_on:
        column: connection_id
        table:
          name: tenant_product_datasource
          schema: public
insert_permissions:
  - role: user
    permission:
      check: {}
      columns:
        - tenant_id
        - tenant_instance_id
        - tenant_product_id
        - name
        - type
        - host
        - port
        - database
        - schema
        - username
        - password
        - metadata
        - is_active
select_permissions:
  - role: steward
    permission:
      columns:
        - id
        - tenant_id
        - tenant_instance_id
        - tenant_product_id
        - name
        - type
        - host
        - port
        - database
        - schema
        - username
        - password
        - metadata
        - is_active
        - created_at
        - updated_at
        - core_id
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
  - role: user
    permission:
      columns:
        - id
        - tenant_id
        - tenant_instance_id
        - tenant_product_id
        - name
        - type
        - host
        - port
        - database
        - schema
        - username
        - password
        - metadata
        - is_active
        - created_at
        - updated_at
        - core_id
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
update_permissions:
  - role: user
    permission:
      columns:
        - name
        - type
        - tenant_instance_id
        - tenant_product_id
        - host
        - port
        - database
        - schema
        - username
        - password
        - metadata
        - is_active
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
      check: null
delete_permissions:
  - role: user
    permission:
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
