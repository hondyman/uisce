table:
  name: business_processes
  schema: public
object_relationships:
  - name: tenant
    using:
      foreign_key_constraint_on: tenant_id
array_relationships:
  - name: executions
    using:
      foreign_key_constraint_on:
        column: business_process_id
        table:
          name: bp_executions
          schema: public
  - name: steps
    using:
      foreign_key_constraint_on:
        column: process_id
        table:
          name: bp_steps
          schema: public
insert_permissions:
  - role: steward
    permission:
      check:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
      set:
        created_at: now()
      columns:
        - tenant_id
        - process_name
  - role: user
    permission:
      check:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
      set:
        created_at: now()
      columns:
        - tenant_id
        - process_name
select_permissions:
  - role: anonymous
    permission:
      columns:
        - id
        - process_name
        - created_at
      filter:
        id:
          _eq: "00000000-0000-0000-0000-000000000000"
  - role: steward
    permission:
      columns:
        - id
        - tenant_id
        - process_name
        - created_at
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
  - role: user
    permission:
      columns:
        - id
        - tenant_id
        - process_name
        - created_at
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
update_permissions:
  - role: steward
    permission:
      columns:
        - process_name
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
      check: null
  - role: user
    permission:
      columns:
        - process_name
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
      check: null
delete_permissions:
  - role: steward
    permission:
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
