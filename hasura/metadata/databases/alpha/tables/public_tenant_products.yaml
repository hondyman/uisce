table:
  name: tenant_product
  schema: public
object_relationships:
- name: tenant_instance
  using:
    foreign_key_constraint_on: tenant_instance_id
- name: alpha_product
  using:
    foreign_key_constraint_on: alpha_product_id
array_relationships:
- name: tenant_product_datasources
  using:
    foreign_key_constraint_on:
      column: tenant_product_id
      table:
        name: tenant_product_datasource
        schema: public
select_permissions:
- role: user
  permission:
    columns:
    - id
    - tenant_instance_id
    - alpha_product_id
    - created_at
    - updated_at
    - version
    - is_active
    filter: {}
- role: steward
  permission:
    columns:
    - id
    - tenant_instance_id
    - alpha_product_id
    - created_at
    - updated_at
    - version
    - is_active
    filter: {}
- role: anonymous
  permission:
    columns:
    - id
    - tenant_instance_id
    - alpha_product_id
    - created_at
    - updated_at
    - version
    - is_active
    filter: {}

update_permissions:
- role: anonymous
  permission:
    columns:
    - version
    - is_active
    - tenant_instance_id
    filter: {}
    check: {}
- role: user
  permission:
    columns:
    - version
    - is_active
    - tenant_instance_id
    filter: {}
    check: {}
