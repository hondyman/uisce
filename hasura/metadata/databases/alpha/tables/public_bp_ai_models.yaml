table:
  name: bp_ai_models
  schema: public
object_relationships:
  - name: tenant
    using:
      foreign_key_constraint_on: tenant_id
insert_permissions:
  - role: user
    permission:
      check:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
      columns:
        - tenant_id
        - model_id
        - model_name
        - model_type
        - version
        - description
        - use_cases
        - model_endpoint
        - model_provider
        - authentication_type
        - authentication_config
        - accuracy_threshold
        - fallback_strategy
        - is_active
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - tenant_id
        - model_id
        - model_name
        - model_type
        - version
        - description
        - use_cases
        - model_endpoint
        - model_provider
        - authentication_type
        - authentication_config
        - accuracy_threshold
        - fallback_strategy
        - avg_latency_ms
        - success_rate
        - total_predictions
        - is_active
        - created_at
        - updated_at
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
update_permissions:
  - role: user
    permission:
      columns:
        - model_name
        - model_type
        - version
        - description
        - use_cases
        - model_endpoint
        - model_provider
        - authentication_type
        - authentication_config
        - accuracy_threshold
        - fallback_strategy
        - avg_latency_ms
        - success_rate
        - total_predictions
        - is_active
        - updated_at
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
      check:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
delete_permissions:
  - role: user
    permission:
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
