table:
  name: bp_executions
  schema: public
object_relationships:
  - name: business_process
    using:
      foreign_key_constraint_on: business_process_id
  - name: tenant
    using:
      foreign_key_constraint_on: tenant_id
array_relationships:
  - name: execution_steps
    using:
      foreign_key_constraint_on:
        column: bp_execution_id
        table:
          name: bp_execution_steps
          schema: public
insert_permissions:
  - role: steward
    permission:
      check:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
      set:
        initiated_at: now()
      columns:
        - tenant_id
        - business_process_id
        - workflow_id
        - entity_id
        - initiated_by
        - execution_status
        - current_step_order
        - metadata
  - role: user
    permission:
      check:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
      set:
        initiated_at: now()
      columns:
        - tenant_id
        - business_process_id
        - workflow_id
        - entity_id
        - initiated_by
        - execution_status
        - current_step_order
        - metadata
select_permissions:
  - role: anonymous
    permission:
      columns:
        - id
        - business_process_id
        - execution_status
        - initiated_at
        - completed_at
      filter:
        id:
          _eq: "00000000-0000-0000-0000-000000000000"
  - role: steward
    permission:
      columns:
        - id
        - tenant_id
        - business_process_id
        - workflow_id
        - entity_id
        - initiated_by
        - initiated_at
        - completed_at
        - execution_status
        - current_step_order
        - total_duration_minutes
        - error_message
        - metadata
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
  - role: user
    permission:
      columns:
        - id
        - tenant_id
        - business_process_id
        - workflow_id
        - entity_id
        - initiated_by
        - initiated_at
        - completed_at
        - execution_status
        - current_step_order
        - total_duration_minutes
        - error_message
        - metadata
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
update_permissions:
  - role: steward
    permission:
      columns:
        - execution_status
        - current_step_order
        - completed_at
        - total_duration_minutes
        - error_message
        - metadata
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
      check: null
  - role: user
    permission:
      columns:
        - execution_status
        - current_step_order
        - completed_at
        - total_duration_minutes
        - error_message
        - metadata
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
      check: null
delete_permissions:
  - role: steward
    permission:
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
