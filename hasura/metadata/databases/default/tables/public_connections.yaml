table:
  name: connections
  schema: public
array_relationships:
- name: tenant_product_datasources
  using:
    foreign_key_constraint_on:
      column: connection_id
      table:
        name: tenant_product_datasource
        schema: public
object_relationships:
- name: tenant
  using:
    foreign_key_constraint_on: tenant_id
select_permissions:
- role: user
  permission:
    columns:
    - id
    - tenant_id
    - name
    - type
    - host
    - port
    - database
    - schema
    - username
    - password
    - base_url
    - api_key
    - metadata
    - is_active
    - created_at
    - updated_at
    filter: 
      tenant_id:
        _eq: X-Hasura-Tenant-Id
- role: steward
  permission:
    columns:
    - id
    - tenant_id
    - name
    - type
    - host
    - port
    - database
    - schema
    - username
    - password
    - base_url
    - api_key
    - metadata
    - is_active
    - created_at
    - updated_at
    filter: 
      tenant_id:
        _eq: X-Hasura-Tenant-Id
insert_permissions:
- role: user
  permission:
    check:
      tenant_id:
        _eq: X-Hasura-Tenant-Id
    columns:
    - tenant_id
    - name
    - type
    - host
    - port
    - database
    - schema
    - username
    - password
    - base_url
    - api_key
    - metadata
    - is_active
update_permissions:
- role: user
  permission:
    columns:
    - name
    - type
    - host
    - port
    - database
    - schema
    - username
    - password
    - base_url
    - api_key
    - metadata
    - is_active
    filter:
      tenant_id:
        _eq: X-Hasura-Tenant-Id
delete_permissions:
- role: user
  permission:
    filter:
      tenant_id:
        _eq: X-Hasura-Tenant-Id
