table:
  name: tenant_instance
  schema: public
object_relationships:
- name: tenant
  using:
    foreign_key_constraint_on:
      column: tenant_id
      table:
        name: tenants
        schema: public
array_relationships:
- name: tenant_products
  using:
    foreign_key_constraint_on:
      column: tenant_instance_id
      table:
        name: tenant_product
        schema: public
select_permissions:
- role: user
  permission:
    columns:
    - id
    - tenant_id
    - instance_name
    - config
    - is_active
    - url
    - display_name
    - description
    - status
    - created_at
    - updated_at
    filter:
      tenant_id:
        _eq: X-Hasura-Tenant-Id
- role: steward
  permission:
    columns:
    - id
    - tenant_id
    - instance_name
    - config
    - is_active
    - url
    - display_name
    - description
    - status
    - created_at
    - updated_at
    filter:
      tenant_id:
        _eq: X-Hasura-Tenant-Id
- role: global_admin
  permission:
    columns:
    - id
    - tenant_id
    - instance_name
    - config
    - is_active
    - url
    - display_name
    - description
    - status
    - created_at
    - updated_at
    filter: {}
