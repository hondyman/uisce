table:
  name: tenant_product_datasource
  schema: public
object_relationships:
- name: alpha_tenant_instance
  using:
    foreign_key_constraint_on: alpha_tenant_instance_id
- name: tenant_product
  using:
    foreign_key_constraint_on: tenant_product_id
- name: tenant_instance
  using:
    foreign_key_constraint_on: tenant_instance_id
- name: connection
  using:
    foreign_key_constraint_on:
      column: connection_id
      table:
        name: connections
        schema: public
select_permissions:
- role: anonymous
  permission:
    columns:
    - id
    - tenant_product_id
    - tenant_instance_id
    - alpha_tenant_instance_id
    - connection_id
    - is_active
    - config
    - created_at
    - updated_at
    - source_name
    filter: {}
- role: user
  permission:
    columns:
    - id
    - tenant_product_id
    - tenant_instance_id
    - alpha_tenant_instance_id
    - connection_id
    - is_active
    - config
    - created_at
    - updated_at
    - source_name
    filter: {}
- role: steward
  permission:
    columns:
    - id
    - tenant_product_id
    - tenant_instance_id
    - alpha_tenant_instance_id
    - connection_id
    - is_active
    - config
    - created_at
    - updated_at
    - source_name
    filter: {}
insert_permissions:
- role: user
  permission:
    check:
      tenant_product:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
    columns:
    - tenant_product_id
    - tenant_instance_id
    - alpha_tenant_instance_id
    - config
    - is_active
    - source_name
    - connection_id
- role: steward
  permission:
    check: {}
    columns:
    - tenant_product_id
    - tenant_instance_id
    - alpha_tenant_instance_id
    - config
    - is_active
    - source_name
    - connection_id
update_permissions:
- role: user
  permission:
    columns:
    - tenant_product_id
    - tenant_instance_id
    - alpha_tenant_instance_id
    - config
    - is_active
    - source_name
    - connection_id
    filter:
      tenant_product:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
- role: steward
  permission:
    columns:
    - tenant_product_id
    - tenant_instance_id
    - alpha_tenant_instance_id
    - config
    - is_active
    - source_name
    - connection_id
    filter: {}
delete_permissions:
- role: user
  permission:
    filter:
      tenant_product:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
- role: steward
  permission:
    filter: {}
