table:
  schema: public
  name: family_offices

object_relationships:
  - name: primary_advisor
    using:
      foreign_key_constraint_on: primary_advisor_id
  - name: backup_advisor
    using:
      foreign_key_constraint_on: backup_advisor_id
  - name: tenant
    using:
      foreign_key_constraint_on: tenant_id

array_relationships:
  - name: family_members
    using:
      foreign_key_constraint_on:
        column: family_id
        table:
          schema: public
          name: family_members
  - name: family_assets
    using:
      foreign_key_constraint_on:
        column: family_id
        table:
          schema: public
          name: family_assets
  - name: estate_entities
    using:
      foreign_key_constraint_on:
        column: family_id
        table:
          schema: public
          name: estate_entities
  - name: gift_history
    using:
      foreign_key_constraint_on:
        column: family_id
        table:
          schema: public
          name: gift_history
  - name: estate_plan_scenarios
    using:
      foreign_key_constraint_on:
        column: family_id
        table:
          schema: public
          name: estate_plan_scenarios

computed_fields:
  - name: current_estate_tax_liability
    definition:
      function:
        schema: public
        name: calculate_estate_tax_liability
    comment: "Calculates current estate tax liability based on total net worth"

select_permissions:
  - role: advisor
    permission:
      columns:
        - family_id
        - family_name
        - legal_entity_name
        - primary_advisor_id
        - backup_advisor_id
        - total_estimated_networth
        - total_liquid_assets
        - total_illiquid_assets
        - primary_state
        - estate_plan_status
        - governance_structure
        - generation_count
        - oldest_member_generation
        - youngest_member_generation
        - created_at
        - updated_at
      filter:
        _or:
          - primary_advisor_id: { _eq: X-Hasura-User-Id }
          - backup_advisor_id: { _eq: X-Hasura-User-Id }
      allow_aggregations: true

  - role: family_admin
    permission:
      columns:
        - family_id
        - family_name
        - legal_entity_name
        - total_estimated_networth
        - total_liquid_assets
        - total_illiquid_assets
        - primary_state
        - estate_plan_status
        - governance_structure
        - generation_count
        - created_at
        - updated_at
      filter:
        family_members:
          member_id: { _eq: X-Hasura-User-Id }
          is_family_admin: { _eq: true }
      allow_aggregations: true

  - role: family_member
    permission:
      columns:
        - family_id
        - family_name
        - total_estimated_networth
        - primary_state
        - estate_plan_status
        - created_at
      filter:
        family_members:
          member_id: { _eq: X-Hasura-User-Id }

insert_permissions:
  - role: advisor
    permission:
      check:
        primary_advisor_id: { _eq: X-Hasura-User-Id }
      columns:
        - family_name
        - legal_entity_name
        - primary_state
        - governance_structure
      backend_only: false

update_permissions:
  - role: advisor
    permission:
      columns:
        - family_name
        - legal_entity_name
        - backup_advisor_id
        - primary_state
        - governance_structure
      filter:
        _or:
          - primary_advisor_id: { _eq: X-Hasura-User-Id }
          - backup_advisor_id: { _eq: X-Hasura-User-Id }

  - role: family_admin
    permission:
      columns:
        - governance_structure
      filter:
        family_members:
          member_id: { _eq: X-Hasura-User-Id }
          is_family_admin: { _eq: true }

delete_permissions:
  - role: advisor
    permission:
      filter:
        primary_advisor_id: { _eq: X-Hasura-User-Id }
