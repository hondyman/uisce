table:
  name: tenant_product
  schema: public
object_relationships:
- name: tenant
  using:
    foreign_key_constraint_on: tenant_id
- name: tenant_instance
  using:
    foreign_key_constraint_on: tenant_instance_id
- name: alpha_product
  using:
    foreign_key_constraint_on: alpha_product_id
- name: product
  using:
    foreign_key_constraint_on: product_id
array_relationships:
- name: tenant_product_datasources
  using:
    foreign_key_constraint_on:
      column: tenant_product_id
      table:
        name: tenant_product_datasource
        schema: public
select_permissions:
- role: user
  permission:
    columns:
    - id
    - tenant_id
    - tenant_instance_id
    - product_id
    - alpha_product_id
    - created_at
    - updated_at
    - version
    - is_active
    filter: {}
- role: steward
  permission:
    columns:
    - id
    - tenant_id
    - tenant_instance_id
    - product_id
    - alpha_product_id
    - created_at
    - updated_at
    - version
    - is_active
    filter: {}
insert_permissions:
- role: user
  permission:
    check:
      tenant_id:
        _eq: X-Hasura-Tenant-Id
    columns:
    - tenant_id
    - product_id
    - alpha_product_id
    - version
    - is_active
- role: steward
  permission:
    check: {}
    columns:
    - tenant_id
    - product_id
    - alpha_product_id
    - version
    - is_active
update_permissions:
- role: user
  permission:
    columns:
    - version
    - is_active
    filter:
      tenant_id:
        _eq: X-Hasura-Tenant-Id
- role: steward
  permission:
    columns:
    - tenant_id
    - product_id
    - alpha_product_id
    - version
    - is_active
    filter: {}
delete_permissions:
- role: user
  permission:
    filter:
      tenant_id:
        _eq: X-Hasura-Tenant-Id
- role: steward
  permission:
    filter: {}
