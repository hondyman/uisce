- name: alpha
  kind: postgres
  configuration:
    connection_info:
      database_url:
        from_env: HASURA_GRAPHQL_DATABASE_URL
      isolation_level: read-committed
      pool_settings:
        connection_lifetime: 600
        max_connections: 50
      use_prepared_statements: true
  tables: "!include alpha/tables/tables.yaml"
- name: audit_db
  kind: postgres
  configuration:
    connection_info:
      database_url: postgres://hasura:pass@cube:5432/db

      pool_settings:
        connection_lifetime: 600
        max_connections: 50
      use_prepared_statements: false
  tables: "!include audit_db/tables/tables.yaml"
