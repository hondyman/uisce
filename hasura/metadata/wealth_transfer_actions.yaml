- name: generate_estate_plan
  definition:
    kind: synchronous
    handler: '{{BACKEND_URL}}/api/hasura/actions/generate-estate-plan'
    forward_client_headers: true
  permissions:
    - role: advisor
    - role: family_admin

- name: calculate_estate_tax
  definition:
    kind: synchronous
    handler: '{{BACKEND_URL}}/api/hasura/actions/calculate-estate-tax'
    forward_client_headers: true
  permissions:
    - role: advisor
    - role: family_admin
    - role: family_member

- name: optimize_gifting_strategy
  definition:
    kind: synchronous
    handler: '{{BACKEND_URL}}/api/hasura/actions/optimize-gifting'
    forward_client_headers: true
  permissions:
    - role: advisor
    - role: family_admin

- name: record_gift
  definition:
    kind: synchronous
    handler: '{{BACKEND_URL}}/api/hasura/actions/record-gift'
    forward_client_headers: true
  permissions:
    - role: advisor
    - role: family_admin

- name: validate_trust_compliance
  definition:
    kind: synchronous
    handler: '{{BACKEND_URL}}/api/hasura/actions/validate-trust-compliance'
    forward_client_headers: true
  permissions:
    - role: advisor
