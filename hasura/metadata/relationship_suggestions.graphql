# Improved GraphQL Definitions for Relationship Suggestions
# Add to Hasura metadata/actions.graphql or as remote schema

# Types
enum EdgeType {
  REFERENCE
  COMPOSITION
  ASSOCIATION
  FOREIGN_KEY
}
type BusinessObject {
  id: ID!
  name: String!
  kind: String!
  description: String
}
enum Direction {
  OUTBOUND
  INBOUND
}
type RelatedObject {
  edgeId: ID!
  direction: Direction!
  edgeType: EdgeType!
  cardinality: String
  source: BusinessObject!
  target: BusinessObject!
}
type RelationshipSuggestion {
  id: ID!
  title: String!
  description: String!
  sourceEntity: String!
  targetEntity: String!
  edgeType: EdgeType!
  cardinality: String
  fkColumn: String
  confidence: Float!
  reasoning: String!
  dismissible: Boolean!
}

# Queries
type Query {
  getRelatedObjects(
    tenantId: ID!
    datasourceId: ID!
    entity: String!
  ): [RelatedObject!]!
  getRelationshipSuggestions(
    tenantId: ID!
    datasourceId: ID!
    entity: String!
    limit: Int = 5
  ): [RelationshipSuggestion!]!
}

# Mutations
type Mutation {
  applyRelationship(
    tenantId: ID!
    datasourceId: ID!
    sourceEntity: String!
    targetEntity: String!
    edgeType: EdgeType!
    cardinality: String
    fkColumn: String
    confidence: Float
  ): RelatedObject!
  dismissRelationshipSuggestion(
    tenantId: ID!
    datasourceId: ID!
    suggestionId: ID!
    reason: String
  ): Boolean!
}