table:
  name: tenant_product
  schema: public
object_relationships:
- name: tenant_instance
  using:
    foreign_key_constraint_on: tenant_instance_id
- name: product
  using:
    foreign_key_constraint_on: product_id
array_relationships:
- name: tenant_product_datasources
  using:
    foreign_key_constraint_on:
      column: tenant_product_id
      table:
        name: tenant_product_datasources
        schema: public
insert_permissions:
  - role: admin
    permission:
      check: {}
      columns:
        - id
        - tenant_instance_id
        - product_id
select_permissions:
  - role: admin
    permission:
      columns:
        - id
        - tenant_instance_id
        - product_id
      filter: {}
update_permissions:
  - role: admin
    permission:
      columns:
        - id
        - tenant_instance_id
        - product_id
      filter: {}
delete_permissions:
  - role: admin
    permission:
      filter: {}
