table:
  name: tenants
  schema: public
array_relationships:
- name: tenant_instances
  using:
    foreign_key_constraint_on:
      column: tenant_id
      table:
        name: tenant_instance
        schema: public
- name: api_definitions
  using:
    foreign_key_constraint_on:
      column: tenant_id
      table:
        name: api_definitions
        schema: public
insert_permissions:
  - role: admin
    permission:
      check: {}
      columns:
        - display_name
        - id
        - name
select_permissions:
  - role: admin
    permission:
      columns:
        - display_name
        - id
        - name
      filter: {}
update_permissions:
  - role: admin
    permission:
      columns:
        - display_name
        - id
        - name
      filter: {}
delete_permissions:
  - role: admin
    permission:
      filter: {}
