table:
  name: tenant_instance
  schema: public
object_relationships:
- name: tenant
  using:
    foreign_key_constraint_on: tenant_id
array_relationships:
- name: datasources
  using:
    foreign_key_constraint_on:
      column: instance_id
      table:
        name: datasources
        schema: public
- name: tenant_products
  using:
    foreign_key_constraint_on:
      column: tenant_instance_id
      table:
        name: tenant_product
        schema: public
insert_permissions:
  - role: admin
    permission:
      check: {}
      columns:
        - tenant_id
        - display_name
        - id
        - name
select_permissions:
  - role: admin
    permission:
      columns:
        - tenant_id
        - display_name
        - id
        - name
      filter: {}
update_permissions:
  - role: admin
    permission:
      columns:
        - tenant_id
        - display_name
        - id
        - name
      filter: {}
delete_permissions:
  - role: admin
    permission:
      filter: {}
