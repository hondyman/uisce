# Prometheus AlertManager Rules for Semlayer
# Deploy to Prometheus/AlertManager

groups:
# =============================================================================
# SLO Alerts - Critical for Production
# =============================================================================
- name: semlayer.slo.alerts
  rules:
  # Availability SLO Breach
  - alert: AvailabilitySLOBreach
    expr: |
      (
        1 - (
          sum(rate(http_requests_total{job=~"api-gateway|semantic-engine", code=~"5.."}[5m]))
          / sum(rate(http_requests_total{job=~"api-gateway|semantic-engine"}[5m]))
        )
      ) < 0.999
    for: 5m
    labels:
      severity: critical
      team: platform
    annotations:
      summary: "Availability SLO breach detected"
      description: "Service availability is {{ $value | humanizePercentage }}, below 99.9% SLO"
      runbook_url: "https://docs.semlayer.io/runbooks/availability-breach"

  # Latency SLO Breach
  - alert: LatencySLOBreach
    expr: |
      histogram_quantile(0.95, 
        sum(rate(http_request_duration_seconds_bucket{job=~"api-gateway|semantic-engine"}[5m])) by (le)
      ) > 0.2
    for: 5m
    labels:
      severity: critical
      team: platform
    annotations:
      summary: "P95 latency SLO breach"
      description: "P95 latency is {{ $value | humanizeDuration }}, above 200ms SLO"
      runbook_url: "https://docs.semlayer.io/runbooks/latency-breach"

  # Error Rate SLO Breach
  - alert: ErrorRateSLOBreach
    expr: |
      sum(rate(http_requests_total{job=~"api-gateway|semantic-engine", code=~"5.."}[5m]))
      / sum(rate(http_requests_total{job=~"api-gateway|semantic-engine"}[5m]))
      > 0.001
    for: 5m
    labels:
      severity: critical
      team: platform
    annotations:
      summary: "Error rate SLO breach"
      description: "Error rate is {{ $value | humanizePercentage }}, above 0.1% SLO"
      runbook_url: "https://docs.semlayer.io/runbooks/error-rate-breach"

  # Error Budget Burn Rate (Fast Burn)
  - alert: ErrorBudgetFastBurn
    expr: |
      (
        sum(rate(http_requests_total{job=~"api-gateway|semantic-engine", code=~"5.."}[1h]))
        / sum(rate(http_requests_total{job=~"api-gateway|semantic-engine"}[1h]))
      ) > (14.4 * 0.001)
    for: 2m
    labels:
      severity: critical
      team: platform
    annotations:
      summary: "Error budget burning too fast"
      description: "Error budget burn rate indicates budget exhaustion in < 1 day"
      runbook_url: "https://docs.semlayer.io/runbooks/error-budget-burn"

  # Error Budget Burn Rate (Slow Burn)
  - alert: ErrorBudgetSlowBurn
    expr: |
      (
        sum(rate(http_requests_total{job=~"api-gateway|semantic-engine", code=~"5.."}[6h]))
        / sum(rate(http_requests_total{job=~"api-gateway|semantic-engine"}[6h]))
      ) > (3 * 0.001)
    for: 15m
    labels:
      severity: warning
      team: platform
    annotations:
      summary: "Error budget burning faster than expected"
      description: "Error budget burn rate indicates budget exhaustion in < 4 days"
      runbook_url: "https://docs.semlayer.io/runbooks/error-budget-burn"

# =============================================================================
# Service Health Alerts
# =============================================================================
- name: semlayer.service.alerts
  rules:
  # Service Down
  - alert: ServiceDown
    expr: up{job=~"api-gateway|semantic-engine|cube-api|rule-engine|compliance-engine"} == 0
    for: 1m
    labels:
      severity: critical
      team: platform
    annotations:
      summary: "Service {{ $labels.job }} is down"
      description: "{{ $labels.job }} on {{ $labels.instance }} has been down for more than 1 minute"
      runbook_url: "https://docs.semlayer.io/runbooks/service-down"

  # Pod Crash Looping
  - alert: PodCrashLooping
    expr: |
      increase(kube_pod_container_status_restarts_total{namespace=~"semlayer.*"}[1h]) > 5
    for: 5m
    labels:
      severity: warning
      team: platform
    annotations:
      summary: "Pod {{ $labels.pod }} is crash looping"
      description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} restarted {{ $value }} times in the last hour"
      runbook_url: "https://docs.semlayer.io/runbooks/pod-crash-loop"

  # High Restart Count
  - alert: HighRestartCount
    expr: |
      kube_pod_container_status_restarts_total{namespace=~"semlayer.*"} > 10
    for: 5m
    labels:
      severity: warning
      team: platform
    annotations:
      summary: "Pod {{ $labels.pod }} has high restart count"
      description: "Pod {{ $labels.pod }} has restarted {{ $value }} times"
      runbook_url: "https://docs.semlayer.io/runbooks/high-restart-count"

  # Pending Pods
  - alert: PodPending
    expr: |
      kube_pod_status_phase{namespace=~"semlayer.*", phase="Pending"} == 1
    for: 10m
    labels:
      severity: warning
      team: platform
    annotations:
      summary: "Pod {{ $labels.pod }} is pending"
      description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has been pending for more than 10 minutes"
      runbook_url: "https://docs.semlayer.io/runbooks/pod-pending"

# =============================================================================
# Resource Alerts
# =============================================================================
- name: semlayer.resource.alerts
  rules:
  # High CPU Usage
  - alert: HighCPUUsage
    expr: |
      (
        sum(rate(container_cpu_usage_seconds_total{namespace=~"semlayer.*", container!=""}[5m])) by (pod)
        / sum(kube_pod_container_resource_limits{namespace=~"semlayer.*", resource="cpu"}) by (pod)
      ) > 0.85
    for: 10m
    labels:
      severity: warning
      team: platform
    annotations:
      summary: "High CPU usage on {{ $labels.pod }}"
      description: "CPU usage is {{ $value | humanizePercentage }} for pod {{ $labels.pod }}"
      runbook_url: "https://docs.semlayer.io/runbooks/high-cpu"

  # High Memory Usage
  - alert: HighMemoryUsage
    expr: |
      (
        sum(container_memory_working_set_bytes{namespace=~"semlayer.*", container!=""}) by (pod)
        / sum(kube_pod_container_resource_limits{namespace=~"semlayer.*", resource="memory"}) by (pod)
      ) > 0.85
    for: 10m
    labels:
      severity: warning
      team: platform
    annotations:
      summary: "High memory usage on {{ $labels.pod }}"
      description: "Memory usage is {{ $value | humanizePercentage }} for pod {{ $labels.pod }}"
      runbook_url: "https://docs.semlayer.io/runbooks/high-memory"

  # Critical Memory Usage
  - alert: CriticalMemoryUsage
    expr: |
      (
        sum(container_memory_working_set_bytes{namespace=~"semlayer.*", container!=""}) by (pod)
        / sum(kube_pod_container_resource_limits{namespace=~"semlayer.*", resource="memory"}) by (pod)
      ) > 0.95
    for: 5m
    labels:
      severity: critical
      team: platform
    annotations:
      summary: "Critical memory usage on {{ $labels.pod }}"
      description: "Memory usage is {{ $value | humanizePercentage }} for pod {{ $labels.pod }} - OOM kill imminent"
      runbook_url: "https://docs.semlayer.io/runbooks/critical-memory"

  # PVC Usage High
  - alert: PVCUsageHigh
    expr: |
      (
        kubelet_volume_stats_used_bytes{namespace=~"semlayer.*"}
        / kubelet_volume_stats_capacity_bytes{namespace=~"semlayer.*"}
      ) > 0.85
    for: 10m
    labels:
      severity: warning
      team: platform
    annotations:
      summary: "PVC {{ $labels.persistentvolumeclaim }} usage high"
      description: "PVC {{ $labels.persistentvolumeclaim }} is {{ $value | humanizePercentage }} full"
      runbook_url: "https://docs.semlayer.io/runbooks/pvc-usage-high"

# =============================================================================
# Database Alerts
# =============================================================================
- name: semlayer.database.alerts
  rules:
  # Database Connection Pool Exhaustion
  - alert: DatabaseConnectionPoolExhausted
    expr: |
      go_sql_open_connections{job=~"api-gateway|semantic-engine"}
      / go_sql_max_open_connections{job=~"api-gateway|semantic-engine"}
      > 0.85
    for: 5m
    labels:
      severity: warning
      team: platform
    annotations:
      summary: "Database connection pool near exhaustion"
      description: "Connection pool for {{ $labels.job }} is {{ $value | humanizePercentage }} utilized"
      runbook_url: "https://docs.semlayer.io/runbooks/connection-pool-exhausted"

  # Slow Queries
  - alert: SlowQueries
    expr: |
      histogram_quantile(0.95, 
        sum(rate(go_sql_query_duration_seconds_bucket{job=~"api-gateway|semantic-engine"}[5m])) by (le)
      ) > 1
    for: 10m
    labels:
      severity: warning
      team: platform
    annotations:
      summary: "Slow database queries detected"
      description: "P95 query duration is {{ $value | humanizeDuration }}"
      runbook_url: "https://docs.semlayer.io/runbooks/slow-queries"

  # Database Replication Lag
  - alert: DatabaseReplicationLag
    expr: |
      pg_replication_lag_seconds > 30
    for: 5m
    labels:
      severity: warning
      team: platform
    annotations:
      summary: "Database replication lag detected"
      description: "Replication lag is {{ $value | humanizeDuration }}"
      runbook_url: "https://docs.semlayer.io/runbooks/replication-lag"

# =============================================================================
# Redis/Cache Alerts
# =============================================================================
- name: semlayer.cache.alerts
  rules:
  # Redis Down
  - alert: RedisDown
    expr: redis_up == 0
    for: 1m
    labels:
      severity: critical
      team: platform
    annotations:
      summary: "Redis is down"
      description: "Redis instance {{ $labels.instance }} is not responding"
      runbook_url: "https://docs.semlayer.io/runbooks/redis-down"

  # Redis Memory High
  - alert: RedisMemoryHigh
    expr: |
      redis_memory_used_bytes / redis_memory_max_bytes > 0.85
    for: 10m
    labels:
      severity: warning
      team: platform
    annotations:
      summary: "Redis memory usage high"
      description: "Redis memory is {{ $value | humanizePercentage }} full"
      runbook_url: "https://docs.semlayer.io/runbooks/redis-memory-high"

  # Cache Hit Rate Low
  - alert: CacheHitRateLow
    expr: |
      (
        sum(rate(redis_keyspace_hits_total[5m]))
        / (sum(rate(redis_keyspace_hits_total[5m])) + sum(rate(redis_keyspace_misses_total[5m])))
      ) < 0.85
    for: 15m
    labels:
      severity: warning
      team: platform
    annotations:
      summary: "Cache hit rate is low"
      description: "Cache hit rate is {{ $value | humanizePercentage }}"
      runbook_url: "https://docs.semlayer.io/runbooks/cache-hit-rate-low"

# =============================================================================
# Queue/Message Alerts
# =============================================================================
- name: semlayer.queue.alerts
  rules:
  # Queue Backlog Growing
  - alert: QueueBacklogGrowing
    expr: |
      increase(azure_servicebus_queue_message_count[15m]) > 1000
    for: 10m
    labels:
      severity: warning
      team: platform
    annotations:
      summary: "Queue backlog is growing"
      description: "Queue {{ $labels.queue }} backlog increased by {{ $value }} messages"
      runbook_url: "https://docs.semlayer.io/runbooks/queue-backlog"

  # Dead Letter Queue Growing
  - alert: DeadLetterQueueGrowing
    expr: |
      azure_servicebus_queue_dead_letter_message_count > 100
    for: 5m
    labels:
      severity: warning
      team: platform
    annotations:
      summary: "Dead letter queue has messages"
      description: "Dead letter queue {{ $labels.queue }} has {{ $value }} messages"
      runbook_url: "https://docs.semlayer.io/runbooks/dead-letter-queue"

# =============================================================================
# Cube.js Specific Alerts
# =============================================================================
- name: semlayer.cube.alerts
  rules:
  # Pre-aggregation Build Failed
  - alert: CubePreAggBuildFailed
    expr: |
      increase(cube_preagg_build_failures_total[1h]) > 0
    for: 5m
    labels:
      severity: warning
      team: analytics
    annotations:
      summary: "Cube.js pre-aggregation build failed"
      description: "Pre-aggregation {{ $labels.preagg }} failed to build"
      runbook_url: "https://docs.semlayer.io/runbooks/cube-preagg-failed"

  # Query Queue Growing
  - alert: CubeQueryQueueGrowing
    expr: |
      cube_query_queue_size > 100
    for: 5m
    labels:
      severity: warning
      team: analytics
    annotations:
      summary: "Cube.js query queue is growing"
      description: "Query queue size is {{ $value }}"
      runbook_url: "https://docs.semlayer.io/runbooks/cube-query-queue"

  # Slow Queries
  - alert: CubeSlowQueries
    expr: |
      histogram_quantile(0.95, 
        sum(rate(cube_query_duration_seconds_bucket[5m])) by (le)
      ) > 30
    for: 10m
    labels:
      severity: warning
      team: analytics
    annotations:
      summary: "Cube.js queries are slow"
      description: "P95 query duration is {{ $value | humanizeDuration }}"
      runbook_url: "https://docs.semlayer.io/runbooks/cube-slow-queries"

# =============================================================================
# Security Alerts
# =============================================================================
- name: semlayer.security.alerts
  rules:
  # High Authentication Failures
  - alert: HighAuthenticationFailures
    expr: |
      sum(rate(auth_failures_total[5m])) > 10
    for: 5m
    labels:
      severity: warning
      team: security
    annotations:
      summary: "High authentication failure rate"
      description: "Authentication failures: {{ $value }} per second"
      runbook_url: "https://docs.semlayer.io/runbooks/auth-failures"

  # Rate Limiting Triggered
  - alert: RateLimitingTriggered
    expr: |
      sum(rate(http_requests_total{code="429"}[5m])) > 50
    for: 5m
    labels:
      severity: warning
      team: platform
    annotations:
      summary: "Rate limiting being triggered frequently"
      description: "{{ $value }} requests per second being rate limited"
      runbook_url: "https://docs.semlayer.io/runbooks/rate-limiting"

  # Certificate Expiry
  - alert: CertificateExpirySoon
    expr: |
      (
        probe_ssl_earliest_cert_expiry - time()
      ) / 86400 < 30
    for: 1h
    labels:
      severity: warning
      team: platform
    annotations:
      summary: "TLS certificate expiring soon"
      description: "Certificate for {{ $labels.instance }} expires in {{ $value }} days"
      runbook_url: "https://docs.semlayer.io/runbooks/cert-expiry"

  # Critical Certificate Expiry
  - alert: CertificateExpiryCritical
    expr: |
      (
        probe_ssl_earliest_cert_expiry - time()
      ) / 86400 < 7
    for: 1h
    labels:
      severity: critical
      team: platform
    annotations:
      summary: "TLS certificate expiring very soon"
      description: "Certificate for {{ $labels.instance }} expires in {{ $value }} days"
      runbook_url: "https://docs.semlayer.io/runbooks/cert-expiry-critical"
