global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
- job_name: 'prometheus'
  static_configs:
  - targets: [ 'localhost:9090' ]

- job_name: 'ai-builder'
  static_configs:
  - targets: [ 'ai-builder:8081' ]
  metrics_path: '/metrics'
  scrape_interval: 5s

- job_name: 'compliance-engine'
  static_configs:
  - targets: [ 'compliance-engine:8082' ]
  metrics_path: '/metrics'
  scrape_interval: 5s

- job_name: 'temporal'
  static_configs:
  - targets: [ 'temporal:7233' ]
  metrics_path: '/metrics'
  scrape_interval: 10s

- job_name: 'rabbitmq'
  static_configs:
  - targets: [ 'rabbitmq:15692' ]
  metrics_path: '/metrics'
  scrape_interval: 10s

- job_name: 'postgres'
  static_configs:
  - targets: [ 'postgres:5432' ]
  scrape_interval: 10s
