cubes:
  - name: customers
    sql_table: public.customers
    data_source: default
    title: Customers

    measures:
      - name: count
        type: count

    dimensions:
      
      - name: id
        sql: id
        type: number
        primary_key: true
      
      - name: name
        sql: name
        type: string
        
      
      - name: email
        sql: email
        type: string
        
      

    
    hierarchies:
      
      - name: customer_hierarchy
        title: Customer Hierarchy
        levels:
          
          - country
          
          - city
          
          - name
          
        
      
    

    
    segments:
      
      - name: active_customers
        description: Active customers only
        sql: status = 'active'
        
      
    
