actions:
- name: applyRelationship
  definition:
    kind: synchronous
    handler: http://api-gateway:8000/api/relationships/apply
    forward_client_headers: true
    request_transform:
      version: 2
      template_engine: Kriti
      url: 'http://api-gateway:8000/api/relationships/apply?tenant_id={{$body.variables.tenantId}}&datasource_id={{$body.variables.datasourceId}}'
      body:
        action: transform
        template: |
          {
            "sourceEntity": {{$body.variables.sourceEntity | @json}},
            "targetEntity": {{$body.variables.targetEntity | @json}},
            "edgeType": {{$body.variables.edgeType | @json}},
            "cardinality": {{$body.variables.cardinality | @json}},
            "fkColumn": {{$body.variables.fkColumn | @json}},
            "confidence": {{$body.variables.confidence}}
          }
    headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value_from_env: API_GATEWAY_AUTH_TOKEN
- name: dismissRelationshipSuggestion
  definition:
    kind: synchronous
    handler: http://api-gateway:8000/api/relationships/suggestions/dismiss
    forward_client_headers: true
    request_transform:
      version: 2
      template_engine: Kriti
      url: 'http://api-gateway:8000/api/relationships/suggestions/dismiss?tenant_id={{$body.variables.tenantId}}&datasource_id={{$body.variables.datasourceId}}'
      body:
        action: transform
        template: |
          {
            "suggestionId": {{$body.variables.suggestionId | @json}},
            "reason": {{$body.variables.reason | @json}}
          }
    headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value_from_env: API_GATEWAY_AUTH_TOKEN
- name: dynamic_delete
  definition:
    kind: synchronous
    handler: http://backend-local:8080/actions/dynamic-delete
    forward_client_headers: true
    headers:
    - name: Content-Type
      value: application/json
- name: dynamic_insert
