      value: application/json
- name: getRelatedObjects
  definition:
    kind: ""
    handler: http://api-gateway:8000/api/relationships/objects
    forward_client_headers: true
    request_transform:
      version: 2
      template_engine: Kriti
      url: 'http://api-gateway:8000/api/relationships/objects?tenant_id={{$body.variables.tenantId}}&datasource_id={{$body.variables.datasourceId}}&entity={{$body.variables.entity}}'
      body:
        action: remove
    headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value_from_env: API_GATEWAY_AUTH_TOKEN
- name: getRelationshipSuggestions
  definition:
    kind: ""
