    forward_client_headers: true
    request_transform:
      version: 2
      template_engine: Kriti
      url: 'http://api-gateway:8000/api/relationships/suggestions?tenant_id={{$body.variables.tenantId}}&datasource_id={{$body.variables.datasourceId}}&entity={{$body.variables.entity}}&limit={{$body.variables.limit}}'
      body:
        action: remove
    headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value_from_env: API_GATEWAY_AUTH_TOKEN
- name: get_semantic_lineage
  definition:
    kind: ""
    handler: http://api-gateway:8000/api/lineage/semantic
    forward_client_headers: true
    request_transform:
      version: 2
      template_engine: Kriti
      # Pass optional tenant/datasource if provided as variables
      url: 'http://api-gateway:8000/api/lineage/semantic?entity={{$body.variables.entity}}&tenant_id={{$body.variables.tenant_id}}&datasource_id={{$body.variables.datasource_id}}'
      body:
        action: remove
    headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value_from_env: API_GATEWAY_AUTH_TOKEN
- name: search_business_terms
