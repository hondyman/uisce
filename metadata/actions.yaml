      value: application/json
    - name: Authorization
      value_from_env: API_GATEWAY_AUTH_TOKEN
custom_types:
  enums:
  - name: EdgeType
    values:
    - description: null
      is_deprecated: null
      value: REFERENCE
    - description: null
      is_deprecated: null
      value: COMPOSITION
    - description: null
      is_deprecated: null
      value: ASSOCIATION
    - description: null
      is_deprecated: null
      value: FOREIGN_KEY
  - name: Direction
    values:
    - description: null
      is_deprecated: null
      value: OUTBOUND
    - description: null
      is_deprecated: null
      value: INBOUND
  input_objects: []
  objects:
  - name: LineageNode
  - name: LineageEdge
  - name: LineageResponse
  - name: BusinessTerm
  - name: SearchBusinessTermsResponse
  - name: ValidationResponse
  - name: GenericActionResponse
  - name: RelatedObject
  - name: RelationshipSuggestion
  - name: ApplyRelationshipResponse
  - name: DismissSuggestionResponse
  scalars:
  - name: jsonb
  - name: uuid
