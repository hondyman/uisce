name: Lint React Hooks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-react-hooks:
    name: Lint (react-hooks)
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install frontend dependencies
      run: npm ci
      working-directory: frontend

    - name: Run focused react-hooks lint
      run: npm run lint:react-hooks
      working-directory: frontend
    # Note: this job intentionally runs only the focused react-hooks lint
    # so that hook-order violations fail the CI job while unrelated warnings
    # in the wider codebase do not block PRs.
