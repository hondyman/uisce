name: Opt-in E2E (Docker)

on:
  workflow_dispatch:
    inputs:
      run_e2e:
        description: 'Set to true to run the Docker-backed E2E profiler test'
        required: false
        default: 'false'

jobs:
  e2e-profiler:
    if: "github.event.inputs.run_e2e == 'true'"
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.20'

    - name: Enable Docker (ensure runner has Docker)
      run: |
        docker --version || (sudo apt-get update && sudo apt-get install -y docker.io)

    - name: Run profiler E2E test (opt-in)
      env:
        RUN_PROFILER_E2E: '1'
      run: |
        cd backend/internal/api
        go test -v -run TestProfilerE2E
