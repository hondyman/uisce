name: Temporal Ops CI

on:
  push:
    paths:
    - 'tools/temporal-ops/**'
  pull_request:
    paths:
    - 'tools/temporal-ops/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.20'

    - name: Build temporal-ops
      run: |
        cd tools/temporal-ops
        GOWORK=off go build -v -o temporal-ops

    - name: Run tests
      run: |
        cd tools/temporal-ops
        GOWORK=off go test ./...

    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: temporal-ops-binary
        path: tools/temporal-ops/temporal-ops
