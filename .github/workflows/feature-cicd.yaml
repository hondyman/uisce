name: Feature CI/CD - Phase 3.21

on:
  pull_request:
    paths:
    - 'backend/sql/Feature_definitions/**'
    - 'spark_jobs/**'
    - 'importance_service/**'
    - 'drift_service/**'
    - '.github/workflows/feature-cicd.yaml'
  push:
    branches:
    - main
    paths:
    - 'backend/sql/Feature_definitions/**'

env:
  REGISTRY: ghcr.io
  POSTGRES_HOST: localhost
  POSTGRES_PORT: 5432
  POSTGRES_USER: test
  POSTGRES_PASSWORD: test
  POSTGRES_DB: semlayer_test

jobs:
  feature-validation:
    name: Feature Definition Validation
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
        ports:
        - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install PostgreSQL client
      run: |
        sudo apt-get update
        sudo apt-get install -y postgresql-client

    - name: Initialize test database
      run: |
        psql "postgresql://${{ env.POSTGRES_USER }}:${{ env.POSTGRES_PASSWORD }}@${{ env.POSTGRES_HOST }}:${{ env.POSTGRES_PORT }}/${{ env.POSTGRES_DB }}" \
          -f backend/sql/phase_3_21_schema.sql

    - name: Validate feature JSONs
      run: |
        python scripts/validate_features.py \
          --definitions-dir backend/sql/feature_definitions \
          --schema-file backend/sql/feature-schema.json

    - name: Validate feature tests
      run: |
        python scripts/validate_feature_tests.py \
          --definitions-dir backend/sql/feature_definitions

    - name: Check feature metadata
      run: |
        python scripts/check_feature_metadata.py \
          --definitions-dir backend/sql/feature_definitions \
          --required-fields owner,feature_type,expression

  unit-tests:
    name: Feature Unit Tests
    runs-on: ubuntu-latest
    needs: feature-validation

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install -r drift_service/requirements.txt
        pip install -r importance_service/requirements.txt
        pip install pytest pytest-cov pytest-asyncio

    - name: Run drift algorithm tests
      run: |
        pytest drift_service/tests/test_ks.py -v --cov=drift_service/app/drift
        pytest drift_service/tests/test_psi.py -v
        pytest drift_service/tests/test_chi2.py -v
        pytest drift_service/tests/test_classifier.py -v

    - name: Run importance tests
      run: |
        pytest importance_service/tests/test_shap.py -v
        pytest importance_service/tests/test_stability.py -v

    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml

  integration-tests:
    name: Feature Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
        ports:
        - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install -r drift_service/requirements.txt
        pip install -r importance_service/requirements.txt
        pip install pytest docker

    - name: Initialize test database
      run: |
        psql "postgresql://${{ env.POSTGRES_USER }}:${{ env.POSTGRES_PASSWORD }}@${{ env.POSTGRES_HOST }}:${{ env.POSTGRES_PORT }}/${{ env.POSTGRES_DB }}" \
          -f backend/sql/phase_3_21_schema.sql

    - name: Load sample data
      run: |
        psql "postgresql://${{ env.POSTGRES_USER }}:${{ env.POSTGRES_PASSWORD }}@${{ env.POSTGRES_HOST }}:${{ env.POSTGRES_PORT }}/${{ env.POSTGRES_DB }}" \
          -f backend/sql/sample_data.sql

    - name: Run drift detection integration tests
      env:
        POSTGRES_HOST: localhost
      run: |
        pytest drift_service/tests/test_integration.py -v -s

    - name: Run feature materialization tests
      run: |
        pytest spark_jobs/tests/test_materialization.py -v

  security-scan:
    name: Security & Dependency Scan
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        exit-code: '1'
        ignore-unfixed: true
        severity: 'CRITICAL,HIGH'

    - name: Check for secrets
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: ${{ github.event.repository.default_branch }}
        head: HEAD
        extra_args: --debug --maxfilesize=5000000

  linting:
    name: Code Quality & Linting
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install linters
      run: |
        pip install black flake8 isort pylint mypy

    - name: Format check
      run: |
        black --check drift_service importance_service spark_jobs

    - name: Lint
      run: |
        flake8 drift_service importance_service --max-line-length=120 --extend-ignore=E203,W503

    - name: Type check
      run: |
        mypy drift_service importance_service --ignore-missing-imports

  approval-check:
    name: Feature Approval Gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
    - uses: actions/checkout@v4

    - name: Check for approval requirement
      run: |
        python scripts/check_approval_required.py \
          --pr-number ${{ github.event.number }} \
          --repo ${{ github.repository }}

    - name: Verify feature not deprecated
      run: |
        python scripts/check_deprecated_features.py \
          --definitions-dir backend/sql/feature_definitions

    - name: Check feature versioning
      run: |
        python scripts/validate_feature_versions.py \
          --definitions-dir backend/sql/feature_definitions

  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [ unit-tests, integration-tests, security-scan, linting ]

    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to registry
      uses: docker/login-action@v2
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push drift service
      uses: docker/build-push-action@v4
      with:
        context: ./drift_service
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ github.repository }}/drift-detection:3.21.0
          ${{ env.REGISTRY }}/${{ github.repository }}/drift-detection:latest

    - name: Build and push importance service
      uses: docker/build-push-action@v4
      with:
        context: ./importance_service
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ github.repository }}/importance-service:3.21.0
          ${{ env.REGISTRY }}/${{ github.repository }}/importance-service:latest

  notify:
    name: Notifications
    runs-on: ubuntu-latest
    if: always()
    needs: [ feature-validation, unit-tests, integration-tests ]

    steps:
    - name: Post to Slack
      if: failure()
      uses: slackapi/slack-github-action@v1
      with:
        payload: |
          {
            "text": "Phase 3.21 Feature CI/CD: ${{ job.status }}",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Feature Engineering CI/CD*\n*Status*: ${{ job.status }}\n*Branch*: ${{ github.ref }}\n*Author*: ${{ github.actor }}"
                }
              }
            ]
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
