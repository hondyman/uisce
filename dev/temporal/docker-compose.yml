version: '3.8'

services:
  postgres-temporal:
    image: postgres:15
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal -d temporal"]
      interval: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.27.0
    environment:
      - DB=postgres
      - POSTGRES_SEEDS=postgres-temporal:5432
      - DB_PORT=5432
      - DB_USER=temporal
      - DB_PWD=temporal
      - DB_NAME=temporal
    depends_on:
      - postgres-temporal
    ports:
      - "7233:7233"
      - "8080:8080" # Temporal web UI (if enabled in this image)
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7233/ || exit 1"]
      interval: 5s
      retries: 12

  temporal-admin:
    image: temporalio/cli:1.27.0
    entrypoint: ["/bin/sh", "-c", "sleep 5; /bin/sh"]
    depends_on:
      - temporal
    tty: true

networks:
  default:
    driver: bridge
