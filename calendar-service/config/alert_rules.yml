groups:
- name: calendar_service_alerts
  interval: 30s
  rules:
  # == CRITICAL ALERTS ==

  - alert: ServiceDown
    expr: up{job="calendar-service"} == 0
    for: 1m
    labels:
      severity: critical
      service: calendar-service
    annotations:
      summary: "Calendar service is DOWN 🔴"
      description: "Service {{ $labels.instance }} has been unreachable for 1+ minutes"
      runbook: "https://wiki.example.com/calendar-service/down"
      dashboard: "https://grafana.example.com/d/calendar-service"

  - alert: HighErrorRate
    expr: |
      (
        sum(rate(http_requests_total{job="calendar-service",status=~"5.."}[5m])) /
        sum(rate(http_requests_total{job="calendar-service"}[5m]))
      ) > 0.05
    for: 5m
    labels:
      severity: critical
      service: calendar-service
    annotations:
      summary: "High error rate (> 5%) 🚨"
      description: "Error rate is {{ $value | humanizePercentage }} on {{ $labels.instance }}"
      runbook: "https://wiki.example.com/calendar-service/high-error"

  - alert: DatabaseDown
    expr: pg_up{job="postgres"} == 0
    for: 1m
    labels:
      severity: critical
      service: postgres
    annotations:
      summary: "Database is DOWN 🔴"
      description: "PostgreSQL {{ $labels.instance }} is unreachable"
      runbook: "https://wiki.example.com/database/down"

  - alert: DiskSpaceCritical
    expr: |
      (
        node_filesystem_avail_bytes{mountpoint="/"} /
        node_filesystem_size_bytes{mountpoint="/"}
      ) < 0.10
    for: 5m
    labels:
      severity: critical
    annotations:
      summary: "Disk space critical (< 10%) 🚨"
      description: "{{ $labels.instance }} has {{ $value | humanizePercentage }} disk space remaining"

  # == WARNING ALERTS ==

  - alert: HighLatency
    expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job="calendar-service"}[5m])) > 1
    for: 5m
    labels:
      severity: warning
      service: calendar-service
    annotations:
      summary: "High API latency (p95 > 1s) ⏱️"
      description: "P95 latency on {{ $labels.instance }} is {{ $value | humanizeDuration }}"
      runbook: "https://wiki.example.com/calendar-service/high-latency"

  - alert: RateLimitingTriggered
    expr: increase(http_requests_total{job="calendar-service",status="429"}[5m]) > 50
    for: 5m
    labels:
      severity: warning
      service: calendar-service
    annotations:
      summary: "Rate limiting being triggered frequently 🚦"
      description: "429 responses: {{ $value }} in last 5 minutes on {{ $labels.instance }}"

  - alert: JWTValidationFailures
    expr: increase(auth_jwt_validation_failures_total[5m]) > 100
    for: 5m
    labels:
      severity: warning
      service: calendar-service
    annotations:
      summary: "High JWT validation failures 🔐"
      description: "JWT validation failures: {{ $value }} in last 5 minutes"

  - alert: AuditLogBacklog
    expr: audit_queue_depth > 1000
    for: 5m
    labels:
      severity: warning
      service: calendar-service
    annotations:
      summary: "Audit log queue backlog detected 📝"
      description: "Audit queue depth: {{ $value }} entries"

  - alert: DatabaseConnectionPoolWarning
    expr: |
      (
        pg_stat_activity_count /
        on(instance) pg_settings_max_connections
      ) > 0.8
    for: 5m
    labels:
      severity: warning
      service: postgres
    annotations:
      summary: "Database connection pool at 80%+ capacity 📊"
      description: "Active connections: {{ $value | humanizePercentage }} on {{ $labels.instance }}"

  - alert: MemoryUsageHigh
    expr: |
      (
        container_memory_usage_bytes{pod_name="calendar-service"} /
        container_spec_memory_limit_bytes{pod_name="calendar-service"}
      ) > 0.85
    for: 10m
    labels:
      severity: warning
      service: calendar-service
    annotations:
      summary: "High memory usage (> 85%) 💾"
      description: "Memory usage on {{ $labels.pod_name }} is {{ $value | humanizePercentage }}"

  - alert: CPUUsageHigh
    expr: |
      rate(container_cpu_usage_seconds_total{pod_name="calendar-service"}[5m]) > 0.8
    for: 10m
    labels:
      severity: warning
      service: calendar-service
    annotations:
      summary: "High CPU usage (> 80%) ⚙️"
      description: "CPU usage on {{ $labels.pod_name }} is {{ $value | humanizePercentage }}"

  # == INFO ALERTS ==

  - alert: CertificateExpiringSoon
    expr: certmanager_certificate_expiration_timestamp_seconds - time() < 7 * 24 * 3600
    for: 1h
    labels:
      severity: info
    annotations:
      summary: "TLS certificate expiring in less than 7 days ⏰"
      description: "Certificate for {{ $labels.name }} expires in {{ $value | humanizeDuration }}"

  - alert: DeploymentRollingUpdate
    expr: kube_deployment_status_replicas_updated{namespace="calendar-service"} != kube_deployment_spec_replicas{namespace="calendar-service"}
    for: 10m
    labels:
      severity: info
    annotations:
      summary: "Deployment rolling update in progress 🔄"
      description: "{{ $labels.deployment }} update in progress"
