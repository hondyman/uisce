apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: calendar-service
  namespace: calendar-staging
  labels:
    environment: staging
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-staging"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/enable-cors: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - calendar-staging.example.com
    secretName: calendar-staging-tls
  rules:
  - host: calendar-staging.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: staging-calendar-service
            port:
              number: 80
