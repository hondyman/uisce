apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: calendar

bases:
- ../../base

commonLabels:
  environment: production
  managed-by: kustomize

commonAnnotations:
  environment: production
  auto-deploy: "false"
  backup: "daily"

replicas:
- name: calendar-service
  count: 3

# Override replicas and resources for production
patchesStrategicMerge:
- deployment-patch.yaml

# ConfigMap patches for production-specific settings
configMapGenerator:
- name: calendar-config
  behavior: merge
  literals:
  - LOG_LEVEL=warn
  - METRICS_ENABLED=true
  - PPROF_ENABLED=false
  - RATE_LIMIT_RPS=50.0
  - RATE_LIMIT_BURST=100

# Network policy
resources:
- network-policy.yaml
- ingress.yaml
- poddisruptionbudget-strict.yaml

# Additional labels
labels:
- pairs:
    tier: backend
