apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: calendar-service
  namespace: calendar
spec:
  podSelector:
    matchLabels:
      app: calendar-service
  policyTypes:
  - Ingress
  - Egress
  # Ingress rules
  ingress:
  # Allow from nginx ingress controller
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    - namespaceSelector:
        matchLabels:
          name: nginx-ingress
    ports:
    - protocol: TCP
      port: 8080

  # Allow from pods in same namespace (for debugging/testing)
  - from:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 8080
    - protocol: TCP
      port: 9090
  # Egress rules
  egress:
  # Allow DNS
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53

  # Allow to PostgreSQL
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432

  # Allow to Redis
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379

  # Allow to Temporal
  - to:
    - podSelector:
        matchLabels:
          app: temporal
    ports:
    - protocol: TCP
      port: 7233

  # Allow to Hasura
  - to:
    - podSelector:
        matchLabels:
          app: hasura
    ports:
    - protocol: TCP
      port: 8080

  # Allow to external HTTPS
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
