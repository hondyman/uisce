# Prometheus ServiceMonitor for Calendar Service
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: calendar-service
  labels:
    app: calendar-service
spec:
  selector:
    matchLabels:
      app: calendar-service
  endpoints:
  - port: metrics
    interval: 30s
    path: /metrics
---
# Prometheus PrometheusRule for Alerting
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: calendar-service-alerts
  labels:
    prometheus: kube-prometheus
spec:
  groups:
  - name: calendar-service
    interval: 30s
    rules:
    # Latency alerts
    - alert: CalendarServiceHighLatency
      expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job="calendar-service"}[5m])) > 1
      for: 5m
      labels:
        severity: warning
        service: calendar-service
      annotations:
        summary: "Calendar Service - High P95 Latency"
        description: "P95 latency is {{ $value }}ms, threshold is 1000ms"

    - alert: CalendarServiceCriticalLatency
      expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket{job="calendar-service"}[5m])) > 5
      for: 2m
      labels:
        severity: critical
        service: calendar-service
      annotations:
        summary: "Calendar Service - Critical P99 Latency"
        description: "P99 latency is {{ $value }}ms, threshold is 5000ms"

    # Error rate alerts
    - alert: CalendarServiceHighErrorRate
      expr: rate(http_requests_total{job="calendar-service", status=~"5.."}[5m]) > 0.01
      for: 5m
      labels:
        severity: warning
        service: calendar-service
      annotations:
        summary: "Calendar Service - High Error Rate"
        description: "Error rate (5xx) is {{ $value | humanizePercentage }}, threshold is 1%"

    - alert: CalendarServiceCriticalErrorRate
      expr: rate(http_requests_total{job="calendar-service", status=~"5.."}[5m]) > 0.05
      for: 2m
      labels:
        severity: critical
        service: calendar-service
      annotations:
        summary: "Calendar Service - Critical Error Rate"
        description: "Error rate (5xx) is {{ $value | humanizePercentage }}, threshold is 5%"

    # Availability alerts
    - alert: CalendarServiceDown
      expr: up{job="calendar-service"} == 0
      for: 1m
      labels:
        severity: critical
        service: calendar-service
      annotations:
        summary: "Calendar Service - Target Down"
        description: "{{ $labels.instance }} has been unreachable for more than 1 minute"

    - alert: CalendarServicePodNotReady
      expr: kube_pod_status_ready{pod=~"calendar-service-.*", condition="false"} == 1
      for: 5m
      labels:
        severity: warning
        service: calendar-service
      annotations:
        summary: "Calendar Service - Pod Not Ready"
        description: "Pod {{ $labels.pod }} has not been ready for 5 minutes"

    # Resource alerts
    - alert: CalendarServiceHighMemoryUsage
      expr: container_memory_usage_bytes{pod=~"calendar-service-.*"} / container_spec_memory_limit_bytes > 0.9
      for: 5m
      labels:
        severity: warning
        service: calendar-service
      annotations:
        summary: "Calendar Service - High Memory Usage"
        description: "Memory usage is {{ $value | humanizePercentage }} of limit"

    - alert: CalendarServiceHighCPUUsage
      expr: rate(container_cpu_usage_seconds_total{pod=~"calendar-service-.*"}[5m]) > 0.8
      for: 5m
      labels:
        severity: warning
        service: calendar-service
      annotations:
        summary: "Calendar Service - High CPU Usage"
        description: "CPU usage is {{ $value | humanizePercentage }}"

    # Database alerts
    - alert: CalendarServiceDatabaseConnectionErrors
      expr: rate(database_connection_errors_total[5m]) > 0
      for: 2m
      labels:
        severity: critical
        service: calendar-service
      annotations:
        summary: "Calendar Service - Database Connection Errors"
        description: "Database connection errors detected"

    # Rate limiting alerts
    - alert: CalendarServiceRateLimitExceeded
      expr: rate(http_requests_total{job="calendar-service", status="429"}[5m]) > 0.1
      for: 5m
      labels:
        severity: warning
        service: calendar-service
      annotations:
        summary: "Calendar Service - Rate Limit Exceeded"
        description: "Rate limit is being exceeded (429 responses > 0.1/s)"

    # SLO recording rules
    - record: job_instance:http_requests_total:rate5m
      expr: rate(http_requests_total{job="calendar-service"}[5m])

    - record: job_instance:http_request_errors:rate5m
      expr: rate(http_requests_total{job="calendar-service", status=~"5.."}[5m])

    - record: job_instance:http_request_duration:p95
      expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job="calendar-service"}[5m]))

    - record: job_instance:http_request_duration:p99
      expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket{job="calendar-service"}[5m]))
---
# Grafana Dashboard ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: calendar-service-dashboard
spec:
  dashboard.json: |
    {
      "dashboard": {
        "title": "Calendar Service",
        "panels": [
          {
            "title": "Request Rate",
            "targets": [
              {
                "expr": "rate(http_requests_total{job=\"calendar-service\"}[5m])"
              }
            ]
          },
          {
            "title": "Error Rate",
            "targets": [
              {
                "expr": "rate(http_requests_total{job=\"calendar-service\", status=~\"5..\"}[5m])"
              }
            ]
          },
          {
            "title": "P95 Latency",
            "targets": [
              {
                "expr": "histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job=\"calendar-service\"}[5m]))"
              }
            ]
          },
          {
            "title": "Memory Usage",
            "targets": [
              {
                "expr": "container_memory_usage_bytes{pod=~\"calendar-service-.*\"}"
              }
            ]
          },
          {
            "title": "CPU Usage",
            "targets": [
              {
                "expr": "rate(container_cpu_usage_seconds_total{pod=~\"calendar-service-.*\"}[5m])"
              }
            ]
          }
        ]
      }
    }
