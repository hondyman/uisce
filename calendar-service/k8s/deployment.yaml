apiVersion: v1
kind: Namespace
metadata:
  name: calendar-service
  labels:
    name: calendar-service
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: calendar-service-config
  namespace: calendar-service
data:
  LOG_LEVEL: "info"
  SERVICE_NAME: "calendar-service"
  SERVICE_VERSION: "1.0.0"
  ENVIRONMENT: "production"
  METRICS_ENABLED: "true"
  METRICS_PORT: "9090"
  TRACING_ENABLED: "true"
  TRACING_SAMPLE_RATE: "0.1"
---
apiVersion: v1
kind: Secret
metadata:
  name: calendar-service-secrets
  namespace: calendar-service
type: Opaque
stringData:
  jwt-secret: "${JWT_SECRET}"
  database-url: "${DATABASE_URL}"
  database-user: "${DATABASE_USER}"
  database-password: "${DATABASE_PASSWORD}"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: calendar-service-prod
  namespace: calendar-service
  labels:
    app: calendar-service
    version: "1.0.0"
    environment: production
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: calendar-service
      environment: production
  template:
    metadata:
      labels:
        app: calendar-service
        environment: production
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: calendar-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: calendar-service
        image: calendar-service:1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        env:
        # ConfigMap values
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: calendar-service-config
              key: LOG_LEVEL
        - name: SERVICE_NAME
          valueFrom:
            configMapKeyRef:
              name: calendar-service-config
              key: SERVICE_NAME
        - name: ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: calendar-service-config
              key: ENVIRONMENT
        - name: METRICS_ENABLED
          valueFrom:
            configMapKeyRef:
              name: calendar-service-config
              key: METRICS_ENABLED
        - name: METRICS_PORT
          valueFrom:
            configMapKeyRef:
              name: calendar-service-config
              key: METRICS_PORT
        # Secret values
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: calendar-service-secrets
              key: jwt-secret
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: calendar-service-secrets
              key: database-url
        # Pod metadata
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP

        resources:
          requests:
            cpu: 500m
            memory: 256Mi
          limits:
            cpu: 2000m
            memory: 1Gi

        livenessProbe:
          httpGet:
            path: /health
            port: http
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health
            port: http
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 2

        startupProbe:
          httpGet:
            path: /health
            port: http
            scheme: HTTP
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30

        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL

        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: var-run
          mountPath: /var/run

      volumes:
      - name: tmp
        emptyDir: {}
      - name: var-run
        emptyDir: {}

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - calendar-service
              topologyKey: kubernetes.io/hostname

      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: calendar-service
  namespace: calendar-service
  labels:
    app: calendar-service
spec:
  type: ClusterIP
  selector:
    app: calendar-service
    environment: production
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: calendar-service-hpa
  namespace: calendar-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: calendar-service-prod
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: calendar-service-pdb
  namespace: calendar-service
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: calendar-service
      environment: production
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: calendar-service
  namespace: calendar-service
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: calendar-service
rules:
- apiGroups: [ "" ]
  resources: [ "configmaps" ]
  verbs: [ "get", "list", "watch" ]
- apiGroups: [ "" ]
  resources: [ "events" ]
  verbs: [ "create", "patch" ]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: calendar-service
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: calendar-service
subjects:
- kind: ServiceAccount
  name: calendar-service
  namespace: calendar-service
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: calendar-service
  namespace: calendar-service
  labels:
    app: calendar-service
spec:
  selector:
    matchLabels:
      app: calendar-service
  endpoints:
  - port: metrics
    interval: 30s
    path: /metrics
---
apiVersion: v1
kind: NetworkPolicy
metadata:
  name: calendar-service-network-policy
  namespace: calendar-service
spec:
  podSelector:
    matchLabels:
      app: calendar-service
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8080
  - from:
    - namespaceSelector:
        matchLabels:
          name: monitoring
    ports:
    - protocol: TCP
      port: 9090
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: default
    ports:
    - protocol: TCP
      port: 5432
  - to:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
