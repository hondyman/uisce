apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: calendar

resources:
- namespace.yaml
- serviceaccount.yaml
- role.yaml
- rolebinding.yaml
- configmap.yaml
- secrets.yaml
- deployment.yaml
- service.yaml
- hpa.yaml
- pdb.yaml
- servicemonitor.yaml

commonLabels:
  app: calendar-service
  version: v1
  managed-by: kustomize

commonAnnotations:
  documentation: https://github.com/semlayer/calendar-service
  maintenance-window: "02:00 UTC daily"
  team: operations
