apiVersion: v1
kind: Secret
metadata:
  name: calendar-secrets
  namespace: calendar
  labels:
    app: calendar-service
type: Opaque
stringData:
  # ⚠️  IMPORTANT: Replace these values with actual secrets in production
  # Option 1: Use external-secrets operator to sync from Vault/AWS Secrets Manager
  # Option 2: Use sealed-secrets or kms plugin for encryption at rest

  # Database
  DB_HOST: "postgres.default.svc.cluster.local"
  DB_PORT: "5432"
  DB_USER: "calendar_user"
  DB_PASSWORD: "REPLACE_WITH_SECURE_PASSWORD"
  DB_NAME: "calendar_db"
  DB_SSL_MODE: "require"

  # JWT
  JWT_SECRET: "REPLACE_WITH_STRONG_JWT_SECRET_MIN_32_CHARS"

  # Hasura
  HASURA_GRAPHQL_ADMIN_SECRET: "REPLACE_WITH_HASURA_ADMIN_SECRET"

  # Redis Auth (if Redis requires authentication)
  REDIS_PASSWORD: "REPLACE_IF_REDIS_REQUIRES_AUTH"

  # Temporal
  TEMPORAL_MTLS_ENABLED: "false"
  TEMPORAL_MTLS_CERT_PATH: "/etc/temporal/tls/client.crt"
  TEMPORAL_MTLS_KEY_PATH: "/etc/temporal/tls/client.key"
  TEMPORAL_MTLS_CA_PATH: "/etc/temporal/tls/ca.crt"

  # Email Alerts (if configured)
  ALERT_EMAIL_FROM: "alerts@calendar.example.com"
  ALERT_SMTP_HOST: "smtp.example.com"
  ALERT_SMTP_PORT: "587"
  ALERT_SMTP_USER: "REPLACE_WITH_SMTP_USER"
  ALERT_SMTP_PASSWORD: "REPLACE_WITH_SMTP_PASSWORD"

  # API Keys (for external integrations)
  EXTERNAL_HOLIDAY_API_KEY: "REPLACE_WITH_HOLIDAY_API_KEY"
