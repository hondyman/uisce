apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: calendar-service
  namespace: calendar
  labels:
    app: calendar-service
    prometheus: kube-prometheus
spec:
  selector:
    matchLabels:
      app: calendar-service

  endpoints:
  - name: metrics
    port: metrics
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
    scheme: http

    # Metric relabeling
    metricRelabelings:
    - sourceLabels: [ __name__ ]
      regex: 'go_.*'
      action: keep
    - sourceLabels: [ __name__ ]
      regex: 'process_.*'
      action: keep
    - sourceLabels: [ __name__ ]
      regex: 'calendar_.*'
      action: keep
    - sourceLabels: [ __name__ ]
      regex: 'http_.*'
      action: keep
