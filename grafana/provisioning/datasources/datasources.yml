# Grafana Datasource Provisioning

# Prometheus datasource
apiVersion: 1

datasources:
- name: Prometheus
  type: prometheus
  access: proxy
  url: http://prometheus:9090
  password: ''
  user: ''
  database: ''
  basicAuth: false
  isDefault: true
  jsonData:
    timeInterval: 15s
  editable: true

- name: Jaeger
  type: jaeger
  access: proxy
  url: http://jaeger:16686
  password: ''
  user: ''
  database: ''
  basicAuth: false
  isDefault: false
  jsonData:
    nodeGraph:
      enabled: true
  editable: true

- name: Loki
  type: loki
  access: proxy
  url: http://loki:3100
  password: ''
  user: ''
  database: ''
  basicAuth: false
  isDefault: false
  jsonData:
    derivedFields:
    - datasourceUid: Prometheus
      matcherRegex: trace_id=(\w+)
      name: trace_id
      url: $${__value.raw}
  editable: false
