services:
  # Debezium Server for CDC
  debezium:
    image: debezium/server:2.5
    container_name: semlayer-debezium
    hostname: debezium
    depends_on:
      - redpanda
    volumes:
      - ./debezium/application.properties:/debezium/conf/application.properties:ro
      - debezium-data:/debezium/data
    environment:
      - POSTGRES_HOST=host.docker.internal
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=alpha
      - KAFKA_BROKERS=redpanda:9092
      - DEBEZIUM_SINK_TYPE=kafka
      - DEBEZIUM_SINK_KAFKA_BOOTSTRAP_SERVERS=redpanda:9092
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - semlayer-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/q/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redpanda (Kafka)
  redpanda:
    image: vectorized/redpanda:latest
    container_name: semlayer-redpanda
    hostname: redpanda
    command: ["redpanda", "start", "--overprovisioned", "--smp", "1", "--memory", "1G", "--reserve-memory", "0M", "--check=false"]
    ports:
      - "9092:9092"   # Kafka broker
      - "8082:8082"   # Pandaproxy
    networks:
      - semlayer-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Security Sync Worker
  security-sync-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile.sync-worker
    container_name: semlayer-security-sync
    depends_on:
      - redpanda
    environment:
      - KAFKA_BROKERS=redpanda:9092
      - POSTGRES_URL=postgres://postgres:postgres@host.docker.internal:5432/alpha
      - HASURA_URL=${HASURA_URL:-http://localhost:8080}
      - HASURA_ADMIN_SECRET=${HASURA_ADMIN_SECRET:-myadminsecretkey}
      - SUPERSET_URL=${SUPERSET_URL:-http://localhost:8088}
      - SUPERSET_USERNAME=${SUPERSET_USERNAME:-admin}
      - SUPERSET_PASSWORD=${SUPERSET_PASSWORD:-admin}
      - STARROCKS_URL=${STARROCKS_URL:-localhost:9030}
      - STARROCKS_USER=${STARROCKS_USER:-root}
      - STARROCKS_PASSWORD=${STARROCKS_PASSWORD:-}

  # Security Sync Workers
  security-sync-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile.sync-worker
    container_name: semlayer-security-sync
    depends_on:
      - redpanda
    environment:
      - KAFKA_BROKERS=redpanda:9092
      - POSTGRES_URL=postgres://postgres:postgres@host.docker.internal:5432/alpha
      - HASURA_URL=${HASURA_URL:-http://localhost:8080}
      - HASURA_ADMIN_SECRET=${HASURA_ADMIN_SECRET:-myadminsecretkey}
      - SUPERSET_URL=${SUPERSET_URL:-http://localhost:8088}
      - SUPERSET_USERNAME=${SUPERSET_USERNAME:-admin}
      - SUPERSET_PASSWORD=${SUPERSET_PASSWORD:-admin}
      - STARROCKS_URL=${STARROCKS_URL:-localhost:9030}
      - STARROCKS_USER=${STARROCKS_USER:-root}
      - STARROCKS_PASSWORD=${STARROCKS_PASSWORD:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - semlayer-network
    restart: unless-stopped

volumes:
  debezium-data:
  rabbitmq-data:

networks:
  semlayer-network:
    driver: bridge
