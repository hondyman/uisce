  # ==========================================
  # CATALOG SYNC (Go)
  # ==========================================
  catalog-sync:
    build:
      context: .
      dockerfile: backend/Dockerfile.catalog-sync
    container_name: semlayer-catalog-sync
    networks:
      - local-net
    ports:
      - "${CATALOG_SYNC_PORT:-8097}:8090"
    environment:
      - DATABASE_URL=postgres://postgres:${POSTGRES_PASSWORD:-postgres}@${REMOTE_HOST:-100.84.126.19}:5432/alpha?sslmode=disable
      - POSTGRES_DSN=postgres://postgres:${POSTGRES_PASSWORD:-postgres}@${REMOTE_HOST:-100.84.126.19}:5432/alpha?sslmode=disable
      - KAFKA_BROKERS=${REMOTE_HOST:-100.84.126.19}:19092
      - SCHEMA_REGISTRY_URL=http://${REMOTE_HOST:-100.84.126.19}:8081
      - PORT=8090
      - TENANT_ID=99e99e99-99e9-49e9-89e9-99e99e99e999
    restart: unless-stopped

  # ==========================================
  # OUTBOX PROCESSOR (Go)
  # ==========================================
  outbox-processor:
    build:
      context: ./backend
      dockerfile: Dockerfile.outbox-processor
    container_name: semlayer-outbox-processor
    networks:
