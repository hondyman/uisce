      - backend
    restart: unless-stopped

  # ==========================================
  # NOTIFICATIONS (Go)
  # ==========================================
  notifications:
    build:
      context: .
      dockerfile: backend/Dockerfile.notifications
    container_name: semlayer-notifications
    networks:
