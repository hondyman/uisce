# =============================================================================
# LOCAL MACBOOK SERVICES - Go backends + auth-service only
# =============================================================================
# All infrastructure (Hasura, Redpanda, Temporal, Debezium, Trino) runs on REMOTE
# Postgres runs on REMOTE host directly (not in compose)
# Frontend runs OUTSIDE compose via: cd frontend && npm run dev
#
# Usage: docker compose -f docker-compose.local.yml --env-file .env.split up -d
# =============================================================================

services:
  # ==========================================
  # AUTH SERVICE (Node.js - needed for login)
  # ==========================================
  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: semlayer-auth
    networks:
      - local-net
    ports:
      - "3001:8001"
    environment:
      - NODE_ENV=development
      - AUTH_SERVICE_PORT=8001
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_HOST=${REMOTE_HOST:-100.84.126.19}
      - POSTGRES_PORT=5432
      - POSTGRES_DB=alpha
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret-key-change-in-production}
      - JWT_EXPIRY=1h
      - REFRESH_TOKEN_EXPIRY=24h
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173,http://127.0.0.1:5174
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8001/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ==========================================
  # BACKEND API (Go)
  # ==========================================
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: semlayer-backend
    networks:
      - local-net
    ports:
      - "${BACKEND_PORT:-8082}:8080"
    environment:
      - DATABASE_URL=postgres://postgres:${POSTGRES_PASSWORD:-postgres}@${REMOTE_HOST:-100.84.126.19}:5432/alpha?sslmode=disable
      - PORT=8080
      - HASURA_URL=http://${REMOTE_HOST:-100.84.126.19}:8085/v1/graphql
      - HASURA_ADMIN_SECRET=${HASURA_ADMIN_SECRET:-myadminsecret}
      - TEMPORAL_HOSTPORT=${REMOTE_HOST:-100.84.126.19}:7233
      - KAFKA_BROKERS=${REMOTE_HOST:-100.84.126.19}:19092
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret-key-change-in-production}
      # Keycloak OIDC JWKS endpoint. Backend's SecurityManager fetches this
      # on first RS256 token validation to verify Keycloak-issued JWTs.
      - KEYCLOAK_JWKS_URL=${KEYCLOAK_JWKS_URL:-https://${KEYCLOAK_HOST:-100.84.50.65}:${KEYCLOAK_PORT:-8443}/realms/${KEYCLOAK_REALM:-uisce}/protocol/openid-connect/certs}
      - KEYCLOAK_ISSUER=${KEYCLOAK_ISSUER:-https://${KEYCLOAK_HOST:-100.84.50.65}:${KEYCLOAK_PORT:-8443}/realms/${KEYCLOAK_REALM:-uisce}}
      - KEYCLOAK_INSECURE_SKIP_VERIFY=${KEYCLOAK_INSECURE_SKIP_VERIFY:-true}
    depends_on:
      - auth-service
    restart: unless-stopped

  # ==========================================
  # API GATEWAY (Go)
  # ==========================================
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: semlayer-api-gateway
    networks:
      - local-net
    ports:
      - "${API_GATEWAY_PORT:-8001}:8001"
    environment:
      - DATABASE_URL=postgres://postgres:${POSTGRES_PASSWORD:-postgres}@${REMOTE_HOST:-100.84.126.19}:5432/alpha?sslmode=disable
      - BACKEND_URL=http://backend:8080
      - HASURA_URL=http://${REMOTE_HOST:-100.84.126.19}:8085/v1/graphql
      - HASURA_ADMIN_SECRET=${HASURA_ADMIN_SECRET:-myadminsecret}
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret-key-change-in-production}
      - TEMPORAL_HOSTPORT=${REMOTE_HOST:-100.84.126.19}:7233
      - KAFKA_BROKERS=${REMOTE_HOST:-100.84.126.19}:19092
      - PORT=8001
      - ENABLE_SECURITY=true
    restart: unless-stopped
    depends_on:
      - backend
      - auth-service

  # ==========================================
  # BP-BACKEND (Go)
  # ==========================================
  bp-backend:
    build:
      context: ./bp-backend
      dockerfile: Dockerfile
    container_name: semlayer-bp-backend
    networks:
      - local-net
    ports:
      - "${BP_BACKEND_PORT:-8086}:8080"
    environment:
      - DATABASE_URL=postgres://postgres:${POSTGRES_PASSWORD:-postgres}@${REMOTE_HOST:-100.84.126.19}:5432/alpha?sslmode=disable
      - PORT=8080
      - TEMPORAL_HOSTPORT=${REMOTE_HOST:-100.84.126.19}:7233
      - KAFKA_BROKERS=${REMOTE_HOST:-100.84.126.19}:19092
    restart: unless-stopped

  # ==========================================
  # ENTITY MANAGER (Go)
  # ==========================================
  entity-manager:
    build:
      context: .
      dockerfile: entity-manager/Dockerfile
    container_name: semlayer-entity-manager
    networks:
      - local-net
    ports:
      - "${ENTITY_MANAGER_PORT:-8087}:8080"
    environment:
      - DATABASE_URL=postgres://postgres:${POSTGRES_PASSWORD:-postgres}@${REMOTE_HOST:-100.84.126.19}:5432/alpha?sslmode=disable
      - PORT=8080
      - TEMPORAL_HOSTPORT=${REMOTE_HOST:-100.84.126.19}:7233
      - KAFKA_BROKERS=${REMOTE_HOST:-100.84.126.19}:19092
    restart: unless-stopped

  # ==========================================
  # SYNC WORKER (Go)
  # ==========================================
  sync-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile.sync-worker
    container_name: semlayer-sync-worker
    networks:
      - local-net
    environment:
      - DATABASE_URL=postgres://postgres:${POSTGRES_PASSWORD:-postgres}@${REMOTE_HOST:-100.84.126.19}:5432/alpha?sslmode=disable
      - KAFKA_BROKERS=${REMOTE_HOST:-100.84.126.19}:19092
      - TEMPORAL_HOSTPORT=${REMOTE_HOST:-100.84.126.19}:7233
