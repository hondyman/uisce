  # ==========================================
  snapshot-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.snapshot-worker
    container_name: semlayer-snapshot-worker
    networks:
      - local-net
    environment:
      - DATABASE_URL=postgres://postgres:${POSTGRES_PASSWORD:-postgres}@${REMOTE_HOST:-100.84.126.19}:5432/alpha?sslmode=disable
      - KAFKA_BROKERS=${REMOTE_HOST:-100.84.126.19}:19092
    restart: unless-stopped

  # ==========================================
  # catalog-worker:
  #   build:
  #     context: .
  #     dockerfile: backend/Dockerfile.catalog-worker
  #   container_name: semlayer-catalog-worker
  #   networks:
  #     - local-net
  #   environment:
  #     - DATABASE_URL=postgres://postgres:${POSTGRES_PASSWORD:-postgres}@${REMOTE_HOST:-100.84.126.19}:5432/alpha?sslmode=disable
  #     - KAFKA_BROKERS=${REMOTE_HOST:-100.84.126.19}:19092
  #   restart: unless-stopped

  # ==========================================
  # CALENDAR SERVICE (Go) - Epic 31
  # ==========================================
  calendar-service:
    build:
      context: ./calendar-service
      dockerfile: Dockerfile
    container_name: semlayer-calendar-service
    networks:
      - local-net
    ports:
      - "${CALENDAR_SERVICE_PORT:-8081}:8080"
    environment:
      - SERVER_PORT=8080
      - HASURA_ENDPOINT=${HASURA_ENDPOINT:-http://${REMOTE_HOST:-100.84.126.19}:8085/v1/graphql}
      - HASURA_ADMIN_SECRET=${HASURA_ADMIN_SECRET:-myadminsecret}
      - POSTGRES_HOST=${REMOTE_HOST:-100.84.126.19}
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=semlayer
      - TEMPORAL_HOST=${REMOTE_HOST:-100.84.126.19}
      - TEMPORAL_PORT=7233
      - REDPANDA_BROKERS=${REMOTE_HOST:-100.84.126.19}:19092
      - REDIS_URL=redis://${REMOTE_HOST:-100.84.126.19}:6379
      - ENVIRONMENT=development
      - LOG_LEVEL=debug
      - CACHE_TTL_MINUTES=60
      - ENABLE_TEMPORAL=false
    restart: unless-stopped

  # ==========================================================================
  # NO POSTGRES, NO HASURA, NO REDPANDA, NO DEBEZIUM, NO TRINO, NO MINIO HERE
  # All infrastructure runs on REMOTE server
  # All databases on REMOTE Postgres
  # ==========================================================================

networks:
  local-net:
    driver: bridge
    name: local-net
