# Local Application Services - Run on local machine
# This compose file contains only Golang application services
# Infrastructure services (Redis, Kafka, etc.) run on remote Tailscale server

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    networks:
      - local-net
    ports:
      - "${BACKEND_PORT:-8082}:8080"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@100.84.126.19:5432/alpha?sslmode=disable
      - PORT=8080
      - HASURA_URL=http://100.84.126.19:8080
      - HASURA_ADMIN_SECRET=myadminsecret
      - REDIS_ADDR=100.84.126.19:6379
      - TEMPORAL_HOSTPORT=100.84.126.19:7233
      - KAFKA_BROKERS=100.84.126.19:9092
      - TRINO_DSN=http://admin@100.84.126.19:8084?catalog=iceberg&schema=audit
    depends_on: []  # No local dependencies - all remote
    restart: unless-stopped

  api-gateway:
