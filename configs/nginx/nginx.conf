events {
    worker_connections 1024;
}

http {
    upstream fabric-builder {
        server fabric-builder:8080;
    }

    upstream wealth-management {
        server wealth-management:8081;
    }

    upstream ai-builder {
        server ai-builder:8082;
    }

    upstream semantic-engine {
        server semantic-engine:8083;
    }

    upstream governance {
        server governance:8084;
    }

    upstream compliance-engine {
        server compliance-engine:8085;
    }

    upstream hasura {
        server hasura:8080;
    }

    upstream backend {
        server backend:8080;
    }

    server {
        listen 80;
        server_name localhost;

        # Fabric Builder Service
        location /api/fabric/ {
            proxy_pass http://fabric-builder;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Wealth Management Service
        location /api/wealth/ {
            proxy_pass http://wealth-management;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # AI Builder Service
        location /api/ai/ {
            proxy_pass http://ai-builder;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Semantic Engine Service
        location /api/semantic/ {
            proxy_pass http://semantic-engine;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Governance Service
        location /api/governance/ {
            proxy_pass http://governance;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Compliance Engine Service
        location /api/compliance/ {
            proxy_pass http://compliance-engine;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Hasura GraphQL API
        location /v1/ {
            proxy_pass http://hasura;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Backend API (catch-all for /api/ routes not handled above)
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}