# =============================================================================
# MACBOOK BACKEND - Distributed Setup
# =============================================================================
# This compose file runs ONLY the Backend on MacBook Docker
# 
# REMOTE SERVICES ON 100.84.126.19:
#   - PostgreSQL (port 5432)
#   - Hasura GraphQL (port 8085)
#   - Redpanda Kafka (ports 9092, 19092)
#   - Redpanda Schema Registry (port 8081)
#   - Temporal (port 7233)
#   - Debezium (port 8083)
#
# MACBOOK SERVICES:
#   - Backend API (port 8080)
#   - Frontend (port 5173) - runs NATIVE, not in Docker
#
# USAGE:
#   1. Ensure external services are running on 100.84.126.19
#   2. docker compose -f docker-compose.mac-distributed.yml up
#   3. Frontend: npm run dev (runs natively on Mac)
#
# =============================================================================

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: semlayer-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # ===== Basic Config =====
      PORT: 8080
      
      # ===== Remote Database =====
      DATABASE_URL: postgresql://postgres:postgres@100.84.126.19:5432/alpha?sslmode=disable
      DB_HOST: 100.84.126.19
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: alpha
      
      # ===== Remote Hasura =====
      HASURA_URL: http://100.84.126.19:8085
      HASURA_ADMIN_SECRET: ${HASURA_ADMIN_SECRET:-myadminsecret}
      
      # ===== JWT & Auth =====
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-key-change-in-production}
      JWT_EXPIRY: 1h
      REFRESH_TOKEN_EXPIRY: 24h
      
      # ===== Remote Kafka/Redpanda =====
      KAFKA_BROKERS: 100.84.126.19:19092
      REDPANDA_BROKERS: 100.84.126.19:19092
      KAFKA_SCHEMA_REGISTRY: http://100.84.126.19:8081
      
      # ===== Remote Temporal =====
      TEMPORAL_HOSTPORT: 100.84.126.19:7233
      
      # ===== Frontend CORS =====
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173,http://127.0.0.1:5174
      
      # ===== Security =====
      ENABLE_SECURITY: "true"
      DEV_ALLOW_UNAUTH_FABRIC: "false"
      DEV_ALLOW_UNAUTH_MODELS: "false"
      DEV_ALLOW_UNAUTH_CATALOG: "false"
      IP_WHITELIST_ENFORCE: "false"
      
      # ===== Logging =====
      LOG_LEVEL: info
      ENABLE_AUDIT: "true"
      
      # ===== Rate Limiting =====
      RATE_LIMIT_RPM: 60
      
      # ===== Optional Services =====
      DEBEZIUM_URL: http://100.84.126.19:8083
      REDPANDA_CONSOLE: http://100.84.126.19:8096
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    
    networks:
      - mac-backend
    
    # Allow unlimited retries to connect to remote services
    depends_on: []

networks:
  mac-backend:
    name: mac-backend
    driver: bridge
