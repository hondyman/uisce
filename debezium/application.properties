# Debezium Server Configuration for IAM Security Event Streaming
# This configuration captures changes from PostgreSQL IAM tables and streams them to RabbitMQ

# ============================================================================
# DEBEZIUM CORE CONFIGURATION
# ============================================================================

# Offset storage (tracks position in WAL)
debezium.source.offset.storage.file.filename=/debezium/data/offsets.dat
debezium.source.offset.flush.interval.ms=1000

# Schema history storage (for DDL changes)
debezium.source.schema.history.internal.file.filename=/debezium/data/schema_history.dat

# ============================================================================
# SOURCE - POSTGRESQL CONNECTOR CONFIGURATION
# ============================================================================

# Connector class
debezium.source.connector.class=io.debezium.connector.postgresql.PostgresConnector

# PostgreSQL connection (connecting to host machine)
debezium.source.database.hostname=${POSTGRES_HOST:host.docker.internal}
debezium.source.database.port=${POSTGRES_PORT:5432}
debezium.source.database.user=${POSTGRES_USER:postgres}
debezium.source.database.password=${POSTGRES_PASSWORD:postgres}
debezium.source.database.dbname=${POSTGRES_DB:alpha}

# Server name (used as topic prefix)
debezium.source.topic.prefix=security_sync

# Schema and table filtering - ONLY capture IAM tables
debezium.source.schema.include.list=iam
debezium.source.table.include.list=iam.roles,iam.permissions,iam.role_permissions,iam.user_roles,iam.security_events

# Logical decoding plugin (pgoutput is built into Postgres 10+)
debezium.source.plugin.name=pgoutput

# Publication name (must be created in PostgreSQL)
debezium.source.publication.name=iam_security_publication

# Replication slot name
debezium.source.slot.name=iam_security_slot

# ============================================================================
# SINK - KAFKA (Redpanda) CONFIGURATION
# ============================================================================

# Sink type
debezium.sink.type=kafka

# Kafka bootstrap servers
debezium.sink.kafka.bootstrap.servers=${KAFKA_BROKERS:localhost:9092}

# Topic configuration (prefix used by Debezium)
# Debezium will publish to topics like: security_sync.iam.roles
# The connector's topic prefix is defined by debezium.source.topic.prefix
# If ops want to control topic creation/settings, provision topics via Redpanda/rpk

# Routing semantics for Kafka sink: messages will be written to topics with the Debezium prefix
# No RabbitMQ-style exchange/routing key is needed

# ============================================================================
# MESSAGE FORMAT
# ============================================================================

# Use JSON format for messages
debezium.format.value=json
debezium.format.key=json

# Include schema in messages (useful for debugging)
debezium.format.value.schemas.enable=false
debezium.format.key.schemas.enable=false

# ============================================================================
# SNAPSHOT CONFIGURATION
# ============================================================================

# Initial snapshot mode (captures existing data on first run)
debezium.source.snapshot.mode=initial

# ============================================================================
# LOGGING
# ============================================================================

quarkus.log.level=INFO
quarkus.log.console.enable=true
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n

# Debezium-specific logging
quarkus.log.category."io.debezium".level=INFO
quarkus.log.category."org.apache.kafka".level=WARN
